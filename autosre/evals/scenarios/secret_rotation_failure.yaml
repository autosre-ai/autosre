name: secret_rotation_failure
description: "Secret rotation broke service authentication"
difficulty: medium

setup_steps:
  - "Automated secret rotation runs"
  - "Some pods don't pick up new secrets"
  - "Inter-service auth failures"

alert:
  name: "AuthenticationErrors"
  severity: critical
  service_name: api-gateway
  namespace: production
  summary: "Authentication failures between services"
  description: "api-gateway failing to authenticate with downstream services"
  labels:
    alertname: AuthenticationErrors
    namespace: production
    source: api-gateway
    error_type: "401"
  annotations:
    failure_rate: "100%"
    affected_services: "user-service,order-service"
    error_message: "JWT signature verification failed"

services:
  - name: api-gateway
    namespace: production
    status: degraded
    replicas: 3
    ready_replicas: 3
    labels:
      app: api-gateway
      team: platform
      
  - name: user-service
    namespace: production
    status: healthy
    replicas: 3
    ready_replicas: 3
    labels:
      app: user-service
      team: identity
      
  - name: vault
    namespace: vault
    status: healthy
    replicas: 3
    ready_replicas: 3
    labels:
      app: vault

changes:
  - id: change-secret-001
    change_type: config_change
    service_name: vault
    description: "Rotated JWT signing keys per security policy"
    author: security-automation@example.com
    timestamp: "2024-01-15T04:00:00Z"
    successful: true
    
  - id: change-secret-002
    change_type: config_change
    service_name: api-gateway
    description: "Vault agent sidecar updated to v1.15.0"
    author: platform@example.com
    timestamp: "2024-01-14T20:00:00Z"
    successful: true

metrics:
  http_requests_total:
    api-gateway:
      401:
        - timestamp: "2024-01-15T03:00:00Z"
          value: 5
        - timestamp: "2024-01-15T05:00:00Z"
          value: 50000
  vault_secret_lease_remaining_seconds:
    api-gateway:
      - timestamp: "2024-01-15T03:00:00Z"
        value: 86400
      - timestamp: "2024-01-15T05:00:00Z"
        value: 0

expected_root_cause: "Vault agent v1.15.0 has bug preventing automatic secret renewal"
expected_service: api-gateway
expected_runbook: secret-rotation-failure
expected_action: "Rollback Vault agent to v1.14.x, or manually restart pods to pick up new secrets"

max_time_seconds: 120
