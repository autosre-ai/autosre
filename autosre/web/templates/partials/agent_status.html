<!-- Agent Status Badge -->
{% if agent_state.status == 'running' %}
<span class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium bg-sre-accent/20 text-sre-accent border border-sre-accent/30">
    <span class="w-2 h-2 rounded-full bg-sre-accent mr-2 animate-pulse"></span>
    Running
</span>
{% else %}
<span class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium bg-gray-700 text-gray-400 border border-gray-600">
    <span class="w-2 h-2 rounded-full bg-gray-500 mr-2"></span>
    Stopped
</span>
{% endif %}
