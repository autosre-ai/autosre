# Prometheus configuration for OpenSRE local observability
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # OpenSRE application metrics
  - job_name: 'opensre'
    static_configs:
      - targets: ['host.docker.internal:8000']
    metrics_path: /metrics
    scheme: http

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
