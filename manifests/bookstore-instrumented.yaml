# Instrumented Bookstore Services with Prometheus Metrics
# All services expose /metrics endpoint for Prometheus scraping

---
apiVersion: v1
kind: Namespace
metadata:
  name: bookstore
---
# =============================================================================
# CATALOG SERVICE - with Prometheus metrics
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
  namespace: bookstore
  labels:
    app: catalog-service
    tier: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: catalog-service
  template:
    metadata:
      labels:
        app: catalog-service
        tier: api
    spec:
      containers:
      - name: catalog
        image: python:3.11-alpine
        command: ["sh", "-c"]
        args:
        - |
          pip install prometheus-client --quiet && python -c '
          from http.server import HTTPServer, BaseHTTPRequestHandler
          from prometheus_client import Counter, Histogram, Gauge, generate_latest, CONTENT_TYPE_LATEST
          import json
          import time
          import random

          # Prometheus metrics
          REQUEST_COUNT = Counter("http_requests_total", "Total HTTP requests", ["method", "endpoint", "status"])
          REQUEST_LATENCY = Histogram("http_request_duration_seconds", "HTTP request latency", ["endpoint"])
          BOOKS_TOTAL = Gauge("catalog_books_total", "Total number of books in catalog")
          
          books = [
            {"id": 1, "title": "Site Reliability Engineering", "author": "Google", "price": 49.99},
            {"id": 2, "title": "The Phoenix Project", "author": "Gene Kim", "price": 24.99},
            {"id": 3, "title": "Designing Data-Intensive Applications", "author": "Martin Kleppmann", "price": 44.99},
            {"id": 4, "title": "Kubernetes Up & Running", "author": "Kelsey Hightower", "price": 39.99},
          ]
          BOOKS_TOTAL.set(len(books))

          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  start = time.time()
                  if self.path == "/metrics":
                      self.send_response(200)
                      self.send_header("Content-Type", CONTENT_TYPE_LATEST)
                      self.end_headers()
                      self.wfile.write(generate_latest())
                  elif self.path == "/health":
                      REQUEST_COUNT.labels(method="GET", endpoint="/health", status="200").inc()
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b"OK")
                  elif self.path == "/ready":
                      REQUEST_COUNT.labels(method="GET", endpoint="/ready", status="200").inc()
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b"READY")
                  elif self.path.startswith("/books"):
                      # Simulate some latency variation
                      time.sleep(random.uniform(0.01, 0.05))
                      REQUEST_COUNT.labels(method="GET", endpoint="/books", status="200").inc()
                      REQUEST_LATENCY.labels(endpoint="/books").observe(time.time() - start)
                      self.send_response(200)
                      self.send_header("Content-Type", "application/json")
                      self.end_headers()
                      self.wfile.write(json.dumps(books).encode())
                  else:
                      REQUEST_COUNT.labels(method="GET", endpoint="unknown", status="404").inc()
                      self.send_response(404)
                      self.end_headers()
              def log_message(self, format, *args):
                  print(f"[catalog] {args[0]}")

          print("Catalog service starting on port 8080 with metrics...")
          HTTPServer(("0.0.0.0", 8080), Handler).serve_forever()
          '
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 45
          periodSeconds: 15
          timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-service
  namespace: bookstore
  labels:
    app: catalog-service
spec:
  type: ClusterIP
  selector:
    app: catalog-service
  ports:
  - port: 8080
    targetPort: 8080
    name: http
---
# =============================================================================
# CHECKOUT SERVICE - with Prometheus metrics
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout-service
  namespace: bookstore
  labels:
    app: checkout-service
    tier: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: checkout-service
  template:
    metadata:
      labels:
        app: checkout-service
        tier: api
    spec:
      containers:
      - name: checkout
        image: python:3.11-alpine
        command: ["sh", "-c"]
        args:
        - |
          pip install prometheus-client --quiet && python -c '
          from http.server import HTTPServer, BaseHTTPRequestHandler
          from prometheus_client import Counter, Histogram, Gauge, generate_latest, CONTENT_TYPE_LATEST
          import json
          import time
          import random

          # Prometheus metrics
          REQUEST_COUNT = Counter("http_requests_total", "Total HTTP requests", ["method", "endpoint", "status"])
          REQUEST_LATENCY = Histogram("http_request_duration_seconds", "HTTP request latency", ["endpoint"])
          CHECKOUT_TOTAL = Counter("checkout_orders_total", "Total checkout orders", ["status"])
          CART_SIZE = Histogram("checkout_cart_size", "Number of items in cart")

          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  start = time.time()
                  if self.path == "/metrics":
                      self.send_response(200)
                      self.send_header("Content-Type", CONTENT_TYPE_LATEST)
                      self.end_headers()
                      self.wfile.write(generate_latest())
                  elif self.path == "/health":
                      REQUEST_COUNT.labels(method="GET", endpoint="/health", status="200").inc()
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b"OK")
                  elif self.path == "/ready":
                      REQUEST_COUNT.labels(method="GET", endpoint="/ready", status="200").inc()
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b"READY")
                  else:
                      REQUEST_COUNT.labels(method="GET", endpoint="unknown", status="404").inc()
                      self.send_response(404)
                      self.end_headers()

              def do_POST(self):
                  start = time.time()
                  if self.path == "/checkout":
                      time.sleep(random.uniform(0.05, 0.2))
                      cart_items = random.randint(1, 10)
                      CART_SIZE.observe(cart_items)
                      if random.random() < 0.95:  # 95% success rate
                          CHECKOUT_TOTAL.labels(status="success").inc()
                          REQUEST_COUNT.labels(method="POST", endpoint="/checkout", status="200").inc()
                          REQUEST_LATENCY.labels(endpoint="/checkout").observe(time.time() - start)
                          self.send_response(200)
                          self.send_header("Content-Type", "application/json")
                          self.end_headers()
                          self.wfile.write(json.dumps({"status": "success", "order_id": random.randint(1000, 9999)}).encode())
                      else:
                          CHECKOUT_TOTAL.labels(status="failed").inc()
                          REQUEST_COUNT.labels(method="POST", endpoint="/checkout", status="500").inc()
                          self.send_response(500)
                          self.end_headers()
                          self.wfile.write(b"Checkout failed")
                  else:
                      self.send_response(404)
                      self.end_headers()

              def log_message(self, format, *args):
                  print(f"[checkout] {args[0]}")

          print("Checkout service starting on port 8080 with metrics...")
          HTTPServer(("0.0.0.0", 8080), Handler).serve_forever()
          '
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 45
          periodSeconds: 15
          timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: checkout-service
  namespace: bookstore
  labels:
    app: checkout-service
spec:
  type: ClusterIP
  selector:
    app: checkout-service
  ports:
  - port: 8080
    targetPort: 8080
    name: http
---
# =============================================================================
# PAYMENT SERVICE - with Prometheus metrics
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: bookstore
  labels:
    app: payment-service
    tier: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
        tier: api
    spec:
      containers:
      - name: payment
        image: python:3.11-alpine
        command: ["sh", "-c"]
        args:
        - |
          pip install prometheus-client --quiet && python -c '
          from http.server import HTTPServer, BaseHTTPRequestHandler
          from prometheus_client import Counter, Histogram, Gauge, generate_latest, CONTENT_TYPE_LATEST
          import json
          import time
          import random

          # Prometheus metrics
          REQUEST_COUNT = Counter("http_requests_total", "Total HTTP requests", ["method", "endpoint", "status"])
          REQUEST_LATENCY = Histogram("http_request_duration_seconds", "HTTP request latency", ["endpoint"])
          PAYMENT_TOTAL = Counter("payment_transactions_total", "Total payment transactions", ["status", "method"])
          PAYMENT_AMOUNT = Histogram("payment_amount_dollars", "Payment amounts in dollars", buckets=[10, 25, 50, 100, 200, 500])

          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  if self.path == "/metrics":
                      self.send_response(200)
                      self.send_header("Content-Type", CONTENT_TYPE_LATEST)
                      self.end_headers()
                      self.wfile.write(generate_latest())
                  elif self.path == "/health":
                      REQUEST_COUNT.labels(method="GET", endpoint="/health", status="200").inc()
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b"OK")
                  elif self.path == "/ready":
                      REQUEST_COUNT.labels(method="GET", endpoint="/ready", status="200").inc()
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b"READY")
                  else:
                      REQUEST_COUNT.labels(method="GET", endpoint="unknown", status="404").inc()
                      self.send_response(404)
                      self.end_headers()

              def do_POST(self):
                  start = time.time()
                  if self.path == "/pay":
                      time.sleep(random.uniform(0.1, 0.5))  # Payment processing delay
                      amount = random.uniform(20, 200)
                      method = random.choice(["credit_card", "debit_card", "paypal"])
                      PAYMENT_AMOUNT.observe(amount)
                      
                      if random.random() < 0.98:  # 98% success rate
                          PAYMENT_TOTAL.labels(status="success", method=method).inc()
                          REQUEST_COUNT.labels(method="POST", endpoint="/pay", status="200").inc()
                          REQUEST_LATENCY.labels(endpoint="/pay").observe(time.time() - start)
                          self.send_response(200)
                          self.send_header("Content-Type", "application/json")
                          self.end_headers()
                          self.wfile.write(json.dumps({"status": "approved", "transaction_id": random.randint(100000, 999999)}).encode())
                      else:
                          PAYMENT_TOTAL.labels(status="declined", method=method).inc()
                          REQUEST_COUNT.labels(method="POST", endpoint="/pay", status="402").inc()
                          self.send_response(402)
                          self.end_headers()
                          self.wfile.write(b"Payment declined")
                  else:
                      self.send_response(404)
                      self.end_headers()

              def log_message(self, format, *args):
                  print(f"[payment] {args[0]}")

          print("Payment service starting on port 8080 with metrics...")
          HTTPServer(("0.0.0.0", 8080), Handler).serve_forever()
          '
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 45
          periodSeconds: 15
          timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: bookstore
  labels:
    app: payment-service
spec:
  type: ClusterIP
  selector:
    app: payment-service
  ports:
  - port: 8080
    targetPort: 8080
    name: http
---
# =============================================================================
# FRONTEND - with Prometheus metrics
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: bookstore
  labels:
    app: frontend
    tier: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        tier: web
    spec:
      containers:
      - name: frontend
        image: python:3.11-alpine
        command: ["sh", "-c"]
        args:
        - |
          pip install prometheus-client --quiet && python -c '
          from http.server import HTTPServer, BaseHTTPRequestHandler
          from prometheus_client import Counter, Histogram, Gauge, generate_latest, CONTENT_TYPE_LATEST
          import time
          import random

          # Prometheus metrics
          REQUEST_COUNT = Counter("http_requests_total", "Total HTTP requests", ["method", "endpoint", "status"])
          REQUEST_LATENCY = Histogram("http_request_duration_seconds", "HTTP request latency", ["endpoint"])
          PAGE_VIEWS = Counter("frontend_page_views_total", "Total page views", ["page"])
          ACTIVE_SESSIONS = Gauge("frontend_active_sessions", "Number of active sessions")
          
          # Simulate some active sessions
          ACTIVE_SESSIONS.set(random.randint(10, 50))

          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  start = time.time()
                  # Update active sessions randomly
                  ACTIVE_SESSIONS.set(random.randint(10, 50))
                  
                  if self.path == "/metrics":
                      self.send_response(200)
                      self.send_header("Content-Type", CONTENT_TYPE_LATEST)
                      self.end_headers()
                      self.wfile.write(generate_latest())
                  elif self.path == "/health":
                      REQUEST_COUNT.labels(method="GET", endpoint="/health", status="200").inc()
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b"OK")
                  elif self.path == "/ready":
                      REQUEST_COUNT.labels(method="GET", endpoint="/ready", status="200").inc()
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b"READY")
                  elif self.path == "/" or self.path == "/index.html":
                      time.sleep(random.uniform(0.01, 0.03))
                      PAGE_VIEWS.labels(page="home").inc()
                      REQUEST_COUNT.labels(method="GET", endpoint="/", status="200").inc()
                      REQUEST_LATENCY.labels(endpoint="/").observe(time.time() - start)
                      self.send_response(200)
                      self.send_header("Content-Type", "text/html")
                      self.end_headers()
                      self.wfile.write(b"<html><body><h1>Bookstore</h1><p>Welcome!</p></body></html>")
                  elif self.path == "/catalog":
                      time.sleep(random.uniform(0.02, 0.05))
                      PAGE_VIEWS.labels(page="catalog").inc()
                      REQUEST_COUNT.labels(method="GET", endpoint="/catalog", status="200").inc()
                      REQUEST_LATENCY.labels(endpoint="/catalog").observe(time.time() - start)
                      self.send_response(200)
                      self.send_header("Content-Type", "text/html")
                      self.end_headers()
                      self.wfile.write(b"<html><body><h1>Book Catalog</h1></body></html>")
                  elif self.path == "/cart":
                      time.sleep(random.uniform(0.01, 0.04))
                      PAGE_VIEWS.labels(page="cart").inc()
                      REQUEST_COUNT.labels(method="GET", endpoint="/cart", status="200").inc()
                      REQUEST_LATENCY.labels(endpoint="/cart").observe(time.time() - start)
                      self.send_response(200)
                      self.send_header("Content-Type", "text/html")
                      self.end_headers()
                      self.wfile.write(b"<html><body><h1>Shopping Cart</h1></body></html>")
                  else:
                      REQUEST_COUNT.labels(method="GET", endpoint="unknown", status="404").inc()
                      self.send_response(404)
                      self.end_headers()

              def log_message(self, format, *args):
                  print(f"[frontend] {args[0]}")

          print("Frontend starting on port 80 with metrics...")
          HTTPServer(("0.0.0.0", 80), Handler).serve_forever()
          '
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        readinessProbe:
          httpGet:
            path: /ready
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 45
          periodSeconds: 15
          timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: bookstore
  labels:
    app: frontend
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 80
    name: http
