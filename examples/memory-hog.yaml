apiVersion: v1
kind: Pod
metadata:
  name: memory-hog
  namespace: default
spec:
  containers:
  - name: stress
    image: polinux/stress
    command: ["stress"]
    args: ["--vm", "1", "--vm-bytes", "256M", "--vm-hang", "1"]
    resources:
      limits:
        memory: "512Mi"
      requests:
        memory: "256Mi"
