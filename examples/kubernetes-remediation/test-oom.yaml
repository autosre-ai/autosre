# Test pod that will trigger OOMKilled
apiVersion: v1
kind: Pod
metadata:
  name: oom-test
  namespace: default
  labels:
    app: oom-test
spec:
  containers:
    - name: stress
      image: polinux/stress
      resources:
        requests:
          memory: "64Mi"
        limits:
          memory: "128Mi"
      command: ["stress"]
      args: ["--vm", "1", "--vm-bytes", "256M", "--vm-hang", "1"]
