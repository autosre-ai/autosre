apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: bookstore
  labels:
    app: payment-service
    tier: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
        tier: api
    spec:
      containers:
      - name: payment
        image: python:3.11-alpine
        command: ["python", "-c"]
        args:
        - |
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import json
          import time
          import random
          
          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  if self.path == '/health':
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'OK')
                  elif self.path == '/ready':
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'READY')
                  else:
                      self.send_response(404)
                      self.end_headers()
                      
              def do_POST(self):
                  if self.path == '/process':
                      # Simulate payment processing
                      time.sleep(random.uniform(0.2, 1.0))
                      # 95% success rate
                      if random.random() < 0.95:
                          self.send_response(200)
                          self.send_header('Content-Type', 'application/json')
                          self.end_headers()
                          response = {"status": "approved", "transaction_id": f"TXN-{random.randint(10000, 99999)}"}
                      else:
                          self.send_response(402)
                          self.send_header('Content-Type', 'application/json')
                          self.end_headers()
                          response = {"status": "declined", "reason": "insufficient_funds"}
                      self.wfile.write(json.dumps(response).encode())
                  else:
                      self.send_response(404)
                      self.end_headers()
                      
              def log_message(self, format, *args):
                  print(f"[payment] {args[0]}")
          
          print("Payment service starting on port 8080...")
          HTTPServer(('0.0.0.0', 8080), Handler).serve_forever()
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: bookstore
  labels:
    app: payment-service
spec:
  type: ClusterIP
  selector:
    app: payment-service
  ports:
  - port: 8080
    targetPort: 8080
    name: http
