apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: catalog-service
  namespace: bookstore
  labels:
    app: catalog-service
    release: prometheus
spec:
  selector:
    matchLabels:
      app: catalog-service
  namespaceSelector:
    matchNames:
      - bookstore
  endpoints:
  - port: http
    path: /metrics
    interval: 15s
    scrapeTimeout: 10s
---
