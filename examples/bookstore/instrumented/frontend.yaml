apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: bookstore
  labels:
    app: frontend
    tier: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        tier: web
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9113"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: frontend
        image: nginx:alpine
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 15
        volumeMounts:
        - name: config
          mountPath: /usr/share/nginx/html
        - name: nginx-status-config
          mountPath: /etc/nginx/conf.d/status.conf
          subPath: status.conf
      - name: nginx-exporter
        image: nginx/nginx-prometheus-exporter:1.1
        args:
          - "-nginx.scrape-uri=http://localhost/nginx_status"
        ports:
        - containerPort: 9113
          name: metrics
        resources:
          requests:
            memory: "32Mi"
            cpu: "10m"
          limits:
            memory: "64Mi"
            cpu: "50m"
      volumes:
      - name: config
        configMap:
          name: frontend-config
      - name: nginx-status-config
        configMap:
          name: nginx-status-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: bookstore
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head><title>Bookstore</title></head>
    <body>
      <h1>📚 Bookstore Frontend</h1>
      <p>Welcome to the OpenSRE Demo Bookstore!</p>
      <ul>
        <li><a href="/api/catalog">Catalog Service</a></li>
        <li><a href="/api/checkout">Checkout Service</a></li>
        <li><a href="/api/payment">Payment Service</a></li>
      </ul>
    </body>
    </html>
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-status-config
  namespace: bookstore
data:
  status.conf: |
    server {
        listen 80;
        location /nginx_status {
            stub_status on;
            allow 127.0.0.1;
            deny all;
        }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: bookstore
  labels:
    app: frontend
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 80
    name: http
  - port: 9113
    targetPort: 9113
    name: metrics
