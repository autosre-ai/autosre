apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: bookstore
  labels:
    app: payment-service
    tier: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
        tier: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: payment
        image: python:3.11-alpine
        command: ["sh", "-c"]
        args:
        - |
          pip install --quiet prometheus_client && python -c '
          from http.server import HTTPServer, BaseHTTPRequestHandler
          from prometheus_client import Counter, Histogram, Gauge, generate_latest, CONTENT_TYPE_LATEST
          import json
          import time
          import random

          # Prometheus metrics
          REQUEST_COUNT = Counter("http_requests_total", "Total HTTP requests", ["method", "endpoint", "status"])
          REQUEST_LATENCY = Histogram("http_request_duration_seconds", "HTTP request latency", ["method", "endpoint"])
          PAYMENT_TOTAL = Counter("payment_transactions_total", "Total payment transactions", ["status"])
          PAYMENT_AMOUNT = Counter("payment_amount_total", "Total payment amount processed")
          UP = Gauge("up", "Service is up")
          UP.set(1)

          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  start_time = time.time()
                  
                  if self.path == "/metrics":
                      self.send_response(200)
                      self.send_header("Content-Type", CONTENT_TYPE_LATEST)
                      self.end_headers()
                      self.wfile.write(generate_latest())
                      return
                  
                  if self.path == "/health":
                      REQUEST_COUNT.labels(method="GET", endpoint="/health", status="200").inc()
                      REQUEST_LATENCY.labels(method="GET", endpoint="/health").observe(time.time() - start_time)
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b"OK")
                  elif self.path == "/ready":
                      REQUEST_COUNT.labels(method="GET", endpoint="/ready", status="200").inc()
                      REQUEST_LATENCY.labels(method="GET", endpoint="/ready").observe(time.time() - start_time)
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b"READY")
                  else:
                      REQUEST_COUNT.labels(method="GET", endpoint="other", status="404").inc()
                      REQUEST_LATENCY.labels(method="GET", endpoint="other").observe(time.time() - start_time)
                      self.send_response(404)
                      self.end_headers()

              def do_POST(self):
                  start_time = time.time()
                  
                  if self.path == "/process":
                      # Simulate payment processing
                      time.sleep(random.uniform(0.2, 1.0))
                      amount = random.uniform(10, 100)
                      
                      # 95% success rate
                      if random.random() < 0.95:
                          REQUEST_COUNT.labels(method="POST", endpoint="/process", status="200").inc()
                          REQUEST_LATENCY.labels(method="POST", endpoint="/process").observe(time.time() - start_time)
                          PAYMENT_TOTAL.labels(status="approved").inc()
                          PAYMENT_AMOUNT.inc(amount)
                          self.send_response(200)
                          self.send_header("Content-Type", "application/json")
                          self.end_headers()
                          response = {"status": "approved", "transaction_id": f"TXN-{random.randint(10000, 99999)}"}
                      else:
                          REQUEST_COUNT.labels(method="POST", endpoint="/process", status="402").inc()
                          REQUEST_LATENCY.labels(method="POST", endpoint="/process").observe(time.time() - start_time)
                          PAYMENT_TOTAL.labels(status="declined").inc()
                          self.send_response(402)
                          self.send_header("Content-Type", "application/json")
                          self.end_headers()
                          response = {"status": "declined", "reason": "insufficient_funds"}
                      self.wfile.write(json.dumps(response).encode())
                  else:
                      REQUEST_COUNT.labels(method="POST", endpoint="other", status="404").inc()
                      REQUEST_LATENCY.labels(method="POST", endpoint="other").observe(time.time() - start_time)
                      self.send_response(404)
                      self.end_headers()

              def log_message(self, format, *args):
                  print(f"[payment] {args[0]}")

          print("Payment service (instrumented) starting on port 8080...")
          HTTPServer(("0.0.0.0", 8080), Handler).serve_forever()
          '
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: bookstore
  labels:
    app: payment-service
spec:
  type: ClusterIP
  selector:
    app: payment-service
  ports:
  - port: 8080
    targetPort: 8080
    name: http
