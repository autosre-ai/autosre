apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
  namespace: bookstore
  labels:
    app: catalog-service
    tier: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: catalog-service
  template:
    metadata:
      labels:
        app: catalog-service
        tier: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: catalog
        image: python:3.11-alpine
        command: ["sh", "-c"]
        args:
        - |
          pip install --quiet prometheus_client && python -c '
          from http.server import HTTPServer, BaseHTTPRequestHandler
          from prometheus_client import Counter, Histogram, Gauge, generate_latest, CONTENT_TYPE_LATEST
          import json
          import time
          import threading
          import random

          # Prometheus metrics
          REQUEST_COUNT = Counter("http_requests_total", "Total HTTP requests", ["method", "endpoint", "status"])
          REQUEST_LATENCY = Histogram("http_request_duration_seconds", "HTTP request latency", ["method", "endpoint"])
          BOOKS_TOTAL = Gauge("catalog_books_total", "Total number of books in catalog")
          UP = Gauge("up", "Service is up")
          UP.set(1)

          books = [
            {"id": 1, "title": "Site Reliability Engineering", "author": "Google", "price": 49.99},
            {"id": 2, "title": "The Phoenix Project", "author": "Gene Kim", "price": 24.99},
            {"id": 3, "title": "Designing Data-Intensive Applications", "author": "Martin Kleppmann", "price": 44.99},
            {"id": 4, "title": "Kubernetes Up & Running", "author": "Kelsey Hightower", "price": 39.99},
          ]
          BOOKS_TOTAL.set(len(books))

          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  start_time = time.time()
                  
                  if self.path == "/metrics":
                      self.send_response(200)
                      self.send_header("Content-Type", CONTENT_TYPE_LATEST)
                      self.end_headers()
                      self.wfile.write(generate_latest())
                      return
                  
                  if self.path == "/health":
                      REQUEST_COUNT.labels(method="GET", endpoint="/health", status="200").inc()
                      REQUEST_LATENCY.labels(method="GET", endpoint="/health").observe(time.time() - start_time)
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b"OK")
                  elif self.path == "/ready":
                      REQUEST_COUNT.labels(method="GET", endpoint="/ready", status="200").inc()
                      REQUEST_LATENCY.labels(method="GET", endpoint="/ready").observe(time.time() - start_time)
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b"READY")
                  elif self.path.startswith("/books"):
                      # Simulate some latency variation
                      time.sleep(random.uniform(0.01, 0.05))
                      REQUEST_COUNT.labels(method="GET", endpoint="/books", status="200").inc()
                      REQUEST_LATENCY.labels(method="GET", endpoint="/books").observe(time.time() - start_time)
                      self.send_response(200)
                      self.send_header("Content-Type", "application/json")
                      self.end_headers()
                      self.wfile.write(json.dumps(books).encode())
                  else:
                      REQUEST_COUNT.labels(method="GET", endpoint="other", status="404").inc()
                      REQUEST_LATENCY.labels(method="GET", endpoint="other").observe(time.time() - start_time)
                      self.send_response(404)
                      self.end_headers()

              def log_message(self, format, *args):
                  print(f"[catalog] {args[0]}")

          print("Catalog service (instrumented) starting on port 8080...")
          HTTPServer(("0.0.0.0", 8080), Handler).serve_forever()
          '
        ports:
        - containerPort: 8080
          name: http
        - containerPort: 9090
          name: metrics
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-service
  namespace: bookstore
  labels:
    app: catalog-service
spec:
  type: ClusterIP
  selector:
    app: catalog-service
  ports:
  - port: 8080
    targetPort: 8080
    name: http
  - port: 9090
    targetPort: 8080
    name: metrics
