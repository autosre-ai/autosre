apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout-service
  namespace: bookstore
  labels:
    app: checkout-service
    tier: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: checkout-service
  template:
    metadata:
      labels:
        app: checkout-service
        tier: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: checkout
        image: python:3.11-alpine
        command: ["sh", "-c"]
        args:
        - |
          pip install --quiet prometheus_client && python -c '
          from http.server import HTTPServer, BaseHTTPRequestHandler
          from prometheus_client import Counter, Histogram, Gauge, generate_latest, CONTENT_TYPE_LATEST
          import json
          import time
          import random

          # Prometheus metrics
          REQUEST_COUNT = Counter("http_requests_total", "Total HTTP requests", ["method", "endpoint", "status"])
          REQUEST_LATENCY = Histogram("http_request_duration_seconds", "HTTP request latency", ["method", "endpoint"])
          CHECKOUT_TOTAL = Counter("checkout_orders_total", "Total checkout orders", ["status"])
          UP = Gauge("up", "Service is up")
          UP.set(1)

          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  start_time = time.time()
                  
                  if self.path == "/metrics":
                      self.send_response(200)
                      self.send_header("Content-Type", CONTENT_TYPE_LATEST)
                      self.end_headers()
                      self.wfile.write(generate_latest())
                      return
                  
                  if self.path == "/health":
                      REQUEST_COUNT.labels(method="GET", endpoint="/health", status="200").inc()
                      REQUEST_LATENCY.labels(method="GET", endpoint="/health").observe(time.time() - start_time)
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b"OK")
                  elif self.path == "/ready":
                      REQUEST_COUNT.labels(method="GET", endpoint="/ready", status="200").inc()
                      REQUEST_LATENCY.labels(method="GET", endpoint="/ready").observe(time.time() - start_time)
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b"READY")
                  else:
                      REQUEST_COUNT.labels(method="GET", endpoint="other", status="404").inc()
                      REQUEST_LATENCY.labels(method="GET", endpoint="other").observe(time.time() - start_time)
                      self.send_response(404)
                      self.end_headers()

              def do_POST(self):
                  start_time = time.time()
                  
                  if self.path == "/checkout":
                      # Simulate processing time
                      time.sleep(random.uniform(0.1, 0.5))
                      REQUEST_COUNT.labels(method="POST", endpoint="/checkout", status="200").inc()
                      REQUEST_LATENCY.labels(method="POST", endpoint="/checkout").observe(time.time() - start_time)
                      CHECKOUT_TOTAL.labels(status="success").inc()
                      self.send_response(200)
                      self.send_header("Content-Type", "application/json")
                      self.end_headers()
                      response = {"status": "success", "order_id": f"ORD-{random.randint(1000, 9999)}"}
                      self.wfile.write(json.dumps(response).encode())
                  else:
                      REQUEST_COUNT.labels(method="POST", endpoint="other", status="404").inc()
                      REQUEST_LATENCY.labels(method="POST", endpoint="other").observe(time.time() - start_time)
                      self.send_response(404)
                      self.end_headers()

              def log_message(self, format, *args):
                  print(f"[checkout] {args[0]}")

          print("Checkout service (instrumented) starting on port 8080...")
          HTTPServer(("0.0.0.0", 8080), Handler).serve_forever()
          '
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: checkout-service
  namespace: bookstore
  labels:
    app: checkout-service
spec:
  type: ClusterIP
  selector:
    app: checkout-service
  ports:
  - port: 8080
    targetPort: 8080
    name: http
