# Cache Miss Storm
# Simulates thundering herd after cache invalidation
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service-cache-miss-storm
  namespace: bookstore
  labels:
    app: catalog-service
    tier: api
    fault: cache-miss-storm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-service
  template:
    metadata:
      labels:
        app: catalog-service
        tier: api
        fault: cache-miss-storm
    spec:
      containers:
      - name: catalog
        image: python:3.11-alpine
        env:
        - name: FAULT_MODE
          value: "cache-miss-storm"
        - name: MISS_RATE
          value: "0.9"
        - name: DB_QUERY_TIME_MS
          value: "500"
        command: ["python", "-c"]
        args:
        - |
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import json
          import random
          import time
          import os
          
          MISS_RATE = float(os.environ.get('MISS_RATE', 0.9))
          DB_QUERY = int(os.environ.get('DB_QUERY_TIME_MS', 500)) / 1000
          
          cache_hits = 0
          cache_misses = 0
          db_queries = 0
          
          class Handler(BaseHTTPRequestHandler):
              global cache_hits, cache_misses, db_queries
              
              def do_GET(self):
                  global cache_hits, cache_misses, db_queries
                  
                  if self.path in ['/health', '/ready']:
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'OK')
                      return
                  
                  is_miss = random.random() < MISS_RATE
                  
                  if is_miss:
                      cache_misses += 1
                      db_queries += 1
                      
                      # Everyone hitting the database
                      query_time = DB_QUERY * (1 + (db_queries % 10) * 0.2)  # Degradation
                      print(f"[cache-miss] MISS - querying DB (concurrent: {db_queries % 50}, time: {query_time:.2f}s)")
                      time.sleep(query_time)
                  else:
                      cache_hits += 1
                  
                  total = cache_hits + cache_misses
                  hit_rate = (cache_hits / total * 100) if total > 0 else 0
                  
                  self.send_response(200)
                  self.send_header('Content-Type', 'application/json')
                  self.send_header('X-Cache', 'HIT' if not is_miss else 'MISS')
                  self.send_header('X-Cache-Hit-Rate', f'{hit_rate:.1f}%')
                  self.end_headers()
                  response = {
                      "books": [],
                      "cache_stats": {
                          "hit": not is_miss,
                          "hits": cache_hits,
                          "misses": cache_misses,
                          "hit_rate_percent": hit_rate,
                          "db_queries_total": db_queries,
                          "warning": "Cache miss storm detected - hit rate critically low" if hit_rate < 20 else None,
                          "suggestion": "Implement cache warming or request coalescing"
                      }
                  }
                  self.wfile.write(json.dumps(response).encode())
                      
              def do_POST(self):
                  return self.do_GET()
                  
              def log_message(self, format, *args):
                  print(f"[catalog-cache] {args[0]}")
          
          print(f"Catalog service (CACHE MISS STORM) starting - miss_rate={MISS_RATE}")
          HTTPServer(('0.0.0.0', 8080), Handler).serve_forever()
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
