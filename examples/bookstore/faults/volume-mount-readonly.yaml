# Scenario: Read-Only Volume Mount Write Attempt
# Expected: OpenSRE detects application errors writing to read-only filesystem
# Remediation: Change volume mount to readOnly: false, use emptyDir for temp
# Root Cause: Application tries to write to a read-only mounted volume
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config-readonly
  namespace: bookstore
  labels:
    fault: volume-mount-readonly
data:
  config.yaml: |
    app_name: bookstore
    version: 1.0.0
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-writer-readonly-vol
  namespace: bookstore
  labels:
    app: config-writer
    tier: api
    fault: volume-mount-readonly
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-writer
      fault: volume-mount-readonly
  template:
    metadata:
      labels:
        app: config-writer
        tier: api
        fault: volume-mount-readonly
    spec:
      containers:
      - name: writer
        image: python:3.11-alpine
        command: ["python", "-c"]
        args:
        - |
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import os
          import json
          
          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  if self.path == '/health':
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'OK')
                  elif self.path == '/ready':
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'READY')
                  else:
                      self.send_response(404)
                      self.end_headers()
              
              def do_POST(self):
                  if self.path == '/update-config':
                      try:
                          # Try to write to read-only mounted volume
                          with open('/etc/app-config/config.yaml', 'w') as f:
                              f.write("updated: true")
                          self.send_response(200)
                          self.end_headers()
                          self.wfile.write(b'Config updated')
                      except PermissionError as e:
                          print(f"[RO-VOLUME] Cannot write to read-only volume: {e}")
                          self.send_response(500)
                          self.send_header('Content-Type', 'application/json')
                          self.end_headers()
                          error = {"error": "READ_ONLY_FILESYSTEM",
                                   "message": "Cannot write config - volume is read-only",
                                   "path": "/etc/app-config/config.yaml"}
                          self.wfile.write(json.dumps(error).encode())
                      except OSError as e:
                          print(f"[ERROR] OS error: {e}")
                          self.send_response(500)
                          self.end_headers()
                          self.wfile.write(str(e).encode())
                  else:
                      self.send_response(404)
                      self.end_headers()
              
              def log_message(self, format, *args):
                  print(f"[config-writer] {args[0]}")
          
          print("Config writer service starting on port 8080...")
          print("[WARN] /etc/app-config is read-only - writes will fail")
          HTTPServer(('0.0.0.0', 8080), Handler).serve_forever()
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        volumeMounts:
        - name: config
          mountPath: /etc/app-config
          readOnly: true  # This causes the issue
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
      volumes:
      - name: config
        configMap:
          name: app-config-readonly
