# WebSocket Disconnect
# Simulates frequent WebSocket connection drops
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notifications-service-ws-disconnect
  namespace: bookstore
  labels:
    app: notifications-service
    tier: api
    fault: websocket-disconnect
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notifications-service
  template:
    metadata:
      labels:
        app: notifications-service
        tier: api
        fault: websocket-disconnect
    spec:
      containers:
      - name: notifications
        image: python:3.11-alpine
        env:
        - name: FAULT_MODE
          value: "websocket-disconnect"
        - name: DISCONNECT_RATE
          value: "0.5"
        - name: MAX_CONNECTION_DURATION_SECONDS
          value: "10"
        command: ["python", "-c"]
        args:
        - |
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import json
          import random
          import os
          
          DISCONNECT_RATE = float(os.environ.get('DISCONNECT_RATE', 0.5))
          MAX_CONN_DURATION = int(os.environ.get('MAX_CONNECTION_DURATION_SECONDS', 10))
          
          connection_count = 0
          disconnect_count = 0
          
          class Handler(BaseHTTPRequestHandler):
              global connection_count, disconnect_count
              
              def do_GET(self):
                  global connection_count, disconnect_count
                  
                  if self.path in ['/health', '/ready']:
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'OK')
                      return
                  
                  if self.path == '/ws' or 'upgrade' in self.headers.get('Connection', '').lower():
                      connection_count += 1
                      
                      if random.random() < DISCONNECT_RATE:
                          disconnect_count += 1
                          disconnect_code = random.choice([1001, 1006, 1011, 1012, 1013])
                          disconnect_reasons = {
                              1001: "Going Away - server shutting down",
                              1006: "Abnormal Closure - connection lost",
                              1011: "Internal Error - unexpected condition",
                              1012: "Service Restart - reconnect in a moment",
                              1013: "Try Again Later - server overloaded"
                          }
                          
                          print(f"[websocket] Connection dropped: {disconnect_code} - {disconnect_reasons[disconnect_code]}")
                          
                          self.send_response(503)
                          self.send_header('Content-Type', 'application/json')
                          self.end_headers()
                          error = {
                              "error": "WebSocketDisconnected",
                              "close_code": disconnect_code,
                              "reason": disconnect_reasons[disconnect_code],
                              "details": {
                                  "connection_id": f"ws-{random.randint(10000, 99999)}",
                                  "connected_duration_seconds": random.randint(1, MAX_CONN_DURATION),
                                  "total_connections": connection_count,
                                  "total_disconnects": disconnect_count,
                                  "disconnect_rate": f"{(disconnect_count/max(1,connection_count))*100:.1f}%"
                              },
                              "suggestion": "Implement reconnection with exponential backoff"
                          }
                          self.wfile.write(json.dumps(error).encode())
                      else:
                          self.send_response(101)  # Switching Protocols
                          self.send_header('Upgrade', 'websocket')
                          self.send_header('Connection', 'Upgrade')
                          self.end_headers()
                  else:
                      self.send_response(200)
                      self.send_header('Content-Type', 'application/json')
                      self.end_headers()
                      self.wfile.write(json.dumps({"websocket_endpoint": "/ws"}).encode())
                      
              def log_message(self, format, *args):
                  print(f"[notifications-ws] {args[0]}")
          
          print(f"Notifications service (WS DISCONNECT) starting - rate={DISCONNECT_RATE}")
          HTTPServer(('0.0.0.0', 8080), Handler).serve_forever()
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
