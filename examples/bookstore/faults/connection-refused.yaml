# Scenario: Connection Refused
# Expected: OpenSRE detects connection refused errors in logs
# Remediation: Verify target port, check if service is running, firewall rules
# Root Cause: Target service not listening on expected port
apiVersion: apps/v1
kind: Deployment
metadata:
  name: review-service-connection-refused
  namespace: bookstore
  labels:
    app: review-service
    tier: api
    fault: connection-refused
spec:
  replicas: 1
  selector:
    matchLabels:
      app: review-service
      fault: connection-refused
  template:
    metadata:
      labels:
        app: review-service
        tier: api
        fault: connection-refused
    spec:
      containers:
      - name: review
        image: python:3.11-alpine
        command: ["python", "-c"]
        args:
        - |
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import urllib.request
          import socket
          import json
          
          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  if self.path == '/health':
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'OK')
                  elif self.path == '/ready':
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'READY')
                  elif self.path.startswith('/reviews'):
                      try:
                          # Connect to localhost on wrong port (nothing listening)
                          response = urllib.request.urlopen(
                              'http://127.0.0.1:9999/moderation',  # Nothing listening here
                              timeout=5
                          )
                          self.send_response(200)
                          self.end_headers()
                          self.wfile.write(b'OK')
                      except ConnectionRefusedError as e:
                          print(f"[CONN-REFUSED] Connection refused on port 9999: {e}")
                          self.send_response(503)
                          self.send_header('Content-Type', 'application/json')
                          self.end_headers()
                          error = {"error": "CONNECTION_REFUSED",
                                   "message": "Moderation service refused connection",
                                   "detail": "No process listening on port 9999"}
                          self.wfile.write(json.dumps(error).encode())
                      except Exception as e:
                          print(f"[ERROR] {type(e).__name__}: {e}")
                          self.send_response(503)
                          self.send_header('Content-Type', 'application/json')
                          self.end_headers()
                          error = {"error": "CONNECTION_FAILED", "message": str(e)}
                          self.wfile.write(json.dumps(error).encode())
                  else:
                      self.send_response(404)
                      self.end_headers()
              def log_message(self, format, *args):
                  print(f"[review-service] {args[0]}")
          
          print("Review service (CONN-REFUSED variant) starting on port 8080...")
          print("[WARN] Will get connection refused when calling moderation service")
          HTTPServer(('0.0.0.0', 8080), Handler).serve_forever()
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
