# Database Authentication Failed
# Simulates wrong database credentials or expired passwords
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service-db-auth-failed
  namespace: bookstore
  labels:
    app: catalog-service
    tier: api
    fault: db-authentication-failed
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-service
  template:
    metadata:
      labels:
        app: catalog-service
        tier: api
        fault: db-authentication-failed
    spec:
      containers:
      - name: catalog
        image: python:3.11-alpine
        env:
        - name: FAULT_MODE
          value: "db-authentication-failed"
        - name: DB_USER
          value: "catalog_service"
        - name: AUTH_FAILURE_RATE
          value: "1.0"
        command: ["python", "-c"]
        args:
        - |
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import json
          import os
          
          DB_USER = os.environ.get('DB_USER', 'catalog_service')
          AUTH_FAILURE_RATE = float(os.environ.get('AUTH_FAILURE_RATE', 1.0))
          
          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  if self.path == '/health':
                      # Health check passes (app is running)
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'OK')
                      return
                  
                  if self.path == '/ready':
                      # Ready check fails - can't connect to DB
                      self.send_response(503)
                      self.end_headers()
                      self.wfile.write(b'Database connection failed')
                      return
                  
                  print(f"[db-auth] FATAL: password authentication failed for user '{DB_USER}'")
                  
                  self.send_response(500)
                  self.send_header('Content-Type', 'application/json')
                  self.end_headers()
                  error = {
                      "error": "DatabaseAuthenticationFailed",
                      "code": "28P01",
                      "message": f"password authentication failed for user \"{DB_USER}\"",
                      "details": {
                          "user": DB_USER,
                          "host": "postgres-primary.bookstore.svc.cluster.local",
                          "database": "bookstore",
                          "ssl_enabled": True
                      },
                      "suggestion": "Verify DB_PASSWORD secret and check password policy expiration"
                  }
                  self.wfile.write(json.dumps(error).encode())
                      
              def do_POST(self):
                  return self.do_GET()
                  
              def log_message(self, format, *args):
                  print(f"[catalog-db-auth] {args[0]}")
          
          print(f"Catalog service (DB AUTH FAILED) starting - simulating auth failure for user '{DB_USER}'")
          HTTPServer(('0.0.0.0', 8080), Handler).serve_forever()
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
