# Idempotency Violation
# Simulates duplicate processing of the same request
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service-idempotency
  namespace: bookstore
  labels:
    app: payment-service
    tier: api
    fault: idempotency-violation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
        tier: api
        fault: idempotency-violation
    spec:
      containers:
      - name: payment
        image: python:3.11-alpine
        env:
        - name: FAULT_MODE
          value: "idempotency-violation"
        - name: DUPLICATE_RATE
          value: "0.4"
        command: ["python", "-c"]
        args:
        - |
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import json
          import random
          import os
          
          DUPLICATE_RATE = float(os.environ.get('DUPLICATE_RATE', 0.4))
          
          processed_requests = {}
          
          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  if self.path in ['/health', '/ready']:
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'OK')
                      return
                  
                  self.send_response(200)
                  self.send_header('Content-Type', 'application/json')
                  self.end_headers()
                  self.wfile.write(json.dumps({"status": "ok"}).encode())
                      
              def do_POST(self):
                  idempotency_key = self.headers.get('Idempotency-Key', f'auto-{random.randint(1000,9999)}')
                  
                  if random.random() < DUPLICATE_RATE:
                      # Simulate processing same request twice
                      if idempotency_key not in processed_requests:
                          processed_requests[idempotency_key] = {
                              "processed_at": "2024-01-15T12:25:00Z",
                              "amount": random.randint(1000, 10000) / 100
                          }
                      
                      original = processed_requests[idempotency_key]
                      print(f"[idempotency] DUPLICATE: key={idempotency_key} - charged customer twice!")
                      
                      self.send_response(200)  # Processed again!
                      self.send_header('Content-Type', 'application/json')
                      self.end_headers()
                      error = {
                          "error": "IdempotencyViolation",
                          "message": "Request was processed multiple times",
                          "warning": "CRITICAL: Customer may have been charged twice!",
                          "details": {
                              "idempotency_key": idempotency_key,
                              "original_processing": original,
                              "duplicate_processing": {
                                  "processed_at": "2024-01-15T12:30:00Z",
                                  "amount": original['amount']
                              },
                              "total_charged": original['amount'] * 2
                          },
                          "suggestion": "Implement proper idempotency key checking before processing"
                      }
                      self.wfile.write(json.dumps(error).encode())
                  else:
                      self.send_response(200)
                      self.send_header('Content-Type', 'application/json')
                      self.end_headers()
                      self.wfile.write(json.dumps({
                          "status": "success",
                          "idempotency_key": idempotency_key
                      }).encode())
                  
              def log_message(self, format, *args):
                  print(f"[payment-idemp] {args[0]}")
          
          print(f"Payment service (IDEMPOTENCY) starting - duplicate_rate={DUPLICATE_RATE}")
          HTTPServer(('0.0.0.0', 8080), Handler).serve_forever()
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
