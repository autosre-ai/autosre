# HTTP 429 Rate Limited
# Simulates hitting rate limits on API endpoints
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway-http-429
  namespace: bookstore
  labels:
    app: api-gateway
    tier: api
    fault: http-429-rate-limited
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        tier: api
        fault: http-429-rate-limited
    spec:
      containers:
      - name: gateway
        image: python:3.11-alpine
        env:
        - name: FAULT_MODE
          value: "http-429-rate-limited"
        - name: RATE_LIMIT_RATE
          value: "0.7"
        - name: REQUESTS_PER_MINUTE
          value: "100"
        command: ["python", "-c"]
        args:
        - |
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import json
          import random
          import os
          
          RATE_LIMIT_RATE = float(os.environ.get('RATE_LIMIT_RATE', 0.7))
          RPM = int(os.environ.get('REQUESTS_PER_MINUTE', 100))
          
          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  if self.path in ['/health', '/ready']:
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'OK')
                      return
                  
                  remaining = random.randint(0, 5)
                  reset_seconds = random.randint(10, 60)
                  
                  if random.random() < RATE_LIMIT_RATE:
                      print(f"[http-429] Rate limit exceeded - limit={RPM}/min")
                      
                      self.send_response(429)
                      self.send_header('Content-Type', 'application/json')
                      self.send_header('Retry-After', str(reset_seconds))
                      self.send_header('X-RateLimit-Limit', str(RPM))
                      self.send_header('X-RateLimit-Remaining', '0')
                      self.send_header('X-RateLimit-Reset', str(reset_seconds))
                      self.end_headers()
                      error = {
                          "error": "TooManyRequests",
                          "message": "Rate limit exceeded. Please slow down.",
                          "details": {
                              "limit": RPM,
                              "window": "1m",
                              "remaining": 0,
                              "reset_in_seconds": reset_seconds,
                              "client_ip": "10.0.0.50",
                              "api_key": "sk-***redacted***"
                          },
                          "suggestion": "Implement exponential backoff or upgrade rate limit tier"
                      }
                      self.wfile.write(json.dumps(error).encode())
                  else:
                      self.send_response(200)
                      self.send_header('Content-Type', 'application/json')
                      self.send_header('X-RateLimit-Limit', str(RPM))
                      self.send_header('X-RateLimit-Remaining', str(remaining))
                      self.end_headers()
                      self.wfile.write(json.dumps({"status": "ok"}).encode())
                      
              def do_POST(self):
                  return self.do_GET()
                  
              def log_message(self, format, *args):
                  print(f"[api-429] {args[0]}")
          
          print(f"API Gateway (HTTP 429) starting - rate_limit_rate={RATE_LIMIT_RATE}, rpm={RPM}")
          HTTPServer(('0.0.0.0', 8080), Handler).serve_forever()
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
