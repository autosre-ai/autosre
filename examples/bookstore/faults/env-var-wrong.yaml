# Scenario: Wrong Environment Variable Configuration
# Expected: OpenSRE detects application crash due to invalid config
# Remediation: Fix environment variable values, validate config format
# Root Cause: Application crashes because config values are invalid/wrong type
apiVersion: v1
kind: ConfigMap
metadata:
  name: catalog-bad-config
  namespace: bookstore
  labels:
    fault: env-var-wrong
data:
  # Invalid configuration values
  database_url: "not-a-valid-url"
  cache_ttl: "not-a-number"
  max_connections: "-5"  # Negative number
  log_level: "INVALID_LEVEL"
  feature_flags: "{invalid json"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service-env-wrong
  namespace: bookstore
  labels:
    app: catalog-service
    tier: api
    fault: env-var-wrong
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-service
      fault: env-var-wrong
  template:
    metadata:
      labels:
        app: catalog-service
        tier: api
        fault: env-var-wrong
    spec:
      containers:
      - name: catalog
        image: python:3.11-alpine
        command: ["python", "-c"]
        args:
        - |
          import os
          import sys
          import json
          
          print("Catalog service starting...")
          print("Loading configuration from environment...")
          
          # Validate DATABASE_URL
          db_url = os.environ.get('DATABASE_URL', '')
          if not db_url.startswith(('postgres://', 'mysql://', 'mongodb://')):
              print(f"[FATAL] Invalid DATABASE_URL format: {db_url}")
              print("[FATAL] Expected: postgres://user:pass@host:port/db")
              sys.exit(1)
          
          # Validate CACHE_TTL as integer
          try:
              cache_ttl = int(os.environ.get('CACHE_TTL', '300'))
              if cache_ttl < 0:
                  raise ValueError("CACHE_TTL must be positive")
          except ValueError as e:
              print(f"[FATAL] Invalid CACHE_TTL: {e}")
              sys.exit(1)
          
          # Validate MAX_CONNECTIONS
          try:
              max_conn = int(os.environ.get('MAX_CONNECTIONS', '10'))
              if max_conn <= 0:
                  print(f"[FATAL] MAX_CONNECTIONS must be positive, got: {max_conn}")
                  sys.exit(1)
          except ValueError as e:
              print(f"[FATAL] Invalid MAX_CONNECTIONS: {e}")
              sys.exit(1)
          
          # Validate FEATURE_FLAGS as JSON
          try:
              flags = json.loads(os.environ.get('FEATURE_FLAGS', '{}'))
          except json.JSONDecodeError as e:
              print(f"[FATAL] Invalid FEATURE_FLAGS JSON: {e}")
              sys.exit(1)
          
          print("Configuration validated successfully!")
        ports:
        - containerPort: 8080
          name: http
        envFrom:
        - configMapRef:
            name: catalog-bad-config
        env:
        - name: DATABASE_URL
          valueFrom:
            configMapKeyRef:
              name: catalog-bad-config
              key: database_url
        - name: CACHE_TTL
          valueFrom:
            configMapKeyRef:
              name: catalog-bad-config
              key: cache_ttl
        - name: MAX_CONNECTIONS
          valueFrom:
            configMapKeyRef:
              name: catalog-bad-config
              key: max_connections
        - name: FEATURE_FLAGS
          valueFrom:
            configMapKeyRef:
              name: catalog-bad-config
              key: feature_flags
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
---
# Expected: Pod enters CrashLoopBackOff as app fails validation
