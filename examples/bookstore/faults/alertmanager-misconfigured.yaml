# Scenario: Alertmanager Misconfigured - Alerts Not Firing
# Category: Observability Infrastructure
# Severity: High
# Description: Alertmanager configuration error causing alerts to not be delivered

apiVersion: opensre.io/v1alpha1
kind: FaultScenario
metadata:
  name: alertmanager-misconfigured
  labels:
    category: observability-infrastructure
    severity: high
    component: alertmanager
spec:
  description: |
    Alertmanager is misconfigured. Alerts are being generated by Prometheus
    but not being delivered to notification channels (Slack, PagerDuty, etc.).
    
  symptoms:
    - type: alertmanager-status
      status: "Running"
      alerts_received: 50
      notifications_sent: 0
    - type: notification-channel
      description: "No alerts in Slack/PagerDuty"
    - type: prometheus-alerts
      description: "Alerts firing in Prometheus UI"
      
  affectedResources:
    - kind: Alertmanager
      name: alertmanager-main
      namespace: monitoring
    - kind: Secret
      name: alertmanager-main
      description: "Configuration secret"
        
  metrics:
    - name: alertmanager_alerts_received_total
      rate: 10
    - name: alertmanager_notifications_total
      rate: 0  # Nothing sent
    - name: alertmanager_notifications_failed_total
      rate: 10
    - name: alertmanager_config_last_reload_successful
      value: 0  # Config reload failed
      
  logs:
    - source: alertmanager
      level: error
      patterns:
        - "failed to send notification"
        - "invalid configuration"
        - "route not found"
    - source: alertmanager
      level: warning
      patterns:
        - "no receivers match"
        - "integration returned HTTP error"
        
  rootCause:
    component: alertmanager
    type: misconfiguration
    details: |
      Alertmanager misconfiguration. Common causes:
      - Route configuration doesn't match alerts
      - Receiver credentials invalid
      - Slack webhook URL wrong
      - PagerDuty integration key expired
      - Inhibit rules too broad
      - Silences covering all alerts
      - Config syntax error (YAML)
      
  remediation:
    steps:
      - action: check-alertmanager-config
        command: "kubectl get secret alertmanager-main -n monitoring -o jsonpath='{.data.alertmanager\\.yaml}' | base64 -d"
        description: "View Alertmanager configuration"
      - action: check-config-status
        command: "curl -s http://alertmanager:9093/api/v1/status | jq '.data.config'"
        description: "Check loaded configuration"
      - action: check-alerts
        command: "curl -s http://alertmanager:9093/api/v1/alerts | jq"
        description: "List alerts in Alertmanager"
      - action: check-silences
        command: "curl -s http://alertmanager:9093/api/v1/silences | jq '.data[] | select(.status.state==\"active\")'"
        description: "Check for active silences"
      - action: test-notification
        command: "amtool alert add alertname=Test severity=critical"
        description: "Send test alert"
      - action: fix-config
        command: "kubectl create secret generic alertmanager-main --from-file=alertmanager.yaml -n monitoring --dry-run=client -o yaml | kubectl apply -f -"
        description: "Apply fixed configuration"
    
  detection:
    promql: 'alertmanager_notifications_failed_total > 0 or alertmanager_config_last_reload_successful == 0'
    alertName: AlertmanagerConfigError
    severity: warning
