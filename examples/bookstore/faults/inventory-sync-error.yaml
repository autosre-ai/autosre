# Inventory Sync Error
# Simulates stock quantity mismatch between systems
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service-sync-error
  namespace: bookstore
  labels:
    app: inventory-service
    tier: api
    fault: inventory-sync-error
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
        tier: api
        fault: inventory-sync-error
    spec:
      containers:
      - name: inventory
        image: python:3.11-alpine
        env:
        - name: FAULT_MODE
          value: "inventory-sync-error"
        - name: SYNC_ERROR_RATE
          value: "0.5"
        command: ["python", "-c"]
        args:
        - |
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import json
          import random
          import os
          
          SYNC_ERROR_RATE = float(os.environ.get('SYNC_ERROR_RATE', 0.5))
          
          # Simulated inventory with sync issues
          INVENTORY = {
              "BOOK-001": {"db_qty": 100, "cache_qty": 150, "warehouse_qty": 80},
              "BOOK-002": {"db_qty": 0, "cache_qty": 25, "warehouse_qty": 0},
              "BOOK-003": {"db_qty": 50, "cache_qty": 50, "warehouse_qty": 45},
          }
          
          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  if self.path in ['/health', '/ready']:
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'OK')
                      return
                  
                  sku = random.choice(list(INVENTORY.keys()))
                  item = INVENTORY[sku]
                  
                  if random.random() < SYNC_ERROR_RATE:
                      print(f"[inventory] SYNC ERROR: {sku} - db={item['db_qty']}, cache={item['cache_qty']}, warehouse={item['warehouse_qty']}")
                      
                      self.send_response(409)  # Conflict
                      self.send_header('Content-Type', 'application/json')
                      self.end_headers()
                      error = {
                          "error": "InventorySyncError",
                          "message": "Inventory quantities out of sync",
                          "sku": sku,
                          "details": {
                              "database_quantity": item['db_qty'],
                              "cache_quantity": item['cache_qty'],
                              "warehouse_quantity": item['warehouse_qty'],
                              "discrepancy": abs(item['db_qty'] - item['warehouse_qty']),
                              "last_sync": "2024-01-15T10:30:00Z",
                              "sync_status": "FAILED"
                          },
                          "suggestion": "Trigger inventory reconciliation job"
                      }
                      self.wfile.write(json.dumps(error).encode())
                  else:
                      self.send_response(200)
                      self.send_header('Content-Type', 'application/json')
                      self.end_headers()
                      self.wfile.write(json.dumps({
                          "sku": sku,
                          "quantity": item['db_qty'],
                          "available": item['db_qty'] > 0
                      }).encode())
                      
              def do_POST(self):
                  return self.do_GET()
                  
              def log_message(self, format, *args):
                  print(f"[inventory-sync] {args[0]}")
          
          print(f"Inventory service (SYNC ERROR) starting - error_rate={SYNC_ERROR_RATE}")
          HTTPServer(('0.0.0.0', 8080), Handler).serve_forever()
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
