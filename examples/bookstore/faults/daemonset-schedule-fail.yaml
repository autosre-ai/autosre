# Scenario: DaemonSet Node Scheduling Issue
# Expected: OpenSRE detects DaemonSet pods not running on all nodes
# Remediation: Fix node selector, remove taints, adjust tolerations
# Root Cause: DaemonSet can't schedule on nodes due to taints/selectors
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: monitoring-agent-schedule-fail
  namespace: bookstore
  labels:
    app: monitoring-agent
    tier: infrastructure
    fault: daemonset-schedule-fail
spec:
  selector:
    matchLabels:
      app: monitoring-agent
      fault: daemonset-schedule-fail
  template:
    metadata:
      labels:
        app: monitoring-agent
        tier: infrastructure
        fault: daemonset-schedule-fail
    spec:
      # Node selector that won't match most nodes
      nodeSelector:
        monitoring-enabled: "true"
        node-role: "worker"
      # Missing tolerations for common taints
      # tolerations:
      # - key: "node-role.kubernetes.io/master"
      #   effect: "NoSchedule"
      containers:
      - name: agent
        image: python:3.11-alpine
        command: ["python", "-c"]
        args:
        - |
          import time
          import os
          
          node = os.environ.get('NODE_NAME', 'unknown')
          print(f"Monitoring agent starting on node: {node}")
          
          while True:
              print(f"[{node}] Collecting metrics...")
              time.sleep(30)
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        volumeMounts:
        - name: proc
          mountPath: /host/proc
          readOnly: true
      volumes:
      - name: proc
        hostPath:
          path: /proc
---
# Expected: DaemonSet shows DESIRED != CURRENT
# kubectl get daemonset:
# NAME                DESIRED   CURRENT   READY   UP-TO-DATE   AVAILABLE
# monitoring-agent    0         0         0       0            0
#
# Or partial scheduling:
# monitoring-agent    3         1         1       1            1
#
# Nodes missing label 'monitoring-enabled=true' won't get pods
