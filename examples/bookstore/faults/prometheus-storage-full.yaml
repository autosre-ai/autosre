# Scenario: Prometheus Storage Full - TSDB Full
# Category: Observability Infrastructure
# Severity: High
# Description: Prometheus TSDB storage is full, ingestion stopped

apiVersion: opensre.io/v1alpha1
kind: FaultScenario
metadata:
  name: prometheus-storage-full
  labels:
    category: observability-infrastructure
    severity: high
    component: prometheus
spec:
  description: |
    Prometheus TSDB storage volume is full. New samples cannot be
    ingested and Prometheus may crash or become read-only.
    
  symptoms:
    - type: prometheus-status
      error: "no space left on device"
    - type: metric-gap
      description: "Metrics stop at specific timestamp"
    - type: dashboard-behavior
      description: "Recent data missing from dashboards"
      
  affectedResources:
    - kind: PersistentVolumeClaim
      name: prometheus-data
      namespace: monitoring
      usage: 100%
    - kind: StatefulSet
      name: prometheus
      status: "Degraded"
        
  metrics:
    - name: prometheus_tsdb_storage_blocks_bytes
      value: 107374182400  # 100GB
    - name: kubelet_volume_stats_available_bytes
      labels:
        persistentvolumeclaim: prometheus-data
      value: 0
    - name: prometheus_tsdb_head_samples_appended_total
      rate: 0  # Stopped ingesting
      
  logs:
    - source: prometheus
      level: error
      patterns:
        - "no space left on device"
        - "WAL write failed"
        - "compaction failed"
    - source: prometheus
      level: warning
      patterns:
        - "storage retention limit reached"
        - "deleting oldest blocks"
        
  rootCause:
    component: prometheus-storage
    type: resource-exhaustion
    details: |
      TSDB storage full. Common causes:
      - Retention period too long
      - Cardinality explosion (too many series)
      - PVC too small for workload
      - Compaction failing
      - WAL files not being cleaned
      - Tombstones accumulating
      
  remediation:
    steps:
      - action: check-storage-usage
        command: "kubectl exec -n monitoring prometheus-0 -- df -h /prometheus"
        description: "Check TSDB disk usage"
      - action: check-series-count
        command: "curl -s http://prometheus:9090/api/v1/status/tsdb | jq '.data.seriesCountByMetricName[:20]'"
        description: "Find metrics with most series"
      - action: reduce-retention
        command: "kubectl patch prometheus prometheus -n monitoring --type=merge -p '{\"spec\":{\"retention\":\"7d\"}}'"
        description: "Reduce retention period"
      - action: trigger-compaction
        command: "curl -X POST http://prometheus:9090/api/v1/admin/tsdb/clean_tombstones"
        description: "Clean up tombstones"
      - action: expand-pvc
        command: "kubectl patch pvc prometheus-data -n monitoring -p '{\"spec\":{\"resources\":{\"requests\":{\"storage\":\"200Gi\"}}}}'"
        description: "Expand PVC size"
      - action: drop-high-cardinality
        command: "# Add metric_relabel_configs to drop problematic metrics"
        description: "Drop high cardinality series"
    
  detection:
    promql: 'kubelet_volume_stats_available_bytes{persistentvolumeclaim=~"prometheus.*"} / kubelet_volume_stats_capacity_bytes < 0.1'
    alertName: PrometheusStorageFull
    severity: warning
