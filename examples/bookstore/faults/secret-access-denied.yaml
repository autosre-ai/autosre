# Scenario: Secret Access Denied
# Category: Secrets Management
# Description: Vault policy denies access to requested secret

apiVersion: opensre.io/v1alpha1
kind: FaultScenario
metadata:
  name: secret-access-denied
  labels:
    category: security
    subcategory: secrets-management
    severity: high
    service: vault
spec:
  description: |
    The service account or application is denied access to a secret in Vault
    due to insufficient permissions in the Vault policy.
  
  symptoms:
    - type: error
      source: vault
      message: "permission denied"
    - type: error
      source: vault-agent
      message: "Error reading secret/data/bookstore/database: 403 Forbidden"
    - type: log
      source: bookstore-api
      pattern: "1 error occurred: * secret/data/bookstore/database: permission denied"
    - type: metric
      name: vault_token_lookup_errors_total
      labels:
        error: "permission_denied"
      condition: "increase > 0"

  affectedServices:
    - name: bookstore-api
      namespace: bookstore
      impact: "Cannot access database credentials"

  rootCause:
    type: authorization-failure
    component: vault-policy
    possibleCauses:
      - "Vault policy doesn't include the secret path"
      - "Service account role not attached to correct policy"
      - "Secret path changed but policy not updated"
      - "Namespace isolation preventing access"
      - "Policy syntax error causing implicit deny"

  detection:
    - method: vault-logs
      command: |
        vault audit list
        # Check audit logs for denied requests
    - method: policy-check
      command: |
        # Check what policies are attached to the role
        vault read auth/kubernetes/role/bookstore-api
        
        # Check policy contents
        vault policy read bookstore-app
    - method: token-capabilities
      command: |
        # Check token capabilities for the path
        vault token capabilities secret/data/bookstore/database

  remediation:
    automated: false
    requiresApproval: vault-admin
    steps:
      - action: identify-required-path
        description: "Determine which secret path is needed"
        command: |
          # From application logs or config
          grep -r "vault" /app/config/ | grep -i secret
      - action: check-current-policy
        command: |
          vault policy read bookstore-app
      - action: check-role-bindings
        command: |
          vault read auth/kubernetes/role/bookstore-api
      - action: update-policy
        description: "Add required path to policy"
        command: |
          vault policy write bookstore-app - <<EOF
          path "secret/data/bookstore/*" {
            capabilities = ["read", "list"]
          }
          
          path "database/creds/bookstore-role" {
            capabilities = ["read"]
          }
          EOF
      - action: verify-access
        command: |
          vault token capabilities secret/data/bookstore/database
        expected: "read"
      - action: restart-vault-agent
        command: |
          kubectl delete pod -n bookstore -l app=bookstore-api

  policyBestPractices:
    - name: least-privilege
      description: "Only grant necessary permissions"
      example: |
        # Good: Specific path
        path "secret/data/bookstore/database" {
          capabilities = ["read"]
        }
        
        # Avoid: Overly broad
        path "secret/*" {
          capabilities = ["read", "list", "create", "update", "delete"]
        }
    - name: path-templating
      description: "Use templated policies for multi-tenant"
      example: |
        path "secret/data/{{identity.entity.metadata.namespace}}/*" {
          capabilities = ["read", "list"]
        }
    - name: policy-versioning
      description: "Version control all Vault policies"
      implementation: |
        Store policies in Git, deploy via CI/CD

  prevention:
    - type: policy-testing
      description: "Test policies before deployment"
      command: |
        vault policy fmt my-policy.hcl
        # Use Sentinel for policy validation (Enterprise)
    - type: policy-as-code
      description: "Manage policies in version control"
      tools:
        - "Terraform vault provider"
        - "vault policy write from file"
    - type: monitoring
      description: "Alert on permission denied errors"
      rule: |
        sum(rate(vault_audit_log_request_total{error="permission denied"}[5m])) by (path) > 0

  verification:
    - type: capability-check
      command: |
        vault token capabilities secret/data/bookstore/database
      expected: "read"
    - type: secret-read
      command: |
        vault read secret/data/bookstore/database
      expected: "Secret data returned without error"
    - type: application-test
      command: |
        kubectl exec -n bookstore deploy/bookstore-api -- \
          curl -sf http://localhost:8080/health/dependencies
      expected: "database: healthy"

  references:
    - url: https://www.vaultproject.io/docs/concepts/policies
      title: "Vault Policies"
    - url: https://learn.hashicorp.com/tutorials/vault/policies
      title: "Vault Policy Tutorial"
