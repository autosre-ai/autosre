# Thread Pool Exhausted
# Simulates all worker threads being busy
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway-thread-pool-exhausted
  namespace: bookstore
  labels:
    app: api-gateway
    tier: api
    fault: thread-pool-exhausted
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        tier: api
        fault: thread-pool-exhausted
    spec:
      containers:
      - name: gateway
        image: python:3.11-alpine
        env:
        - name: FAULT_MODE
          value: "thread-pool-exhausted"
        - name: MAX_THREADS
          value: "50"
        - name: EXHAUSTION_RATE
          value: "0.8"
        command: ["python", "-c"]
        args:
        - |
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import json
          import random
          import time
          import os
          
          MAX_THREADS = int(os.environ.get('MAX_THREADS', 50))
          EXHAUSTION_RATE = float(os.environ.get('EXHAUSTION_RATE', 0.8))
          
          queued_requests = 0
          
          class Handler(BaseHTTPRequestHandler):
              global queued_requests
              
              def do_GET(self):
                  global queued_requests
                  
                  if self.path in ['/health', '/ready']:
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'OK')
                      return
                  
                  if random.random() < EXHAUSTION_RATE:
                      queued_requests += 1
                      queue_wait = random.uniform(2, 10)
                      
                      print(f"[thread-pool] All {MAX_THREADS} threads busy, queued (waiting: {queued_requests})")
                      
                      # Simulate waiting for a thread
                      time.sleep(queue_wait)
                      queued_requests = max(0, queued_requests - 1)
                      
                      self.send_response(200)
                      self.send_header('Content-Type', 'application/json')
                      self.send_header('X-Thread-Pool-Queue-Time-Ms', str(int(queue_wait * 1000)))
                      self.end_headers()
                      response = {
                          "status": "ok",
                          "warning": "Request was queued due to thread pool exhaustion",
                          "thread_pool": {
                              "active": MAX_THREADS,
                              "max": MAX_THREADS,
                              "queued": queued_requests,
                              "queue_wait_ms": int(queue_wait * 1000)
                          }
                      }
                      self.wfile.write(json.dumps(response).encode())
                  else:
                      self.send_response(200)
                      self.send_header('Content-Type', 'application/json')
                      self.end_headers()
                      self.wfile.write(json.dumps({"status": "ok"}).encode())
                      
              def do_POST(self):
                  return self.do_GET()
                  
              def log_message(self, format, *args):
                  print(f"[api-threads] {args[0]}")
          
          print(f"API Gateway (THREAD POOL) starting - max_threads={MAX_THREADS}")
          HTTPServer(('0.0.0.0', 8080), Handler).serve_forever()
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
