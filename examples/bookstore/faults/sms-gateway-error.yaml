# SMS Gateway Error
# Simulates SMS delivery failures
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service-sms-error
  namespace: bookstore
  labels:
    app: notification-service
    tier: api
    fault: sms-gateway-error
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
        tier: api
        fault: sms-gateway-error
    spec:
      containers:
      - name: notification
        image: python:3.11-alpine
        env:
        - name: FAULT_MODE
          value: "sms-gateway-error"
        - name: SMS_PROVIDER
          value: "twilio"
        - name: FAILURE_RATE
          value: "0.8"
        command: ["python", "-c"]
        args:
        - |
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import json
          import random
          import os
          
          SMS_PROVIDER = os.environ.get('SMS_PROVIDER', 'twilio')
          FAILURE_RATE = float(os.environ.get('FAILURE_RATE', 0.8))
          
          SMS_ERRORS = [
              {"code": "21211", "message": "Invalid 'To' phone number"},
              {"code": "21614", "message": "'To' number is not a mobile number"},
              {"code": "30003", "message": "Unreachable destination handset"},
              {"code": "30005", "message": "Unknown destination handset"},
              {"code": "30006", "message": "Landline or unreachable carrier"},
              {"code": "30007", "message": "Carrier violation"},
          ]
          
          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  if self.path in ['/health', '/ready']:
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'OK')
                      return
                  
                  self.send_response(200)
                  self.send_header('Content-Type', 'application/json')
                  self.end_headers()
                  self.wfile.write(json.dumps({"status": "ok"}).encode())
                      
              def do_POST(self):
                  if random.random() < FAILURE_RATE:
                      error_info = random.choice(SMS_ERRORS)
                      print(f"[sms] FAILED: {error_info['code']} - {error_info['message']}")
                      
                      self.send_response(400)
                      self.send_header('Content-Type', 'application/json')
                      self.end_headers()
                      error = {
                          "error": "SMSDeliveryFailed",
                          "provider": SMS_PROVIDER,
                          "provider_error": error_info,
                          "details": {
                              "to": "+1555****789",
                              "message_sid": f"SM{random.randint(10000000, 99999999)}",
                              "status": "failed",
                              "sms_type": random.choice(["otp", "order_update", "delivery_alert"])
                          },
                          "suggestion": "Validate phone numbers before sending or use fallback channel"
                      }
                      self.wfile.write(json.dumps(error).encode())
                  else:
                      self.send_response(200)
                      self.send_header('Content-Type', 'application/json')
                      self.end_headers()
                      self.wfile.write(json.dumps({"status": "sent"}).encode())
                  
              def log_message(self, format, *args):
                  print(f"[notif-sms] {args[0]}")
          
          print(f"Notification service (SMS ERROR) starting - provider={SMS_PROVIDER}")
          HTTPServer(('0.0.0.0', 8080), Handler).serve_forever()
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
