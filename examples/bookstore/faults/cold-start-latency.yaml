# Cold Start Latency
# Simulates slow first requests due to JIT, class loading, etc.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-service-cold-start
  namespace: bookstore
  labels:
    app: search-service
    tier: api
    fault: cold-start-latency
spec:
  replicas: 1
  selector:
    matchLabels:
      app: search-service
  template:
    metadata:
      labels:
        app: search-service
        tier: api
        fault: cold-start-latency
    spec:
      containers:
      - name: search
        image: python:3.11-alpine
        env:
        - name: FAULT_MODE
          value: "cold-start-latency"
        - name: COLD_START_DELAY_MS
          value: "5000"
        - name: WARMUP_REQUESTS
          value: "10"
        command: ["python", "-c"]
        args:
        - |
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import json
          import random
          import time
          import os
          
          COLD_DELAY = int(os.environ.get('COLD_START_DELAY_MS', 5000)) / 1000
          WARMUP_COUNT = int(os.environ.get('WARMUP_REQUESTS', 10))
          
          request_count = 0
          
          class Handler(BaseHTTPRequestHandler):
              global request_count
              
              def do_GET(self):
                  global request_count
                  request_count += 1
                  
                  if self.path in ['/health', '/ready']:
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'OK')
                      return
                  
                  latency = 0
                  is_cold = request_count <= WARMUP_COUNT
                  
                  if is_cold:
                      # Cold start - slow response
                      latency = COLD_DELAY * (1 - (request_count / WARMUP_COUNT) * 0.8)
                      print(f"[cold-start] Request #{request_count} - cold start latency: {latency:.1f}s")
                      time.sleep(latency)
                  else:
                      latency = random.uniform(0.01, 0.05)  # Normal latency
                  
                  self.send_response(200)
                  self.send_header('Content-Type', 'application/json')
                  self.send_header('X-Cold-Start', 'true' if is_cold else 'false')
                  self.send_header('X-Request-Number', str(request_count))
                  self.end_headers()
                  response = {
                      "results": [],
                      "performance": {
                          "latency_ms": int(latency * 1000),
                          "cold_start": is_cold,
                          "request_number": request_count,
                          "warmup_remaining": max(0, WARMUP_COUNT - request_count),
                          "jit_compiled": request_count > 5,
                          "class_loading_complete": request_count > 3
                      }
                  }
                  self.wfile.write(json.dumps(response).encode())
                      
              def do_POST(self):
                  return self.do_GET()
                  
              def log_message(self, format, *args):
                  print(f"[search-cold] {args[0]}")
          
          print(f"Search service (COLD START) starting - delay={COLD_DELAY}s, warmup={WARMUP_COUNT}")
          HTTPServer(('0.0.0.0', 8080), Handler).serve_forever()
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
          timeoutSeconds: 10
