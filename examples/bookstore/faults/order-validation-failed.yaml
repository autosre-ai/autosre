# Order Validation Failed
# Simulates bad order data failing validation
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service-validation-failed
  namespace: bookstore
  labels:
    app: order-service
    tier: api
    fault: order-validation-failed
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
        tier: api
        fault: order-validation-failed
    spec:
      containers:
      - name: order
        image: python:3.11-alpine
        env:
        - name: FAULT_MODE
          value: "order-validation-failed"
        - name: VALIDATION_FAILURE_RATE
          value: "0.7"
        command: ["python", "-c"]
        args:
        - |
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import json
          import random
          import os
          
          FAILURE_RATE = float(os.environ.get('VALIDATION_FAILURE_RATE', 0.7))
          
          VALIDATION_ERRORS = [
              {"field": "items", "error": "Order must contain at least one item"},
              {"field": "items[0].quantity", "error": "Quantity must be positive"},
              {"field": "shipping_address.zip", "error": "Invalid ZIP code format"},
              {"field": "shipping_address.country", "error": "Shipping not available to this country"},
              {"field": "billing_address", "error": "Billing address is required"},
              {"field": "items[0].sku", "error": "Product SKU not found"},
              {"field": "coupon_code", "error": "Coupon has expired"},
              {"field": "total", "error": "Order total exceeds maximum allowed"},
          ]
          
          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  if self.path in ['/health', '/ready']:
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'OK')
                      return
                  
                  self.send_response(200)
                  self.send_header('Content-Type', 'application/json')
                  self.end_headers()
                  self.wfile.write(json.dumps({"orders": []}).encode())
                      
              def do_POST(self):
                  if random.random() < FAILURE_RATE:
                      errors = random.sample(VALIDATION_ERRORS, k=random.randint(1, 3))
                      print(f"[order] VALIDATION FAILED: {[e['field'] for e in errors]}")
                      
                      self.send_response(400)
                      self.send_header('Content-Type', 'application/json')
                      self.end_headers()
                      error = {
                          "error": "ValidationError",
                          "message": "Order validation failed",
                          "validation_errors": errors,
                          "details": {
                              "fields_with_errors": len(errors),
                              "request_id": f"req-{random.randint(10000, 99999)}"
                          },
                          "suggestion": "Check input data against API schema"
                      }
                      self.wfile.write(json.dumps(error).encode())
                  else:
                      self.send_response(201)
                      self.send_header('Content-Type', 'application/json')
                      self.end_headers()
                      self.wfile.write(json.dumps({
                          "order_id": f"ORD-{random.randint(10000, 99999)}",
                          "status": "created"
                      }).encode())
                  
              def log_message(self, format, *args):
                  print(f"[order-validation] {args[0]}")
          
          print(f"Order service (VALIDATION FAILED) starting - failure_rate={FAILURE_RATE}")
          HTTPServer(('0.0.0.0', 8080), Handler).serve_forever()
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
