# Network Bandwidth Saturated
# Simulates network throughput maxed out
apiVersion: apps/v1
kind: Deployment
metadata:
  name: media-service-bandwidth-saturated
  namespace: bookstore
  labels:
    app: media-service
    tier: api
    fault: network-bandwidth-saturated
spec:
  replicas: 1
  selector:
    matchLabels:
      app: media-service
  template:
    metadata:
      labels:
        app: media-service
        tier: api
        fault: network-bandwidth-saturated
    spec:
      containers:
      - name: media
        image: python:3.11-alpine
        env:
        - name: FAULT_MODE
          value: "network-bandwidth-saturated"
        - name: THROTTLE_DELAY_MS
          value: "3000"
        - name: SATURATION_RATE
          value: "0.8"
        command: ["python", "-c"]
        args:
        - |
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import json
          import random
          import time
          import os
          
          THROTTLE_DELAY = int(os.environ.get('THROTTLE_DELAY_MS', 3000)) / 1000
          SAT_RATE = float(os.environ.get('SATURATION_RATE', 0.8))
          
          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  if self.path in ['/health', '/ready']:
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'OK')
                      return
                  
                  bandwidth_used = random.uniform(900, 1000)  # Mbps out of 1000
                  
                  if random.random() < SAT_RATE:
                      delay = random.uniform(THROTTLE_DELAY * 0.5, THROTTLE_DELAY * 2)
                      print(f"[bandwidth] Network saturated ({bandwidth_used:.0f}/1000 Mbps), throttling {delay:.1f}s")
                      time.sleep(delay)
                  
                  self.send_response(200)
                  self.send_header('Content-Type', 'application/json')
                  self.send_header('X-Bandwidth-Used-Mbps', str(int(bandwidth_used)))
                  self.end_headers()
                  response = {
                      "media": [],
                      "network_stats": {
                          "bandwidth_used_mbps": int(bandwidth_used),
                          "bandwidth_limit_mbps": 1000,
                          "utilization_percent": bandwidth_used / 10,
                          "packet_loss_percent": random.uniform(0.1, 2.0) if bandwidth_used > 950 else 0,
                          "tcp_retransmits": random.randint(100, 1000) if bandwidth_used > 900 else 0,
                          "warning": "Network bandwidth saturated" if bandwidth_used > 900 else None
                      }
                  }
                  self.wfile.write(json.dumps(response).encode())
                      
              def do_POST(self):
                  return self.do_GET()
                  
              def log_message(self, format, *args):
                  print(f"[media-bw] {args[0]}")
          
          print(f"Media service (BANDWIDTH SATURATED) starting - throttle={THROTTLE_DELAY}s")
          HTTPServer(('0.0.0.0', 8080), Handler).serve_forever()
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
