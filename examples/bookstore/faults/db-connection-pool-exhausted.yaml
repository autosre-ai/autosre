# Database Connection Pool Exhausted
# Simulates all database connections being in use
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service-db-pool-exhausted
  namespace: bookstore
  labels:
    app: inventory-service
    tier: api
    fault: db-connection-pool-exhausted
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
        tier: api
        fault: db-connection-pool-exhausted
    spec:
      containers:
      - name: inventory
        image: python:3.11-alpine
        env:
        - name: FAULT_MODE
          value: "db-pool-exhausted"
        - name: POOL_SIZE
          value: "10"
        - name: POOL_EXHAUSTION_RATE
          value: "0.95"
        command: ["python", "-c"]
        args:
        - |
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import json
          import random
          import os
          
          POOL_SIZE = int(os.environ.get('POOL_SIZE', 10))
          EXHAUSTION_RATE = float(os.environ.get('POOL_EXHAUSTION_RATE', 0.95))
          
          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  if self.path == '/health':
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'OK')
                      return
                  
                  if self.path == '/ready':
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'READY')
                      return
                  
                  # Simulate connection pool exhaustion
                  if random.random() < EXHAUSTION_RATE:
                      print(f"[db-pool] ERROR: Connection pool exhausted (0/{POOL_SIZE} available)")
                      self.send_response(503)
                      self.send_header('Content-Type', 'application/json')
                      self.send_header('Retry-After', '5')
                      self.end_headers()
                      error = {
                          "error": "DatabaseConnectionPoolExhausted",
                          "message": f"Cannot acquire connection from pool. Active: {POOL_SIZE}/{POOL_SIZE}",
                          "pool_size": POOL_SIZE,
                          "available": 0,
                          "waiting_requests": random.randint(10, 50),
                          "suggestion": "Scale database connections or reduce concurrent requests"
                      }
                      self.wfile.write(json.dumps(error).encode())
                  else:
                      # Occasional success
                      self.send_response(200)
                      self.send_header('Content-Type', 'application/json')
                      self.end_headers()
                      self.wfile.write(json.dumps({"items": [], "count": 0}).encode())
                      
              def do_POST(self):
                  # All writes fail when pool exhausted
                  print(f"[db-pool] ERROR: No connections available for write operation")
                  self.send_response(503)
                  self.send_header('Content-Type', 'application/json')
                  self.end_headers()
                  error = {
                      "error": "DatabaseConnectionPoolExhausted",
                      "message": "Cannot acquire connection for write. Pool exhausted.",
                      "operation": "INSERT/UPDATE"
                  }
                  self.wfile.write(json.dumps(error).encode())
                  
              def log_message(self, format, *args):
                  print(f"[inventory-db-pool] {args[0]}")
          
          print(f"Inventory service (DB POOL EXHAUSTED) starting - pool_size={POOL_SIZE}, exhaustion_rate={EXHAUSTION_RATE}")
          HTTPServer(('0.0.0.0', 8080), Handler).serve_forever()
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
