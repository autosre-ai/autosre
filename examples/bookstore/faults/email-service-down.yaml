# Email Service Down
# Simulates notification emails failing to send
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service-email-down
  namespace: bookstore
  labels:
    app: notification-service
    tier: api
    fault: email-service-down
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
        tier: api
        fault: email-service-down
    spec:
      containers:
      - name: notification
        image: python:3.11-alpine
        env:
        - name: FAULT_MODE
          value: "email-service-down"
        - name: EMAIL_PROVIDER
          value: "sendgrid"
        command: ["python", "-c"]
        args:
        - |
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import json
          import random
          import os
          
          EMAIL_PROVIDER = os.environ.get('EMAIL_PROVIDER', 'sendgrid')
          
          queued_emails = 0
          
          class Handler(BaseHTTPRequestHandler):
              global queued_emails
              
              def do_GET(self):
                  if self.path in ['/health', '/ready']:
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'OK')
                      return
                  
                  self.send_response(200)
                  self.send_header('Content-Type', 'application/json')
                  self.end_headers()
                  self.wfile.write(json.dumps({"queued_emails": queued_emails}).encode())
                      
              def do_POST(self):
                  global queued_emails
                  queued_emails += 1
                  
                  print(f"[email] FAILED: Cannot send via {EMAIL_PROVIDER} (queued: {queued_emails})")
                  
                  self.send_response(502)
                  self.send_header('Content-Type', 'application/json')
                  self.end_headers()
                  error = {
                      "error": "EmailServiceDown",
                      "message": f"Failed to send email via {EMAIL_PROVIDER}",
                      "details": {
                          "provider": EMAIL_PROVIDER,
                          "error": "Connection timeout",
                          "emails_queued": queued_emails,
                          "queue_age_minutes": random.randint(5, 60),
                          "email_type": random.choice(["order_confirmation", "password_reset", "shipping_update"])
                      },
                      "fallback": {
                          "queued": True,
                          "retry_in_minutes": 5,
                          "alternate_provider": "mailgun"
                      },
                      "suggestion": "Switch to backup email provider or enable queue persistence"
                  }
                  self.wfile.write(json.dumps(error).encode())
                  
              def log_message(self, format, *args):
                  print(f"[notif-email] {args[0]}")
          
          print(f"Notification service (EMAIL DOWN) starting - provider={EMAIL_PROVIDER}")
          HTTPServer(('0.0.0.0', 8080), Handler).serve_forever()
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
