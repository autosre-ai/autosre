# Scenario: Topology Spread Constraint Violation
# Expected: OpenSRE detects unbalanced pod distribution, pending pods
# Remediation: Relax whenUnsatisfiable, add nodes to zones, adjust maxSkew
# Root Cause: TopologySpreadConstraints cannot be satisfied with current topology
apiVersion: apps/v1
kind: Deployment
metadata:
  name: global-service-topology-violation
  namespace: bookstore
  labels:
    app: global-service
    tier: api
    fault: topology-spread-violation
spec:
  replicas: 9  # Want even distribution across 3 zones (3 per zone)
  selector:
    matchLabels:
      app: global-service
      fault: topology-spread-violation
  template:
    metadata:
      labels:
        app: global-service
        tier: api
        fault: topology-spread-violation
    spec:
      topologySpreadConstraints:
      - maxSkew: 1  # Allow only 1 pod difference between zones
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: DoNotSchedule  # Strict - don't schedule if violates
        labelSelector:
          matchLabels:
            app: global-service
            fault: topology-spread-violation
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app: global-service
      containers:
      - name: service
        image: python:3.11-alpine
        command: ["python", "-c"]
        args:
        - |
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import os
          
          zone = os.environ.get('ZONE', 'unknown')
          node = os.environ.get('NODE_NAME', 'unknown')
          
          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  self.send_response(200)
                  self.end_headers()
                  self.wfile.write(f'Zone: {zone}, Node: {node}'.encode())
              def log_message(self, format, *args):
                  pass
          
          print(f"Global service starting (Zone: {zone}, Node: {node})...")
          HTTPServer(('0.0.0.0', 8080), Handler).serve_forever()
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: ZONE
          valueFrom:
            fieldRef:
              fieldPath: metadata.labels['topology.kubernetes.io/zone']
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
---
# If cluster has uneven zone distribution (e.g., 2 nodes in us-east-1a, 1 in us-east-1b):
# - Pods in us-east-1a: 3 max (2 nodes, but maxSkew=1 limits growth)
# - Pods in us-east-1b: 2 max (1 node)
# - Total schedulable: 5, but want 9
# - Remaining pods: Pending due to topology constraints
#
# Events:
# Warning  FailedScheduling  pod/global-service-xxx  
# 0/3 nodes are available: 3 node(s) didn't match pod topology spread constraints
