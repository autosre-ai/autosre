# Scenario: Secret Version Mismatch
# Category: Secrets Management
# Description: Application using wrong version of secret

apiVersion: opensre.io/v1alpha1
kind: FaultScenario
metadata:
  name: secret-version-mismatch
  labels:
    category: security
    subcategory: secrets-management
    severity: high
    service: bookstore-api
spec:
  description: |
    The application is using an outdated version of a secret while dependent
    services expect the newer version, causing authentication failures.
  
  symptoms:
    - type: error
      source: bookstore-api
      message: "Database connection failed: password authentication failed"
    - type: log
      source: external-secrets-operator
      pattern: "secret version mismatch: expected v5, got v4"
    - type: metric
      name: secret_sync_version
      labels:
        secret: "db-credentials"
      condition: "deployed_version != source_version"
    - type: pod-status
      description: "Some pods using old secrets, others using new"

  affectedServices:
    - name: bookstore-api
      namespace: bookstore
      impact: "Inconsistent authentication across pods"

  rootCause:
    type: synchronization-failure
    component: secret-versioning
    possibleCauses:
      - "Pods not restarted after secret update"
      - "Secret controller sync lag"
      - "Rolling update stuck with mixed versions"
      - "External Secrets refresh interval too long"
      - "ConfigMap/Secret hash not triggering pod restart"

  detection:
    - method: version-comparison
      command: |
        # Compare secret version in Vault vs K8s
        VAULT_VERSION=$(vault kv metadata get secret/bookstore/database | grep current_version)
        K8S_VERSION=$(kubectl get secret db-credentials -n bookstore -o jsonpath='{.metadata.annotations.secret-version}')
        echo "Vault: $VAULT_VERSION, K8s: $K8S_VERSION"
    - method: pod-env-check
      command: |
        # Check what different pods are using
        for pod in $(kubectl get pods -n bookstore -l app=bookstore-api -o name); do
          echo "$pod:"
          kubectl exec -n bookstore $pod -- printenv DB_PASSWORD | md5sum
        done
    - method: prometheus
      query: |
        count(secret_sync_version{deployed_version != source_version}) > 0

  remediation:
    automated: true
    steps:
      - action: identify-version-state
        command: |
          # Check secret annotations for version
          kubectl get secret db-credentials -n bookstore -o yaml | grep -A5 annotations
      - action: force-secret-sync
        description: "Force External Secrets to refresh"
        command: |
          kubectl annotate externalsecret db-credentials -n bookstore \
            force-sync=$(date +%s) --overwrite
      - action: trigger-pod-restart
        description: "Restart pods to pick up new secret"
        command: |
          kubectl rollout restart deployment/bookstore-api -n bookstore
      - action: verify-all-pods-consistent
        command: |
          kubectl exec -n bookstore deploy/bookstore-api -- printenv DB_PASSWORD | md5sum

  prevention:
    - type: secret-hash-annotation
      description: "Use secret hash in pod template to trigger restarts"
      implementation: |
        apiVersion: apps/v1
        kind: Deployment
        spec:
          template:
            metadata:
              annotations:
                checksum/secret: "{{ include (print $.Template.BasePath \"/secret.yaml\") . | sha256sum }}"
    - type: stakater-reloader
      description: "Use Reloader to auto-restart on secret changes"
      config: |
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          annotations:
            reloader.stakater.com/auto: "true"
    - type: frequent-sync
      description: "Reduce External Secrets refresh interval"
      config: |
        apiVersion: external-secrets.io/v1beta1
        kind: ExternalSecret
        spec:
          refreshInterval: 1m
    - type: dual-credential
      description: "Support both old and new credentials during rotation"
      implementation: |
        Database accepts both credential versions for rotation window

  verification:
    - type: version-match
      command: |
        VAULT_VER=$(vault kv metadata get secret/bookstore/database | grep current_version | awk '{print $2}')
        K8S_VER=$(kubectl get secret db-credentials -n bookstore -o jsonpath='{.metadata.annotations.secret-version}')
        [ "$VAULT_VER" == "$K8S_VER" ] && echo "Versions match"
    - type: pod-consistency
      command: |
        # All pods should have same hash
        kubectl exec -n bookstore deploy/bookstore-api -- printenv DB_PASSWORD | md5sum
    - type: connectivity
      command: |
        kubectl exec -n bookstore deploy/bookstore-api -- pg_isready -h postgres
      expected: "accepting connections"

  references:
    - url: https://external-secrets.io/latest/
      title: "External Secrets Operator"
    - url: https://github.com/stakater/Reloader
      title: "Stakater Reloader"
