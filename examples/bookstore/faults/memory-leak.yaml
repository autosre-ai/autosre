# Memory Leak Fault Injection
# This patches the catalog-service to simulate a memory leak
# by running a process that continuously allocates memory
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service-memory-leak
  namespace: bookstore
  labels:
    app: catalog-service
    tier: api
    fault: memory-leak
spec:
  replicas: 2
  selector:
    matchLabels:
      app: catalog-service
  template:
    metadata:
      labels:
        app: catalog-service
        tier: api
        fault: memory-leak
    spec:
      containers:
      - name: catalog
        image: python:3.11-alpine
        command: ["python", "-c"]
        args:
        - |
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import json
          import threading
          import time
          
          # Memory leak simulator - grows memory over time
          leaked_data = []
          
          def leak_memory():
              global leaked_data
              while True:
                  # Allocate ~1MB every 5 seconds
                  leaked_data.append('X' * (1024 * 1024))
                  print(f"[memory-leak] Allocated memory block, total: {len(leaked_data)} MB")
                  time.sleep(5)
          
          # Start memory leak thread
          threading.Thread(target=leak_memory, daemon=True).start()
          
          books = [
            {"id": 1, "title": "Site Reliability Engineering", "author": "Google", "price": 49.99},
            {"id": 2, "title": "The Phoenix Project", "author": "Gene Kim", "price": 24.99},
          ]
          
          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  if self.path == '/health':
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'OK')
                  elif self.path == '/ready':
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'READY')
                  elif self.path.startswith('/books'):
                      self.send_response(200)
                      self.send_header('Content-Type', 'application/json')
                      self.end_headers()
                      self.wfile.write(json.dumps(books).encode())
                  else:
                      self.send_response(404)
                      self.end_headers()
              def log_message(self, format, *args):
                  print(f"[catalog-leak] {args[0]}")
          
          print("Catalog service (MEMORY LEAK) starting on port 8080...")
          HTTPServer(('0.0.0.0', 8080), Handler).serve_forever()
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"  # Will OOM when leak reaches ~128MB
            cpu: "100m"
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
