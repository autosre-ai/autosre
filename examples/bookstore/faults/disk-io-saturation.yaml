# Disk I/O Saturation
# Simulates slow disk writes affecting performance
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service-disk-io
  namespace: bookstore
  labels:
    app: order-service
    tier: api
    fault: disk-io-saturation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
        tier: api
        fault: disk-io-saturation
    spec:
      containers:
      - name: order
        image: python:3.11-alpine
        env:
        - name: FAULT_MODE
          value: "disk-io-saturation"
        - name: IO_WAIT_MS
          value: "2000"
        - name: IO_SATURATION_RATE
          value: "0.7"
        command: ["python", "-c"]
        args:
        - |
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import json
          import random
          import time
          import os
          
          IO_WAIT = int(os.environ.get('IO_WAIT_MS', 2000)) / 1000
          IO_RATE = float(os.environ.get('IO_SATURATION_RATE', 0.7))
          
          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  if self.path in ['/health', '/ready']:
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'OK')
                      return
                  
                  io_wait = 0
                  if random.random() < IO_RATE:
                      io_wait = random.uniform(IO_WAIT * 0.5, IO_WAIT * 2)
                      print(f"[disk-io] High I/O wait: {io_wait:.1f}s (disk: 95% utilized)")
                      time.sleep(io_wait)
                  
                  self.send_response(200)
                  self.send_header('Content-Type', 'application/json')
                  self.send_header('X-IO-Wait-Ms', str(int(io_wait * 1000)))
                  self.end_headers()
                  response = {
                      "orders": [],
                      "disk_stats": {
                          "utilization_percent": random.uniform(90, 100),
                          "io_wait_ms": int(io_wait * 1000),
                          "read_latency_ms": random.randint(50, 200),
                          "write_latency_ms": random.randint(100, 500),
                          "queue_depth": random.randint(32, 128),
                          "warning": "Disk I/O saturated" if io_wait > 0 else None
                      }
                  }
                  self.wfile.write(json.dumps(response).encode())
                      
              def do_POST(self):
                  # Writes are even slower
                  if random.random() < IO_RATE:
                      wait = random.uniform(IO_WAIT, IO_WAIT * 3)
                      print(f"[disk-io] Write stalled: {wait:.1f}s")
                      time.sleep(wait)
                  return self.do_GET()
                  
              def log_message(self, format, *args):
                  print(f"[order-disk] {args[0]}")
          
          print(f"Order service (DISK IO) starting - io_wait={IO_WAIT}s")
          HTTPServer(('0.0.0.0', 8080), Handler).serve_forever()
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
          timeoutSeconds: 5
