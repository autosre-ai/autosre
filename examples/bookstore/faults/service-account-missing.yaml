# Scenario: Service Account Missing / RBAC Denied
# Expected: OpenSRE detects API access denied, 403 errors from kube-apiserver
# Remediation: Create ServiceAccount, add RoleBinding, fix RBAC permissions
# Root Cause: Pod's ServiceAccount doesn't have required permissions
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-operator-rbac-denied
  namespace: bookstore
  labels:
    app: k8s-operator
    tier: operator
    fault: service-account-missing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-operator
      fault: service-account-missing
  template:
    metadata:
      labels:
        app: k8s-operator
        tier: operator
        fault: service-account-missing
    spec:
      # Reference non-existent service account
      serviceAccountName: bookstore-operator-nonexistent
      automountServiceAccountToken: true
      containers:
      - name: operator
        image: python:3.11-alpine
        command: ["sh", "-c"]
        args:
        - |
          pip install kubernetes --quiet
          python -c "
          from kubernetes import client, config
          import time
          import sys
          
          print('K8s Operator starting...')
          print('Loading in-cluster config...')
          
          try:
              config.load_incluster_config()
              v1 = client.CoreV1Api()
              
              while True:
                  print('Attempting to list pods in bookstore namespace...')
                  try:
                      pods = v1.list_namespaced_pod('bookstore')
                      print(f'Found {len(pods.items)} pods')
                  except client.exceptions.ApiException as e:
                      if e.status == 403:
                          print(f'[RBAC-DENIED] Access denied: {e.reason}')
                          print(f'[RBAC-DENIED] ServiceAccount lacks permissions')
                      else:
                          print(f'[ERROR] API error: {e}')
                  time.sleep(30)
          except Exception as e:
              print(f'[FATAL] Failed to configure k8s client: {e}')
              sys.exit(1)
          "
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "100m"
---
# Alternative: SA exists but has no permissions
apiVersion: v1
kind: ServiceAccount
metadata:
  name: bookstore-operator-no-perms
  namespace: bookstore
  labels:
    fault: service-account-missing
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-watcher-no-perms
  namespace: bookstore
  labels:
    app: k8s-watcher
    tier: operator
    fault: service-account-missing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-watcher
      fault: service-account-missing
  template:
    metadata:
      labels:
        app: k8s-watcher
        tier: operator
        fault: service-account-missing
    spec:
      serviceAccountName: bookstore-operator-no-perms
      containers:
      - name: watcher
        image: bitnami/kubectl:latest
        command: ["sh", "-c"]
        args:
        - |
          while true; do
            echo "Attempting to watch pods..."
            kubectl get pods -n bookstore 2>&1 || echo "[RBAC] Access denied"
            sleep 30
          done
        resources:
          requests:
            memory: "64Mi"
            cpu: "25m"
          limits:
            memory: "128Mi"
            cpu: "50m"
---
# Expected output from kubectl:
# Error from server (Forbidden): pods is forbidden: 
# User "system:serviceaccount:bookstore:bookstore-operator-no-perms" 
# cannot list resource "pods" in API group "" in the namespace "bookstore"
