# HTTP Circuit Breaker Open
# Simulates circuit breaker tripped due to cascading failures
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service-circuit-breaker
  namespace: bookstore
  labels:
    app: order-service
    tier: api
    fault: http-circuit-breaker-open
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
        tier: api
        fault: http-circuit-breaker-open
    spec:
      containers:
      - name: order
        image: python:3.11-alpine
        env:
        - name: FAULT_MODE
          value: "http-circuit-breaker-open"
        - name: CIRCUIT_STATE
          value: "open"
        - name: HALF_OPEN_REQUESTS
          value: "3"
        command: ["python", "-c"]
        args:
        - |
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import json
          import random
          import os
          
          CIRCUIT_STATE = os.environ.get('CIRCUIT_STATE', 'open')
          HALF_OPEN_REQUESTS = int(os.environ.get('HALF_OPEN_REQUESTS', 3))
          
          half_open_count = 0
          
          class Handler(BaseHTTPRequestHandler):
              global half_open_count
              
              def do_GET(self):
                  global half_open_count
                  
                  if self.path in ['/health', '/ready']:
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'OK')
                      return
                  
                  # Circuit is OPEN - fail fast
                  print(f"[circuit-breaker] Circuit OPEN - failing fast (backend: payment-service)")
                  
                  self.send_response(503)
                  self.send_header('Content-Type', 'application/json')
                  self.send_header('X-Circuit-State', 'OPEN')
                  self.send_header('X-Circuit-Opened-At', '2024-01-15T12:25:00Z')
                  self.end_headers()
                  error = {
                      "error": "CircuitBreakerOpen",
                      "message": "Circuit breaker is OPEN for downstream service",
                      "details": {
                          "circuit_name": "payment-service",
                          "state": "OPEN",
                          "failure_count": random.randint(10, 50),
                          "failure_threshold": 5,
                          "failure_rate_percent": random.uniform(70, 100),
                          "opened_at": "2024-01-15T12:25:00Z",
                          "reset_timeout_seconds": 30,
                          "half_open_requests_allowed": HALF_OPEN_REQUESTS,
                          "last_error": "Connection refused: payment-service:8080"
                      },
                      "suggestion": "Check payment-service health and restart if needed"
                  }
                  self.wfile.write(json.dumps(error).encode())
                      
              def do_POST(self):
                  return self.do_GET()
                  
              def log_message(self, format, *args):
                  print(f"[order-circuit] {args[0]}")
          
          print(f"Order service (CIRCUIT BREAKER) starting - state={CIRCUIT_STATE}")
          HTTPServer(('0.0.0.0', 8080), Handler).serve_forever()
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
