# Scenario: Deployment Rollout Stuck
# Expected: OpenSRE detects deployment not progressing, ProgressDeadlineExceeded
# Remediation: Fix failing pods, rollback deployment, increase deadline
# Root Cause: New pods fail to become ready, blocking rollout
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-service-rollout-stuck
  namespace: bookstore
  labels:
    app: api-service
    tier: api
    fault: rollout-stuck
spec:
  replicas: 3
  # Short deadline for faster demo
  progressDeadlineSeconds: 60
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0  # Don't remove old pods until new ones are ready
  selector:
    matchLabels:
      app: api-service
      fault: rollout-stuck
  template:
    metadata:
      labels:
        app: api-service
        tier: api
        fault: rollout-stuck
        version: v2-broken
    spec:
      containers:
      - name: api
        image: python:3.11-alpine
        command: ["python", "-c"]
        args:
        - |
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import time
          import sys
          
          print("API Service v2 starting...")
          print("[ERROR] Database migration failed!")
          print("[ERROR] Cannot connect to required service")
          
          # Service starts but never becomes ready
          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  if self.path == '/health':
                      # Health OK - container is running
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'OK')
                  elif self.path == '/ready':
                      # Never ready - simulates dependency not available
                      self.send_response(503)
                      self.end_headers()
                      self.wfile.write(b'NOT READY: Database migration pending')
                  else:
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'API v2')
              def log_message(self, format, *args):
                  pass
          
          HTTPServer(('0.0.0.0', 8080), Handler).serve_forever()
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
---
# After progressDeadlineSeconds, deployment status shows:
# Conditions:
# - Type: Progressing
#   Status: "False"
#   Reason: ProgressDeadlineExceeded
#   Message: ReplicaSet "api-service-xxx" has timed out progressing
#
# kubectl rollout status shows:
# error: deployment "api-service-rollout-stuck" exceeded its progress deadline
