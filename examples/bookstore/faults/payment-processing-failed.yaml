# Payment Processing Failed
# Simulates payment gateway being down or rejecting payments
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service-failed
  namespace: bookstore
  labels:
    app: payment-service
    tier: api
    fault: payment-processing-failed
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
        tier: api
        fault: payment-processing-failed
    spec:
      containers:
      - name: payment
        image: python:3.11-alpine
        env:
        - name: FAULT_MODE
          value: "payment-processing-failed"
        - name: FAILURE_RATE
          value: "0.8"
        command: ["python", "-c"]
        args:
        - |
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import json
          import random
          import os
          
          FAILURE_RATE = float(os.environ.get('FAILURE_RATE', 0.8))
          
          PAYMENT_ERRORS = [
              {"code": "gateway_timeout", "message": "Payment gateway did not respond"},
              {"code": "card_declined", "message": "Card was declined by issuer"},
              {"code": "insufficient_funds", "message": "Insufficient funds in account"},
              {"code": "fraud_detected", "message": "Transaction flagged for fraud review"},
              {"code": "invalid_card", "message": "Invalid card number"},
              {"code": "expired_card", "message": "Card has expired"},
              {"code": "processor_error", "message": "Payment processor internal error"},
          ]
          
          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  if self.path in ['/health', '/ready']:
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'OK')
                      return
                  
                  self.send_response(200)
                  self.send_header('Content-Type', 'application/json')
                  self.end_headers()
                  self.wfile.write(json.dumps({"status": "payment_service_available"}).encode())
                      
              def do_POST(self):
                  if random.random() < FAILURE_RATE:
                      error_info = random.choice(PAYMENT_ERRORS)
                      print(f"[payment] FAILED: {error_info['code']} - {error_info['message']}")
                      
                      status_code = 502 if 'gateway' in error_info['code'] else 422
                      
                      self.send_response(status_code)
                      self.send_header('Content-Type', 'application/json')
                      self.end_headers()
                      error = {
                          "error": "PaymentFailed",
                          "code": error_info['code'],
                          "message": error_info['message'],
                          "details": {
                              "transaction_id": f"txn_{random.randint(100000, 999999)}",
                              "gateway": "stripe",
                              "amount": random.randint(1000, 50000) / 100,
                              "currency": "USD",
                              "retry_allowed": error_info['code'] in ['gateway_timeout', 'processor_error']
                          },
                          "suggestion": "Retry with exponential backoff or use fallback payment method"
                      }
                      self.wfile.write(json.dumps(error).encode())
                  else:
                      self.send_response(200)
                      self.send_header('Content-Type', 'application/json')
                      self.end_headers()
                      self.wfile.write(json.dumps({
                          "status": "success",
                          "transaction_id": f"txn_{random.randint(100000, 999999)}"
                      }).encode())
                  
              def log_message(self, format, *args):
                  print(f"[payment-svc] {args[0]}")
          
          print(f"Payment service (FAILED) starting - failure_rate={FAILURE_RATE}")
          HTTPServer(('0.0.0.0', 8080), Handler).serve_forever()
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
