# CORS Blocked
# Simulates CORS policy errors blocking cross-origin requests
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway-cors-blocked
  namespace: bookstore
  labels:
    app: api-gateway
    tier: api
    fault: cors-blocked
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        tier: api
        fault: cors-blocked
    spec:
      containers:
      - name: gateway
        image: python:3.11-alpine
        env:
        - name: FAULT_MODE
          value: "cors-blocked"
        - name: ALLOWED_ORIGIN
          value: "https://bookstore.com"
        command: ["python", "-c"]
        args:
        - |
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import json
          import os
          
          ALLOWED_ORIGIN = os.environ.get('ALLOWED_ORIGIN', 'https://bookstore.com')
          
          class Handler(BaseHTTPRequestHandler):
              def do_OPTIONS(self):
                  # Preflight fails - no CORS headers
                  origin = self.headers.get('Origin', 'unknown')
                  
                  if origin != ALLOWED_ORIGIN:
                      print(f"[cors] BLOCKED: Origin '{origin}' not in allowed list")
                      
                      # No CORS headers = browser blocks
                      self.send_response(204)
                      self.end_headers()
                  else:
                      self.send_response(204)
                      self.send_header('Access-Control-Allow-Origin', ALLOWED_ORIGIN)
                      self.send_header('Access-Control-Allow-Methods', 'GET, POST, PUT, DELETE')
                      self.send_header('Access-Control-Allow-Headers', 'Content-Type, Authorization')
                      self.end_headers()
                      
              def do_GET(self):
                  if self.path in ['/health', '/ready']:
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'OK')
                      return
                  
                  origin = self.headers.get('Origin', '')
                  
                  # Response without proper CORS headers for mismatched origins
                  if origin and origin != ALLOWED_ORIGIN:
                      print(f"[cors] Request from blocked origin: {origin}")
                      
                      # Return data but browser will block it
                      self.send_response(200)
                      self.send_header('Content-Type', 'application/json')
                      # Missing: Access-Control-Allow-Origin header
                      self.end_headers()
                      
                      # This response will be blocked by browser!
                      error = {
                          "error": "CORSPolicyViolation",
                          "message": "Response blocked by CORS policy",
                          "details": {
                              "request_origin": origin,
                              "allowed_origins": [ALLOWED_ORIGIN],
                              "missing_header": "Access-Control-Allow-Origin"
                          },
                          "suggestion": "Add origin to allowed list or use proxy"
                      }
                      self.wfile.write(json.dumps(error).encode())
                  else:
                      self.send_response(200)
                      self.send_header('Content-Type', 'application/json')
                      if origin:
                          self.send_header('Access-Control-Allow-Origin', origin)
                      self.end_headers()
                      self.wfile.write(json.dumps({"status": "ok"}).encode())
                      
              def do_POST(self):
                  return self.do_GET()
                  
              def log_message(self, format, *args):
                  print(f"[api-cors] {args[0]}")
          
          print(f"API Gateway (CORS BLOCKED) starting - allowed_origin={ALLOWED_ORIGIN}")
          HTTPServer(('0.0.0.0', 8080), Handler).serve_forever()
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
