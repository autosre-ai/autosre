# Scenario: Secret Rotation Failed
# Category: Secrets Management
# Description: Automated credential rotation failed to complete

apiVersion: opensre.io/v1alpha1
kind: FaultScenario
metadata:
  name: secret-rotation-failed
  labels:
    category: security
    subcategory: secrets-management
    severity: high
    service: database
spec:
  description: |
    The automated secret rotation process for database credentials failed.
    The new password was set in the database but the Kubernetes secret
    was not updated, causing authentication failures.
  
  symptoms:
    - type: error
      source: bookstore-api
      message: "FATAL: password authentication failed for user \"bookstore_app\""
    - type: log
      source: vault-agent
      pattern: "secret rotation failed: unable to update kubernetes secret"
    - type: metric
      name: db_connection_errors_total
      labels:
        error_type: "authentication_failed"
      condition: "spike after scheduled rotation time"
    - type: cronjob-status
      name: secret-rotation-job
      status: failed

  affectedServices:
    - name: bookstore-api
      namespace: bookstore
      impact: "Cannot connect to database"
    - name: inventory-service
      namespace: bookstore
      impact: "Database queries failing"

  rootCause:
    type: automation-failure
    component: secret-rotation
    details: |
      The rotation process is a multi-step operation:
      1. Generate new credential
      2. Add new credential to database
      3. Update Kubernetes secret
      4. Verify application can connect
      5. Remove old credential
      
      Step 3 failed, leaving database with new credential but application
      still using old credential from K8s secret.

  detection:
    - method: cronjob-status
      command: |
        kubectl get jobs -l app=secret-rotation -n vault --sort-by=.metadata.creationTimestamp
    - method: prometheus
      query: |
        increase(db_connection_errors_total{error_type="authentication_failed"}[5m]) > 0 AND
        changes(kube_secret_created{secret="db-credentials"}[1h]) == 0
    - method: vault-audit
      query: |
        path:database/rotate-role/* AND response.errors:*

  remediation:
    automated: true
    steps:
      - action: identify-current-secret
        description: "Check what the application is currently using"
        command: |
          kubectl get secret db-credentials -n bookstore -o jsonpath='{.data.password}' | base64 -d
      - action: check-database-credentials
        description: "Verify current valid credentials in database"
        command: |
          # Connect to database admin and check
          psql -h postgres -U admin -c "SELECT usename FROM pg_user WHERE usename='bookstore_app';"
      - action: resync-from-vault
        description: "Fetch current credential from Vault and update secret"
        command: |
          # Get current cred from Vault
          CRED=$(vault read -format=json database/creds/bookstore-role | jq -r '.data')
          
          # Update K8s secret
          kubectl create secret generic db-credentials \
            --from-literal=username=$(echo $CRED | jq -r '.username') \
            --from-literal=password=$(echo $CRED | jq -r '.password') \
            --dry-run=client -o yaml | kubectl apply -f -
      - action: restart-pods
        command: |
          kubectl rollout restart deployment/bookstore-api -n bookstore
      - action: verify-connection
        command: |
          kubectl exec -n bookstore deploy/bookstore-api -- \
            pg_isready -h postgres -U bookstore_app

  rollback:
    description: "If new credential doesn't work, reset to previous"
    steps:
      - action: get-previous-credential
        command: |
          vault kv get -version=-1 secret/database/bookstore
      - action: reset-database-password
        command: |
          psql -h postgres -U admin -c \
            "ALTER USER bookstore_app WITH PASSWORD '${PREVIOUS_PASSWORD}';"
      - action: update-secret
        command: |
          kubectl create secret generic db-credentials \
            --from-literal=password="${PREVIOUS_PASSWORD}" \
            --dry-run=client -o yaml | kubectl apply -f -

  prevention:
    - type: atomic-rotation
      description: "Use dual-credential approach during rotation"
      implementation: |
        1. Add new credential (both old and new valid)
        2. Update K8s secret
        3. Verify all pods using new credential
        4. Remove old credential
    - type: monitoring
      description: "Alert on rotation job failures"
      rule: |
        kube_job_status_failed{job_name=~"secret-rotation.*"} > 0
    - type: validation
      description: "Test credentials before finalizing rotation"
      implementation: |
        After each rotation step, verify connectivity before proceeding

  verification:
    - type: db-connection
      command: |
        kubectl exec -n bookstore deploy/bookstore-api -- \
          psql -h postgres -c "SELECT 1"
      expected: "1"
    - type: secret-age
      command: |
        kubectl get secret db-credentials -n bookstore -o jsonpath='{.metadata.creationTimestamp}'
      expected: "Recent timestamp (within rotation window)"
    - type: metric
      query: rate(db_connection_errors_total{error_type="authentication_failed"}[5m])
      condition: "== 0"

  references:
    - url: https://www.vaultproject.io/docs/secrets/databases
      title: "Vault Database Secrets Engine"
    - url: https://kubernetes.io/docs/concepts/configuration/secret/
      title: "Kubernetes Secrets"
