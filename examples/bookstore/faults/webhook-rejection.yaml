# Scenario: Admission Webhook Rejection
# Expected: OpenSRE detects pod creation blocked by webhook
# Remediation: Fix pod spec to comply, update webhook config, add exemption
# Root Cause: ValidatingWebhook rejects pod due to policy violation
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: bookstore-policy-webhook
  labels:
    fault: webhook-rejection
webhooks:
- name: policy.bookstore.example.com
  admissionReviewVersions: ["v1", "v1beta1"]
  sideEffects: None
  timeoutSeconds: 5
  failurePolicy: Fail
  clientConfig:
    # Points to a service that will reject requests
    service:
      name: policy-webhook-service
      namespace: bookstore
      path: /validate
      port: 443
    # Dummy CA bundle - in real scenario this would be valid
    caBundle: LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0tCmR1bW15LWNhLWJ1bmRsZS1kYXRhCi0tLS0tRU5EIENFUlRJRklDQVRFLS0tLS0K
  rules:
  - apiGroups: [""]
    apiVersions: ["v1"]
    operations: ["CREATE", "UPDATE"]
    resources: ["pods"]
    scope: "Namespaced"
  namespaceSelector:
    matchLabels:
      webhook-enabled: "true"
  objectSelector:
    matchLabels:
      requires-validation: "true"
---
# Label namespace to enable webhook (if testing)
# kubectl label namespace bookstore webhook-enabled=true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: unvalidated-app-webhook-reject
  namespace: bookstore
  labels:
    app: unvalidated-app
    tier: api
    fault: webhook-rejection
spec:
  replicas: 1
  selector:
    matchLabels:
      app: unvalidated-app
      fault: webhook-rejection
  template:
    metadata:
      labels:
        app: unvalidated-app
        tier: api
        fault: webhook-rejection
        requires-validation: "true"  # This triggers webhook validation
      annotations:
        # Missing required annotations that webhook enforces
        # policy.bookstore.example.com/approved: "false"
        policy.bookstore.example.com/owner: ""  # Empty, should have value
    spec:
      containers:
      - name: app
        image: python:3.11-alpine
        command: ["python", "-c", "import time; time.sleep(3600)"]
        ports:
        - containerPort: 8080
          name: http
        resources:
          # Webhook might enforce resource limits
          requests:
            memory: "64Mi"
            cpu: "50m"
          # Missing limits - webhook might reject
        # Missing required labels/annotations
        # No securityContext - webhook might require it
---
# Simulated webhook server that rejects requests
apiVersion: apps/v1
kind: Deployment
metadata:
  name: policy-webhook-server
  namespace: bookstore
  labels:
    app: policy-webhook
    fault: webhook-rejection
spec:
  replicas: 1
  selector:
    matchLabels:
      app: policy-webhook
  template:
    metadata:
      labels:
        app: policy-webhook
    spec:
      containers:
      - name: webhook
        image: python:3.11-alpine
        command: ["python", "-c"]
        args:
        - |
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import ssl
          import json
          
          class WebhookHandler(BaseHTTPRequestHandler):
              def do_POST(self):
                  content_length = int(self.headers['Content-Length'])
                  body = self.rfile.read(content_length)
                  review = json.loads(body)
                  
                  # Always reject for demo
                  response = {
                      "apiVersion": "admission.k8s.io/v1",
                      "kind": "AdmissionReview",
                      "response": {
                          "uid": review["request"]["uid"],
                          "allowed": False,
                          "status": {
                              "code": 403,
                              "message": "Policy violation: Missing required annotation 'policy.bookstore.example.com/approved'"
                          }
                      }
                  }
                  
                  self.send_response(200)
                  self.send_header('Content-Type', 'application/json')
                  self.end_headers()
                  self.wfile.write(json.dumps(response).encode())
              
              def log_message(self, format, *args):
                  print(f"[webhook] {args[0]}")
          
          print("Policy webhook server starting on port 8443...")
          server = HTTPServer(('0.0.0.0', 8443), WebhookHandler)
          # Would need TLS in production
          server.serve_forever()
        ports:
        - containerPort: 8443
          name: https
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: policy-webhook-service
  namespace: bookstore
spec:
  selector:
    app: policy-webhook
  ports:
  - port: 443
    targetPort: 8443
---
# Expected error when creating pod:
# Error from server: error when creating "pod.yaml": 
# admission webhook "policy.bookstore.example.com" denied the request: 
# Policy violation: Missing required annotation 'policy.bookstore.example.com/approved'
