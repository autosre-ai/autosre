# Shipping API Error
# Simulates shipping rate/tracking API failures
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shipping-service-api-error
  namespace: bookstore
  labels:
    app: shipping-service
    tier: api
    fault: shipping-api-error
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shipping-service
  template:
    metadata:
      labels:
        app: shipping-service
        tier: api
        fault: shipping-api-error
    spec:
      containers:
      - name: shipping
        image: python:3.11-alpine
        env:
        - name: FAULT_MODE
          value: "shipping-api-error"
        - name: SHIPPING_PROVIDER
          value: "fedex"
        - name: ERROR_RATE
          value: "0.7"
        command: ["python", "-c"]
        args:
        - |
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import json
          import random
          import os
          
          PROVIDER = os.environ.get('SHIPPING_PROVIDER', 'fedex')
          ERROR_RATE = float(os.environ.get('ERROR_RATE', 0.7))
          
          SHIPPING_ERRORS = [
              {"code": "ADDRESS_VALIDATION_FAILED", "message": "Cannot validate shipping address"},
              {"code": "RATE_UNAVAILABLE", "message": "Shipping rates not available for this route"},
              {"code": "SERVICE_UNAVAILABLE", "message": "Selected shipping service temporarily unavailable"},
              {"code": "WEIGHT_EXCEEDED", "message": "Package weight exceeds maximum"},
              {"code": "HAZMAT_RESTRICTED", "message": "Item contains restricted materials"},
          ]
          
          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  if self.path in ['/health', '/ready']:
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'OK')
                      return
                  
                  if random.random() < ERROR_RATE:
                      error_info = random.choice(SHIPPING_ERRORS)
                      print(f"[shipping] ERROR: {error_info['code']} - {error_info['message']}")
                      
                      self.send_response(400)
                      self.send_header('Content-Type', 'application/json')
                      self.end_headers()
                      error = {
                          "error": "ShippingAPIError",
                          "provider": PROVIDER,
                          "provider_error": error_info,
                          "details": {
                              "origin_zip": "94105",
                              "destination_zip": "10001",
                              "weight_lbs": random.uniform(1, 50),
                              "service_type": "GROUND"
                          },
                          "suggestion": "Try alternative carrier or verify address"
                      }
                      self.wfile.write(json.dumps(error).encode())
                  else:
                      self.send_response(200)
                      self.send_header('Content-Type', 'application/json')
                      self.end_headers()
                      self.wfile.write(json.dumps({
                          "rates": [{"service": "GROUND", "price": 9.99, "days": 5}]
                      }).encode())
                      
              def do_POST(self):
                  return self.do_GET()
                  
              def log_message(self, format, *args):
                  print(f"[shipping-api] {args[0]}")
          
          print(f"Shipping service (API ERROR) starting - provider={PROVIDER}")
          HTTPServer(('0.0.0.0', 8080), Handler).serve_forever()
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
