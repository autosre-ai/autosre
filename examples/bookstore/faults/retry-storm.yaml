# Retry Storm
# Simulates exponential backoff failure causing thundering herd
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service-retry-storm
  namespace: bookstore
  labels:
    app: order-service
    tier: api
    fault: retry-storm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
        tier: api
        fault: retry-storm
    spec:
      containers:
      - name: order
        image: python:3.11-alpine
        env:
        - name: FAULT_MODE
          value: "retry-storm"
        - name: CLIENTS_RETRYING
          value: "500"
        command: ["python", "-c"]
        args:
        - |
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import json
          import random
          import time
          import os
          
          CLIENTS_RETRYING = int(os.environ.get('CLIENTS_RETRYING', 500))
          
          request_count = 0
          
          class Handler(BaseHTTPRequestHandler):
              global request_count
              
              def do_GET(self):
                  global request_count
                  request_count += 1
                  
                  if self.path in ['/health', '/ready']:
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'OK')
                      return
                  
                  retry_count = int(self.headers.get('X-Retry-Count', 0))
                  
                  # System overloaded by retries
                  print(f"[retry-storm] Request #{request_count} (retry: {retry_count}) - system overwhelmed")
                  
                  # Simulate load-induced delay
                  time.sleep(random.uniform(0.5, 2.0))
                  
                  self.send_response(503)
                  self.send_header('Content-Type', 'application/json')
                  self.send_header('Retry-After', str(random.randint(1, 5)))
                  self.end_headers()
                  error = {
                      "error": "RetryStorm",
                      "message": "Service overwhelmed by retry traffic",
                      "details": {
                          "clients_retrying": CLIENTS_RETRYING,
                          "total_requests": request_count,
                          "your_retry_count": retry_count,
                          "avg_retry_rate": f"{random.uniform(3, 10):.1f} retries/client",
                          "load_multiplier": f"{random.uniform(5, 15):.1f}x normal",
                          "queue_depth": random.randint(500, 2000)
                      },
                      "warning": "All clients retrying simultaneously - thundering herd",
                      "suggestion": "Add jitter to backoff, implement circuit breaker, or shed load"
                  }
                  self.wfile.write(json.dumps(error).encode())
                      
              def do_POST(self):
                  return self.do_GET()
                  
              def log_message(self, format, *args):
                  print(f"[order-retry] {args[0]}")
          
          print(f"Order service (RETRY STORM) starting - clients_retrying={CLIENTS_RETRYING}")
          HTTPServer(('0.0.0.0', 8080), Handler).serve_forever()
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
