# Scenario: Password Policy Violation
# Category: Compliance
# Description: Weak credentials detected in system

apiVersion: opensre.io/v1alpha1
kind: FaultScenario
metadata:
  name: password-policy-violation
  labels:
    category: security
    subcategory: compliance
    severity: high
    service: auth-service
spec:
  description: |
    Password policy violations have been detected. Users or service accounts
    have weak credentials that don't meet security requirements.
  
  symptoms:
    - type: compliance-alert
      source: password-auditor
      message: "15 user accounts have passwords not meeting complexity requirements"
    - type: security-alert
      source: credential-scanner
      message: "Service account using default password detected"
    - type: audit-finding
      source: compliance-scan
      message: "SOC2 CC6.1: Password controls insufficient"

  complianceContext:
    requirements:
      - framework: "NIST 800-63B"
        requirement: "Memorized Secret Authenticators"
        rules:
          - "Minimum 8 characters (12+ recommended)"
          - "Check against breached password lists"
          - "No composition rules required (per latest guidance)"
      - framework: "PCI-DSS"
        requirement: "8.3.6"
        rules:
          - "Minimum 12 characters or 8 with complexity"
          - "Change every 90 days (deprecated guidance)"
      - framework: "SOC2"
        control: "CC6.1"
        description: "Logical and physical access controls"

  affectedAccounts:
    users:
      - type: "end-user"
        count: 15
        issue: "Password under minimum length"
      - type: "admin"
        count: 2
        issue: "Password in breached lists"
    serviceAccounts:
      - name: "db-readonly"
        issue: "Using default password"
      - name: "api-service"
        issue: "Password in plaintext config"

  detection:
    - method: password-audit
      command: |
        # Check password hashes against breach database
        kubectl exec -n auth deploy/password-auditor -- \
          audit-passwords --check-hibp --min-length=12
    - method: credential-scan
      command: |
        # Scan for hardcoded passwords
        trivy config --scanners secret /app/config/
    - method: policy-check
      command: |
        # Verify password policy settings
        kubectl get configmap auth-config -n auth -o jsonpath='{.data.password-policy}'

  remediation:
    automated: partial
    steps:
      - action: identify-violations
        command: |
          kubectl exec -n auth deploy/auth-service -- \
            ./scripts/list-policy-violations.sh
      - action: enforce-password-reset
        description: "Force password reset for non-compliant accounts"
        command: |
          kubectl exec -n auth deploy/auth-service -- \
            ./scripts/force-reset.sh --users-file=violations.txt
      - action: update-policy
        description: "Strengthen password policy"
        config: |
          passwordPolicy:
            minLength: 12
            requireUppercase: false  # Per NIST guidance
            requireLowercase: false
            requireNumbers: false
            requireSpecial: false
            checkBreachedPasswords: true
            maxAge: 0  # No forced expiration per NIST
            minAge: 1  # Prevent rapid changes
            historyCount: 10
            lockoutThreshold: 5
            lockoutDuration: 900
      - action: rotate-service-accounts
        description: "Rotate service account credentials"
        command: |
          # Generate new strong password
          NEW_PASS=$(openssl rand -base64 32)
          # Update in vault
          vault kv put secret/db-readonly password="$NEW_PASS"
          # Update in database
          psql -c "ALTER USER db_readonly PASSWORD '$NEW_PASS';"
      - action: remove-hardcoded
        description: "Remove hardcoded credentials"
        implementation: |
          Move to: Kubernetes Secrets, Vault, or External Secrets

  passwordPolicyGuidance:
    nist_modern:
      description: "NIST 800-63B (2017+) recommendations"
      rules:
        - "Minimum 8 characters, encourage longer"
        - "No composition rules (uppercase, special, etc.)"
        - "No periodic password changes"
        - "Screen against breached password lists"
        - "Allow all printable characters"
        - "Use MFA where possible"
    enterprise:
      description: "Balanced enterprise policy"
      config: |
        minLength: 12
        checkBreachedPasswords: true
        mfaRequired: true
        maxAge: 365  # Annual review, not forced change
        lockoutThreshold: 5

  prevention:
    - type: policy-enforcement
      description: "Enforce at password creation/change"
      implementation: |
        // Check password on creation
        async function validatePassword(password) {
          if (password.length < 12) {
            throw new Error('Password must be at least 12 characters');
          }
          if (await isBreached(password)) {
            throw new Error('Password found in breach database');
          }
        }
    - type: breach-checking
      description: "Check passwords against HIBP"
      implementation: |
        const pwnedPasswords = require('hibp');
        const isBreached = await pwnedPasswords.pwnedPassword(password);
    - type: credential-scanning
      description: "Scan repos and configs for credentials"
      tools:
        - "GitLeaks in CI"
        - "Trivy secret scanning"
        - "Pre-commit hooks"
    - type: secrets-management
      description: "Use proper secrets management"
      tools:
        - "HashiCorp Vault"
        - "External Secrets Operator"
        - "Cloud secret managers"

  verification:
    - type: policy-audit
      command: |
        kubectl exec -n auth deploy/password-auditor -- \
          audit-passwords --min-length=12 --check-hibp | grep -c "FAIL"
      expected: "0"
    - type: no-hardcoded
      command: |
        trivy config --scanners secret /app/ | grep -c "Password\|Secret"
      expected: "0"
    - type: policy-config
      command: |
        kubectl get configmap auth-config -n auth -o jsonpath='{.data.password-policy}' | \
          jq '.minLength'
      expected: "12"

  references:
    - url: https://pages.nist.gov/800-63-3/sp800-63b.html
      title: "NIST 800-63B Digital Identity Guidelines"
    - url: https://haveibeenpwned.com/Passwords
      title: "Have I Been Pwned - Passwords"
    - url: https://cheatsheetseries.owasp.org/cheatsheets/Password_Storage_Cheat_Sheet.html
      title: "OWASP Password Storage"
