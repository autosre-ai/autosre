# Database Connection Timeout
# Simulates inability to establish connection to database
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service-db-timeout
  namespace: bookstore
  labels:
    app: user-service
    tier: api
    fault: db-connection-timeout
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
        tier: api
        fault: db-connection-timeout
    spec:
      containers:
      - name: user
        image: python:3.11-alpine
        env:
        - name: FAULT_MODE
          value: "db-connection-timeout"
        - name: TIMEOUT_DELAY_MS
          value: "30000"
        - name: TIMEOUT_PROBABILITY
          value: "0.9"
        command: ["python", "-c"]
        args:
        - |
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import json
          import random
          import time
          import os
          
          TIMEOUT_DELAY = int(os.environ.get('TIMEOUT_DELAY_MS', 30000)) / 1000
          TIMEOUT_PROB = float(os.environ.get('TIMEOUT_PROBABILITY', 0.9))
          
          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  if self.path == '/health':
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'OK')
                      return
                  
                  if self.path == '/ready':
                      # Ready check may also timeout
                      if random.random() < 0.3:
                          time.sleep(TIMEOUT_DELAY)
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'READY')
                      return
                  
                  if random.random() < TIMEOUT_PROB:
                      print(f"[db-timeout] Attempting database connection...")
                      time.sleep(TIMEOUT_DELAY)
                      print(f"[db-timeout] Connection timed out after {TIMEOUT_DELAY}s")
                      
                      self.send_response(504)
                      self.send_header('Content-Type', 'application/json')
                      self.end_headers()
                      error = {
                          "error": "DatabaseConnectionTimeout",
                          "message": f"Connection to database timed out after {int(TIMEOUT_DELAY)}s",
                          "details": {
                              "host": "postgres-primary.bookstore.svc.cluster.local",
                              "port": 5432,
                              "timeout_ms": int(TIMEOUT_DELAY * 1000),
                              "network_latency_ms": random.randint(100, 500)
                          },
                          "suggestion": "Check database connectivity and firewall rules"
                      }
                      self.wfile.write(json.dumps(error).encode())
                  else:
                      self.send_response(200)
                      self.send_header('Content-Type', 'application/json')
                      self.end_headers()
                      self.wfile.write(json.dumps({"user": {"id": 1, "name": "Test User"}}).encode())
                      
              def do_POST(self):
                  return self.do_GET()
                  
              def log_message(self, format, *args):
                  print(f"[user-db-timeout] {args[0]}")
          
          print(f"User service (DB TIMEOUT) starting - timeout={TIMEOUT_DELAY}s, probability={TIMEOUT_PROB}")
          HTTPServer(('0.0.0.0', 8080), Handler).serve_forever()
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
          timeoutSeconds: 5
