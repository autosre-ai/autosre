# Scenario: Volume Secret Not Mounted
# Category: Secrets Management
# Description: Secret volume mount missing from pod

apiVersion: opensre.io/v1alpha1
kind: FaultScenario
metadata:
  name: secret-not-mounted
  labels:
    category: security
    subcategory: secrets-management
    severity: high
    service: bookstore-api
spec:
  description: |
    A Kubernetes secret volume is not mounted in the pod, causing the
    application to fail when trying to read secret files from the expected path.
  
  symptoms:
    - type: error
      source: bookstore-api
      message: "ENOENT: no such file or directory, open '/secrets/database/password'"
    - type: log
      source: bookstore-api
      pattern: "Failed to load TLS certificate: /etc/ssl/certs/tls.crt not found"
    - type: pod-status
      status: "CrashLoopBackOff"
      reason: "Container failed to start: missing secret file"
    - type: metric
      name: container_restarts_total
      labels:
        reason: "Error"
      condition: "increase > 3 in 5m"

  affectedServices:
    - name: bookstore-api
      namespace: bookstore
      impact: "Cannot start due to missing secrets"

  rootCause:
    type: configuration-error
    component: pod-spec
    possibleCauses:
      - "Volume mount removed from deployment spec"
      - "Secret name typo in volume definition"
      - "Secret doesn't exist in namespace"
      - "Optional secret flag missing and secret absent"
      - "ServiceAccount lacks permission to read secret"
      - "Helm values not properly templated"

  detection:
    - method: pod-describe
      command: |
        kubectl describe pod -n bookstore -l app=bookstore-api | grep -A10 "Volumes:"
    - method: events
      command: |
        kubectl get events -n bookstore --field-selector reason=FailedMount
    - method: container-logs
      command: |
        kubectl logs -n bookstore -l app=bookstore-api --previous

  remediation:
    automated: true
    steps:
      - action: verify-secret-exists
        command: |
          kubectl get secret db-credentials -n bookstore
      - action: check-deployment-spec
        command: |
          kubectl get deployment bookstore-api -n bookstore -o yaml | grep -A20 volumes
      - action: check-volume-mounts
        command: |
          kubectl get deployment bookstore-api -n bookstore -o yaml | grep -A10 volumeMounts
      - action: fix-deployment
        description: "Add missing volume mount"
        command: |
          kubectl patch deployment bookstore-api -n bookstore --type='json' -p='[
            {
              "op": "add",
              "path": "/spec/template/spec/volumes/-",
              "value": {
                "name": "db-credentials",
                "secret": {
                  "secretName": "db-credentials"
                }
              }
            },
            {
              "op": "add",
              "path": "/spec/template/spec/containers/0/volumeMounts/-",
              "value": {
                "name": "db-credentials",
                "mountPath": "/secrets/database",
                "readOnly": true
              }
            }
          ]'
      - action: verify-mount
        command: |
          kubectl exec -n bookstore deploy/bookstore-api -- ls -la /secrets/database/

  prevention:
    - type: validation
      description: "Validate deployment specs in CI"
      implementation: |
        # In CI pipeline
        kubeval deployment.yaml
        conftest test deployment.yaml -p policy/
    - type: policy
      description: "OPA policy requiring secret volumes"
      config: |
        package kubernetes.admission
        
        deny[msg] {
          input.request.kind.kind == "Deployment"
          container := input.request.object.spec.template.spec.containers[_]
          not has_required_volume_mount(container, "/secrets/database")
          msg := "Container must mount database secrets"
        }
    - type: optional-secrets
      description: "Mark non-critical secrets as optional"
      config: |
        volumes:
        - name: optional-config
          secret:
            secretName: optional-config
            optional: true
    - type: init-container-check
      description: "Validate secrets exist before main container"
      config: |
        initContainers:
        - name: check-secrets
          image: busybox
          command: ['sh', '-c', 'test -f /secrets/database/password || exit 1']
          volumeMounts:
          - name: db-credentials
            mountPath: /secrets/database

  verification:
    - type: file-exists
      command: |
        kubectl exec -n bookstore deploy/bookstore-api -- \
          test -f /secrets/database/password && echo "exists"
      expected: "exists"
    - type: pod-status
      command: |
        kubectl get pods -n bookstore -l app=bookstore-api -o jsonpath='{.items[0].status.phase}'
      expected: "Running"
    - type: volume-check
      command: |
        kubectl get deployment bookstore-api -n bookstore -o jsonpath='{.spec.template.spec.volumes[*].name}'
      expected: "Contains db-credentials"

  references:
    - url: https://kubernetes.io/docs/concepts/configuration/secret/
      title: "Kubernetes Secrets"
    - url: https://kubernetes.io/docs/concepts/storage/volumes/#secret
      title: "Secret Volume Type"
