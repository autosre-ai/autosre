# Scenario: Readiness Probe Failure
# Expected: OpenSRE detects pod not receiving traffic, endpoints missing
# Remediation: Check application ready endpoint, verify dependencies
# Root Cause: Application never becomes ready (dependency unavailable)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout-service-readiness-fail
  namespace: bookstore
  labels:
    app: checkout-service
    tier: api
    fault: readiness-probe-failure
spec:
  replicas: 2
  selector:
    matchLabels:
      app: checkout-service
      fault: readiness-probe-failure
  template:
    metadata:
      labels:
        app: checkout-service
        tier: api
        fault: readiness-probe-failure
    spec:
      containers:
      - name: checkout
        image: python:3.11-alpine
        command: ["python", "-c"]
        args:
        - |
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import json
          
          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  if self.path == '/health':
                      # Health is OK - container is running fine
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'OK')
                  elif self.path == '/ready':
                      # Never ready - simulates waiting for unavailable dependency
                      self.send_response(503)
                      self.end_headers()
                      self.wfile.write(b'NOT READY: Cannot connect to payment-gateway')
                      print("[READINESS] Failed - payment-gateway unavailable")
                  elif self.path.startswith('/checkout'):
                      self.send_response(200)
                      self.send_header('Content-Type', 'application/json')
                      self.end_headers()
                      self.wfile.write(json.dumps({"status": "processing"}).encode())
                  else:
                      self.send_response(404)
                      self.end_headers()
              def log_message(self, format, *args):
                  pass  # Suppress access logs
          
          print("Checkout service starting on port 8080...")
          print("[WARN] Will never become ready - payment-gateway dependency missing")
          HTTPServer(('0.0.0.0', 8080), Handler).serve_forever()
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: checkout-service-readiness-fail
  namespace: bookstore
spec:
  selector:
    app: checkout-service
    fault: readiness-probe-failure
  ports:
  - port: 80
    targetPort: 8080
  # Note: This service will have 0 endpoints since pods are not ready
