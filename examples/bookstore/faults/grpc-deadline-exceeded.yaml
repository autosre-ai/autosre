# gRPC Deadline Exceeded
# Simulates gRPC calls timing out
apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-service-grpc-deadline
  namespace: bookstore
  labels:
    app: search-service
    tier: api
    fault: grpc-deadline-exceeded
spec:
  replicas: 1
  selector:
    matchLabels:
      app: search-service
  template:
    metadata:
      labels:
        app: search-service
        tier: api
        fault: grpc-deadline-exceeded
    spec:
      containers:
      - name: search
        image: python:3.11-alpine
        env:
        - name: FAULT_MODE
          value: "grpc-deadline-exceeded"
        - name: DEADLINE_EXCEEDED_RATE
          value: "0.7"
        - name: SIMULATED_PROCESSING_MS
          value: "5000"
        command: ["python", "-c"]
        args:
        - |
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import json
          import random
          import time
          import os
          
          DEADLINE_RATE = float(os.environ.get('DEADLINE_EXCEEDED_RATE', 0.7))
          PROCESSING_TIME = int(os.environ.get('SIMULATED_PROCESSING_MS', 5000)) / 1000
          
          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  if self.path in ['/health', '/ready']:
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'OK')
                      return
                  
                  if random.random() < DEADLINE_RATE:
                      # Simulate slow processing that exceeds deadline
                      time.sleep(PROCESSING_TIME)
                      
                      print(f"[grpc] ERROR: DEADLINE_EXCEEDED after {PROCESSING_TIME}s")
                      
                      self.send_response(504)  # Gateway Timeout (HTTP equivalent)
                      self.send_header('Content-Type', 'application/json')
                      self.send_header('grpc-status', '4')  # DEADLINE_EXCEEDED
                      self.send_header('grpc-message', 'Deadline Exceeded')
                      self.end_headers()
                      error = {
                          "error": "GRPCDeadlineExceeded",
                          "grpc_code": 4,
                          "grpc_status": "DEADLINE_EXCEEDED",
                          "message": "Request exceeded deadline",
                          "details": {
                              "service": "search.SearchService",
                              "method": "Search",
                              "deadline_ms": 3000,
                              "actual_duration_ms": int(PROCESSING_TIME * 1000),
                              "server_processing_time_ms": random.randint(2000, 4000),
                              "queue_wait_time_ms": random.randint(500, 2000)
                          },
                          "suggestion": "Increase deadline or optimize search query"
                      }
                      self.wfile.write(json.dumps(error).encode())
                  else:
                      self.send_response(200)
                      self.send_header('Content-Type', 'application/json')
                      self.send_header('grpc-status', '0')
                      self.end_headers()
                      self.wfile.write(json.dumps({"results": [], "count": 0}).encode())
                      
              def do_POST(self):
                  return self.do_GET()
                  
              def log_message(self, format, *args):
                  print(f"[search-grpc] {args[0]}")
          
          print(f"Search service (GRPC DEADLINE) starting - rate={DEADLINE_RATE}, processing={PROCESSING_TIME}s")
          HTTPServer(('0.0.0.0', 8080), Handler).serve_forever()
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
          timeoutSeconds: 5
