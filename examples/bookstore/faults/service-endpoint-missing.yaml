# Scenario: Service Endpoint Missing
# Expected: OpenSRE detects service with no endpoints, connection refused
# Remediation: Deploy backend pods, fix selector labels, check readiness
# Root Cause: Service selector doesn't match any running pods
apiVersion: v1
kind: Service
metadata:
  name: inventory-service-no-endpoints
  namespace: bookstore
  labels:
    app: inventory-service
    fault: service-endpoint-missing
spec:
  selector:
    # This selector won't match any pods
    app: inventory-service
    version: v99-nonexistent
  ports:
  - name: http
    port: 80
    targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-service-endpoint-missing
  namespace: bookstore
  labels:
    app: frontend-service
    tier: web
    fault: service-endpoint-missing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-service
      fault: service-endpoint-missing
  template:
    metadata:
      labels:
        app: frontend-service
        tier: web
        fault: service-endpoint-missing
    spec:
      containers:
      - name: frontend
        image: python:3.11-alpine
        command: ["python", "-c"]
        args:
        - |
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import urllib.request
          import json
          
          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  if self.path == '/health':
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'OK')
                  elif self.path.startswith('/inventory'):
                      try:
                          # Try to call service with no endpoints
                          response = urllib.request.urlopen(
                              'http://inventory-service-no-endpoints/items',
                              timeout=5
                          )
                          data = response.read()
                          self.send_response(200)
                          self.end_headers()
                          self.wfile.write(data)
                      except Exception as e:
                          print(f"[NO-ENDPOINTS] Failed to reach inventory: {e}")
                          self.send_response(503)
                          self.send_header('Content-Type', 'application/json')
                          self.end_headers()
                          error = {"error": "SERVICE_UNAVAILABLE",
                                   "message": "Inventory service has no available endpoints"}
                          self.wfile.write(json.dumps(error).encode())
                  else:
                      self.send_response(404)
                      self.end_headers()
              def log_message(self, format, *args):
                  print(f"[frontend] {args[0]}")
          
          print("Frontend service starting on port 8080...")
          print("[WARN] inventory-service has no endpoints - requests will fail")
          HTTPServer(('0.0.0.0', 8080), Handler).serve_forever()
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
---
# kubectl get endpoints inventory-service-no-endpoints -n bookstore
# NAME                            ENDPOINTS   AGE
# inventory-service-no-endpoints  <none>      1m
