# HTTP 500 Internal Server Errors
# Simulates random internal server errors from unhandled exceptions
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway-http-500
  namespace: bookstore
  labels:
    app: api-gateway
    tier: api
    fault: http-500-errors
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        tier: api
        fault: http-500-errors
    spec:
      containers:
      - name: gateway
        image: python:3.11-alpine
        env:
        - name: FAULT_MODE
          value: "http-500-errors"
        - name: ERROR_RATE
          value: "0.6"
        command: ["python", "-c"]
        args:
        - |
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import json
          import random
          import traceback
          import os
          
          ERROR_RATE = float(os.environ.get('ERROR_RATE', 0.6))
          
          EXCEPTIONS = [
              ("NullPointerException", "Cannot invoke method on null object reference"),
              ("ArrayIndexOutOfBoundsException", "Index 5 out of bounds for length 3"),
              ("IllegalStateException", "Service not initialized"),
              ("RuntimeException", "Unexpected error during request processing"),
              ("OutOfMemoryError", "Java heap space"),
          ]
          
          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  if self.path in ['/health', '/ready']:
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'OK')
                      return
                  
                  if random.random() < ERROR_RATE:
                      exc_type, exc_msg = random.choice(EXCEPTIONS)
                      req_id = f"req-{random.randint(100000, 999999)}"
                      
                      print(f"[http-500] {exc_type}: {exc_msg} (request_id={req_id})")
                      
                      self.send_response(500)
                      self.send_header('Content-Type', 'application/json')
                      self.send_header('X-Request-Id', req_id)
                      self.end_headers()
                      error = {
                          "error": "InternalServerError",
                          "message": "An unexpected error occurred",
                          "request_id": req_id,
                          "details": {
                              "exception": exc_type,
                              "exception_message": exc_msg,
                              "timestamp": "2024-01-15T12:30:45.123Z"
                          },
                          "suggestion": "Check application logs for stack trace"
                      }
                      self.wfile.write(json.dumps(error).encode())
                  else:
                      self.send_response(200)
                      self.send_header('Content-Type', 'application/json')
                      self.end_headers()
                      self.wfile.write(json.dumps({"status": "ok"}).encode())
                      
              def do_POST(self):
                  return self.do_GET()
                  
              def log_message(self, format, *args):
                  print(f"[api-500] {args[0]}")
          
          print(f"API Gateway (HTTP 500) starting - error_rate={ERROR_RATE}")
          HTTPServer(('0.0.0.0', 8080), Handler).serve_forever()
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
