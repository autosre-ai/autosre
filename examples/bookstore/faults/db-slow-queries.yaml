# Database Slow Queries
# Simulates queries taking >5 seconds due to missing indexes or table scans
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service-db-slow-queries
  namespace: bookstore
  labels:
    app: catalog-service
    tier: api
    fault: db-slow-queries
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-service
  template:
    metadata:
      labels:
        app: catalog-service
        tier: api
        fault: db-slow-queries
    spec:
      containers:
      - name: catalog
        image: python:3.11-alpine
        env:
        - name: FAULT_MODE
          value: "db-slow-queries"
        - name: SLOW_QUERY_MIN_MS
          value: "5000"
        - name: SLOW_QUERY_MAX_MS
          value: "30000"
        - name: SLOW_QUERY_PROBABILITY
          value: "0.8"
        command: ["python", "-c"]
        args:
        - |
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import json
          import random
          import time
          import os
          
          SLOW_MIN = int(os.environ.get('SLOW_QUERY_MIN_MS', 5000)) / 1000
          SLOW_MAX = int(os.environ.get('SLOW_QUERY_MAX_MS', 30000)) / 1000
          SLOW_PROB = float(os.environ.get('SLOW_QUERY_PROBABILITY', 0.8))
          
          SLOW_QUERIES = [
              "SELECT * FROM books WHERE title LIKE '%{term}%'",
              "SELECT * FROM books b JOIN reviews r ON b.id = r.book_id ORDER BY r.created_at",
              "SELECT COUNT(*) FROM orders WHERE created_at > NOW() - INTERVAL 1 YEAR",
              "SELECT * FROM inventory WHERE quantity > 0 ORDER BY last_updated",
          ]
          
          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  if self.path == '/health':
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'OK')
                      return
                  
                  if self.path == '/ready':
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'READY')
                      return
                  
                  query = random.choice(SLOW_QUERIES)
                  
                  if random.random() < SLOW_PROB:
                      delay = random.uniform(SLOW_MIN, SLOW_MAX)
                      print(f"[db-slow] SLOW QUERY ({delay:.1f}s): {query}")
                      time.sleep(delay)
                  
                  self.send_response(200)
                  self.send_header('Content-Type', 'application/json')
                  self.send_header('X-Query-Time-Ms', str(int(delay * 1000) if 'delay' in dir() else 50))
                  self.end_headers()
                  result = {
                      "books": [{"id": i, "title": f"Book {i}"} for i in range(5)],
                      "query_time_ms": int(delay * 1000) if 'delay' in dir() else 50,
                      "warning": "Query exceeded slow_query_threshold" if 'delay' in dir() else None
                  }
                  self.wfile.write(json.dumps(result).encode())
                      
              def log_message(self, format, *args):
                  print(f"[catalog-slow-query] {args[0]}")
          
          print(f"Catalog service (SLOW QUERIES) starting - delay={SLOW_MIN}-{SLOW_MAX}s, probability={SLOW_PROB}")
          HTTPServer(('0.0.0.0', 8080), Handler).serve_forever()
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
          timeoutSeconds: 5
