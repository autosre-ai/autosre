# HTTP Request Timeout
# Simulates requests hanging until timeout
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service-http-timeout
  namespace: bookstore
  labels:
    app: inventory-service
    tier: api
    fault: http-timeout
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
        tier: api
        fault: http-timeout
    spec:
      containers:
      - name: inventory
        image: python:3.11-alpine
        env:
        - name: FAULT_MODE
          value: "http-timeout"
        - name: TIMEOUT_PROBABILITY
          value: "0.7"
        - name: HANG_DURATION_SECONDS
          value: "120"
        command: ["python", "-c"]
        args:
        - |
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import json
          import random
          import time
          import os
          
          TIMEOUT_PROB = float(os.environ.get('TIMEOUT_PROBABILITY', 0.7))
          HANG_DURATION = int(os.environ.get('HANG_DURATION_SECONDS', 120))
          
          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  if self.path in ['/health']:
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'OK')
                      return
                  
                  if self.path == '/ready':
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'READY')
                      return
                  
                  if random.random() < TIMEOUT_PROB:
                      print(f"[http-timeout] Request will hang for {HANG_DURATION}s...")
                      
                      # Simulate hanging request (will exceed client timeout)
                      time.sleep(HANG_DURATION)
                      
                      # Client probably already disconnected
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'Finally responded')
                  else:
                      self.send_response(200)
                      self.send_header('Content-Type', 'application/json')
                      self.end_headers()
                      self.wfile.write(json.dumps({"items": []}).encode())
                      
              def do_POST(self):
                  return self.do_GET()
                  
              def log_message(self, format, *args):
                  print(f"[inventory-timeout] {args[0]}")
          
          print(f"Inventory service (TIMEOUT) starting - probability={TIMEOUT_PROB}, hang={HANG_DURATION}s")
          HTTPServer(('0.0.0.0', 8080), Handler).serve_forever()
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
          timeoutSeconds: 5
