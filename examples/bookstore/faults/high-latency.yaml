# High Latency Fault Injection
# This patches the checkout-service to simulate network/processing delays
apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout-service-high-latency
  namespace: bookstore
  labels:
    app: checkout-service
    tier: api
    fault: high-latency
spec:
  replicas: 1
  selector:
    matchLabels:
      app: checkout-service
  template:
    metadata:
      labels:
        app: checkout-service
        tier: api
        fault: high-latency
    spec:
      containers:
      - name: checkout
        image: python:3.11-alpine
        command: ["python", "-c"]
        args:
        - |
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import json
          import time
          import random
          
          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  # Add latency to all requests
                  latency = random.uniform(3.0, 10.0)  # 3-10 second delay!
                  print(f"[high-latency] Adding {latency:.1f}s delay...")
                  time.sleep(latency)
                  
                  if self.path == '/health':
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'OK')
                  elif self.path == '/ready':
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'READY')
                  else:
                      self.send_response(404)
                      self.end_headers()
                      
              def do_POST(self):
                  # Extreme latency on checkout
                  latency = random.uniform(5.0, 15.0)  # 5-15 second delay!
                  print(f"[high-latency] POST: Adding {latency:.1f}s delay...")
                  time.sleep(latency)
                  
                  if self.path == '/checkout':
                      self.send_response(200)
                      self.send_header('Content-Type', 'application/json')
                      self.end_headers()
                      response = {"status": "success", "order_id": f"ORD-{random.randint(1000, 9999)}", "latency_ms": int(latency * 1000)}
                      self.wfile.write(json.dumps(response).encode())
                  else:
                      self.send_response(404)
                      self.end_headers()
                      
              def log_message(self, format, *args):
                  print(f"[checkout-slow] {args[0]}")
          
          print("Checkout service (HIGH LATENCY) starting on port 8080...")
          HTTPServer(('0.0.0.0', 8080), Handler).serve_forever()
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        # Longer timeouts to survive the artificial latency
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 20
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 20
