# Scenario: Secret Missing
# Expected: OpenSRE detects pod failing to start due to missing secret
# Remediation: Create missing Secret, fix Secret name reference
# Root Cause: Pod references a Secret that doesn't exist
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service-secret-missing
  namespace: bookstore
  labels:
    app: auth-service
    tier: security
    fault: secret-missing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
      fault: secret-missing
  template:
    metadata:
      labels:
        app: auth-service
        tier: security
        fault: secret-missing
    spec:
      containers:
      - name: auth
        image: python:3.11-alpine
        command: ["python", "-c", "print('Starting auth service...'); import time; time.sleep(3600)"]
        ports:
        - containerPort: 8080
          name: http
        env:
        # Reference to non-existent Secret
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: auth-secrets-nonexistent  # This Secret doesn't exist
              key: jwt_secret
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: auth-secrets-nonexistent
              key: db_password
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: external-api-keys-missing  # Another missing secret
              key: stripe_api_key
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        volumeMounts:
        - name: tls-certs
          mountPath: /etc/tls
          readOnly: true
      volumes:
      - name: tls-certs
        secret:
          secretName: auth-tls-secret-nonexistent  # Missing TLS secret
---
# Expected events:
# Warning  FailedMount  pod/auth-service-xxx  
# MountVolume.SetUp failed: secret "auth-tls-secret-nonexistent" not found
#
# Warning  Failed  pod/auth-service-xxx
# Error: secret "auth-secrets-nonexistent" not found
