# Scenario: Ingress Misconfigured
# Expected: OpenSRE detects 404/502 errors, backend not found
# Remediation: Fix Ingress path rules, verify service exists, check annotations
# Root Cause: Ingress routes to non-existent service or wrong path
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bookstore-ingress-misconfigured
  namespace: bookstore
  labels:
    fault: ingress-misconfigured
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    # Wrong annotation causing issues
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"  # Backend is HTTP, not HTTPS
spec:
  ingressClassName: nginx
  rules:
  - host: bookstore.example.com
    http:
      paths:
      # Path pointing to non-existent service
      - path: /api/v1/products
        pathType: Prefix
        backend:
          service:
            name: product-service-nonexistent  # This service doesn't exist
            port:
              number: 80
      # Path with wrong port
      - path: /api/v1/orders
        pathType: Prefix
        backend:
          service:
            name: order-service
            port:
              number: 9999  # Wrong port - service is on 80
      # Correct path for reference
      - path: /health
        pathType: Exact
        backend:
          service:
            name: frontend-service
            port:
              number: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-ingress-test
  namespace: bookstore
  labels:
    app: frontend-service
    tier: web
    fault: ingress-misconfigured
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-service
      fault: ingress-misconfigured
  template:
    metadata:
      labels:
        app: frontend-service
        tier: web
        fault: ingress-misconfigured
    spec:
      containers:
      - name: frontend
        image: python:3.11-alpine
        command: ["python", "-c"]
        args:
        - |
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import json
          
          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  if self.path == '/health':
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'{"status":"healthy"}')
                  else:
                      self.send_response(200)
                      self.send_header('Content-Type', 'application/json')
                      self.end_headers()
                      self.wfile.write(json.dumps({"page": self.path}).encode())
              def log_message(self, format, *args):
                  print(f"[frontend] {args[0]}")
          
          print("Frontend service starting on port 8080...")
          HTTPServer(('0.0.0.0', 8080), Handler).serve_forever()
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: bookstore
spec:
  selector:
    app: frontend-service
  ports:
  - port: 80
    targetPort: 8080
---
# Expected behavior:
# curl bookstore.example.com/api/v1/products -> 503 (service not found)
# curl bookstore.example.com/api/v1/orders -> 502 (wrong port)
# curl bookstore.example.com/health -> 200 (works)
