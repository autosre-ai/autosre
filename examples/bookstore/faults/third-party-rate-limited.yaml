# Third-Party Rate Limited
# Simulates hitting API quota on external service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-service-external-rate-limited
  namespace: bookstore
  labels:
    app: search-service
    tier: api
    fault: third-party-rate-limited
spec:
  replicas: 1
  selector:
    matchLabels:
      app: search-service
  template:
    metadata:
      labels:
        app: search-service
        tier: api
        fault: third-party-rate-limited
    spec:
      containers:
      - name: search
        image: python:3.11-alpine
        env:
        - name: FAULT_MODE
          value: "third-party-rate-limited"
        - name: EXTERNAL_SERVICE
          value: "elasticsearch-cloud.io"
        - name: QUOTA_REMAINING
          value: "0"
        command: ["python", "-c"]
        args:
        - |
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import json
          import random
          import os
          
          EXTERNAL_SERVICE = os.environ.get('EXTERNAL_SERVICE', 'elasticsearch-cloud.io')
          QUOTA_REMAINING = int(os.environ.get('QUOTA_REMAINING', 0))
          
          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  if self.path in ['/health', '/ready']:
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'OK')
                      return
                  
                  reset_time = random.randint(300, 3600)
                  print(f"[external-ratelimit] Quota exceeded for {EXTERNAL_SERVICE} - resets in {reset_time}s")
                  
                  self.send_response(429)
                  self.send_header('Content-Type', 'application/json')
                  self.send_header('Retry-After', str(reset_time))
                  self.send_header('X-RateLimit-Limit', '10000')
                  self.send_header('X-RateLimit-Remaining', '0')
                  self.send_header('X-RateLimit-Reset', str(reset_time))
                  self.end_headers()
                  error = {
                      "error": "ExternalQuotaExceeded",
                      "message": f"API quota exceeded for {EXTERNAL_SERVICE}",
                      "details": {
                          "service": EXTERNAL_SERVICE,
                          "quota_limit": 10000,
                          "quota_used": 10000,
                          "quota_remaining": QUOTA_REMAINING,
                          "reset_in_seconds": reset_time,
                          "billing_period": "hourly",
                          "account_tier": "growth"
                      },
                      "suggestion": "Upgrade API tier, implement caching, or reduce request volume"
                  }
                  self.wfile.write(json.dumps(error).encode())
                      
              def do_POST(self):
                  return self.do_GET()
                  
              def log_message(self, format, *args):
                  print(f"[search-quota] {args[0]}")
          
          print(f"Search service (EXTERNAL RATE LIMITED) starting - service={EXTERNAL_SERVICE}")
          HTTPServer(('0.0.0.0', 8080), Handler).serve_forever()
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
