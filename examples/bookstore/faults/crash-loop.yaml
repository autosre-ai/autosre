# Crash Loop Fault Injection
# This patches the payment-service to crash repeatedly
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service-crashloop
  namespace: bookstore
  labels:
    app: payment-service
    tier: api
    fault: crash-loop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
        tier: api
        fault: crash-loop
    spec:
      containers:
      - name: payment
        image: python:3.11-alpine
        command: ["python", "-c"]
        args:
        - |
          import time
          import random
          import sys
          
          print("Payment service starting...")
          print("Simulating crash in 10-30 seconds...")
          
          # Run for a bit, then crash
          crash_after = random.randint(10, 30)
          time.sleep(crash_after)
          
          print(f"[CRASH] Payment service crashing after {crash_after}s!")
          print("[CRASH] Fatal error: Unhandled exception in payment processor")
          sys.exit(1)
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        # Short probes so k8s detects the crash quickly
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 1
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 1
