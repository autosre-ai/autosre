# API Response Malformed
# Simulates returning invalid/corrupt JSON responses
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service-malformed
  namespace: bookstore
  labels:
    app: catalog-service
    tier: api
    fault: api-response-malformed
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-service
  template:
    metadata:
      labels:
        app: catalog-service
        tier: api
        fault: api-response-malformed
    spec:
      containers:
      - name: catalog
        image: python:3.11-alpine
        env:
        - name: FAULT_MODE
          value: "api-response-malformed"
        - name: MALFORMED_RATE
          value: "0.6"
        command: ["python", "-c"]
        args:
        - |
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import json
          import random
          import os
          
          MALFORMED_RATE = float(os.environ.get('MALFORMED_RATE', 0.6))
          
          MALFORMED_RESPONSES = [
              '{"books": [{"id": 1, "title": "Incomplete JSON"',  # Truncated
              '{"books": [{"id": 1, "title": undefined}]}',  # JavaScript undefined
              '{"books": [{"id": 1, "title": "Book", "price": NaN}]}',  # NaN value
              'books: [{id: 1}]',  # YAML-like
              '{"books": [{"id": 1,, "title": "Double comma"}]}',  # Double comma
              '{"books": null, "count": null, "meta": {"nested": {"broken": }}}',  # Empty value
              '\x00\x01\x02{"books": []}',  # Binary prefix
              '{"books": [{"id": 1}], "total": 9999999999999999999999}',  # Number overflow
          ]
          
          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  if self.path in ['/health', '/ready']:
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'OK')
                      return
                  
                  if random.random() < MALFORMED_RATE:
                      malformed = random.choice(MALFORMED_RESPONSES)
                      print(f"[malformed] Sending corrupt response: {malformed[:50]}...")
                      
                      self.send_response(200)
                      self.send_header('Content-Type', 'application/json')  # Claims to be JSON
                      self.end_headers()
                      self.wfile.write(malformed.encode())
                  else:
                      self.send_response(200)
                      self.send_header('Content-Type', 'application/json')
                      self.end_headers()
                      self.wfile.write(json.dumps({"books": [], "count": 0}).encode())
                      
              def do_POST(self):
                  return self.do_GET()
                  
              def log_message(self, format, *args):
                  print(f"[catalog-malformed] {args[0]}")
          
          print(f"Catalog service (MALFORMED) starting - malformed_rate={MALFORMED_RATE}")
          HTTPServer(('0.0.0.0', 8080), Handler).serve_forever()
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
