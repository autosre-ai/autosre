# Scenario: HPA at Maximum Replicas
# Expected: OpenSRE detects HPA unable to scale, high CPU/load persisting
# Remediation: Increase maxReplicas, optimize application, add resources
# Root Cause: HPA reached max replicas but load exceeds capacity
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway-hpa-maxed
  namespace: bookstore
  labels:
    app: api-gateway
    tier: edge
    fault: horizontal-scaling-maxed
spec:
  replicas: 3  # Will be at max
  selector:
    matchLabels:
      app: api-gateway
      fault: horizontal-scaling-maxed
  template:
    metadata:
      labels:
        app: api-gateway
        tier: edge
        fault: horizontal-scaling-maxed
    spec:
      containers:
      - name: gateway
        image: python:3.11-alpine
        command: ["python", "-c"]
        args:
        - |
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import threading
          import time
          
          # Generate constant high CPU load
          def cpu_burner():
              while True:
                  x = sum(i*i for i in range(10000))
          
          for _ in range(2):
              threading.Thread(target=cpu_burner, daemon=True).start()
          
          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  time.sleep(0.5)  # Slow responses under load
                  self.send_response(200)
                  self.end_headers()
                  self.wfile.write(b'{"status":"overloaded"}')
              def log_message(self, format, *args):
                  pass
          
          print("API Gateway starting (OVERLOADED - HPA at max)...")
          HTTPServer(('0.0.0.0', 8080), Handler).serve_forever()
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway-hpa-maxed
  namespace: bookstore
  labels:
    fault: horizontal-scaling-maxed
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway-hpa-maxed
  minReplicas: 1
  maxReplicas: 3  # Low max for demo - will hit ceiling quickly
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 70
---
# Expected HPA status:
# NAME                  REFERENCE                       TARGETS    MINPODS   MAXPODS   REPLICAS
# api-gateway-hpa       Deployment/api-gateway-hpa      95%/50%    1         3         3
# Condition: ScalingLimited - desired replica count is more than the maximum replica count
