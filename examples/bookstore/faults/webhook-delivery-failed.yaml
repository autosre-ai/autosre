# Webhook Delivery Failed
# Simulates outbound webhook delivery failures
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook-service-delivery-failed
  namespace: bookstore
  labels:
    app: webhook-service
    tier: api
    fault: webhook-delivery-failed
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webhook-service
  template:
    metadata:
      labels:
        app: webhook-service
        tier: api
        fault: webhook-delivery-failed
    spec:
      containers:
      - name: webhook
        image: python:3.11-alpine
        env:
        - name: FAULT_MODE
          value: "webhook-delivery-failed"
        - name: FAILURE_RATE
          value: "0.8"
        command: ["python", "-c"]
        args:
        - |
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import json
          import random
          import os
          
          FAILURE_RATE = float(os.environ.get('FAILURE_RATE', 0.8))
          
          failed_webhooks = 0
          
          WEBHOOK_ERRORS = [
              {"status": 500, "error": "Internal Server Error at recipient"},
              {"status": 502, "error": "Bad Gateway"},
              {"status": 503, "error": "Service Unavailable"},
              {"status": 0, "error": "Connection refused"},
              {"status": 0, "error": "DNS resolution failed"},
              {"status": 0, "error": "Connection timeout"},
          ]
          
          class Handler(BaseHTTPRequestHandler):
              global failed_webhooks
              
              def do_GET(self):
                  if self.path in ['/health', '/ready']:
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'OK')
                      return
                  
                  self.send_response(200)
                  self.send_header('Content-Type', 'application/json')
                  self.end_headers()
                  self.wfile.write(json.dumps({"failed_deliveries": failed_webhooks}).encode())
                      
              def do_POST(self):
                  global failed_webhooks
                  
                  if random.random() < FAILURE_RATE:
                      failed_webhooks += 1
                      error_info = random.choice(WEBHOOK_ERRORS)
                      webhook_id = f"wh_{random.randint(100000, 999999)}"
                      
                      print(f"[webhook] DELIVERY FAILED: {webhook_id} - {error_info['error']}")
                      
                      self.send_response(500)
                      self.send_header('Content-Type', 'application/json')
                      self.end_headers()
                      error = {
                          "error": "WebhookDeliveryFailed",
                          "message": "Failed to deliver webhook to endpoint",
                          "webhook": {
                              "id": webhook_id,
                              "event_type": random.choice(["order.created", "payment.completed", "shipping.updated"]),
                              "endpoint": "https://partner-api.example.com/webhooks",
                              "attempt": random.randint(1, 5),
                              "max_attempts": 5
                          },
                          "delivery_error": error_info,
                          "queue": {
                              "failed_count": failed_webhooks,
                              "retry_backoff_seconds": 2 ** random.randint(1, 5) * 60
                          },
                          "suggestion": "Verify endpoint URL and check partner service health"
                      }
                      self.wfile.write(json.dumps(error).encode())
                  else:
                      self.send_response(200)
                      self.send_header('Content-Type', 'application/json')
                      self.end_headers()
                      self.wfile.write(json.dumps({"status": "delivered"}).encode())
                  
              def log_message(self, format, *args):
                  print(f"[webhook-svc] {args[0]}")
          
          print(f"Webhook service (DELIVERY FAILED) starting - failure_rate={FAILURE_RATE}")
          HTTPServer(('0.0.0.0', 8080), Handler).serve_forever()
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
