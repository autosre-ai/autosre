# Database Schema Mismatch
# Simulates missing columns or table structure changes
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service-db-schema-mismatch
  namespace: bookstore
  labels:
    app: order-service
    tier: api
    fault: db-schema-mismatch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
        tier: api
        fault: db-schema-mismatch
    spec:
      containers:
      - name: order
        image: python:3.11-alpine
        env:
        - name: FAULT_MODE
          value: "db-schema-mismatch"
        - name: MISSING_COLUMN
          value: "shipping_address_id"
        command: ["python", "-c"]
        args:
        - |
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import json
          import random
          import os
          
          MISSING_COLUMN = os.environ.get('MISSING_COLUMN', 'shipping_address_id')
          
          SCHEMA_ERRORS = [
              {"column": MISSING_COLUMN, "table": "orders", "error": "column does not exist"},
              {"column": "discount_code", "table": "order_items", "error": "column does not exist"},
              {"column": "tax_rate", "table": "orders", "error": "column does not exist"},
              {"type": "type_mismatch", "column": "quantity", "expected": "integer", "got": "varchar"},
          ]
          
          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  if self.path in ['/health', '/ready']:
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'OK')
                      return
                  
                  error_info = random.choice(SCHEMA_ERRORS)
                  
                  if error_info.get('type') == 'type_mismatch':
                      print(f"[db-schema] ERROR: column \"{error_info['column']}\" is of type {error_info['got']} but expression is of type {error_info['expected']}")
                      msg = f"column \"{error_info['column']}\" is of type {error_info['got']} but expression is of type {error_info['expected']}"
                      code = "42804"
                  else:
                      print(f"[db-schema] ERROR: column \"{error_info['column']}\" of relation \"{error_info['table']}\" does not exist")
                      msg = f"column \"{error_info['column']}\" of relation \"{error_info['table']}\" does not exist"
                      code = "42703"
                  
                  self.send_response(500)
                  self.send_header('Content-Type', 'application/json')
                  self.end_headers()
                  error = {
                      "error": "DatabaseSchemaError",
                      "code": code,
                      "message": msg,
                      "details": error_info,
                      "suggestion": "Run database migrations or rollback application version"
                  }
                  self.wfile.write(json.dumps(error).encode())
                      
              def do_POST(self):
                  return self.do_GET()
                  
              def log_message(self, format, *args):
                  print(f"[order-schema] {args[0]}")
          
          print(f"Order service (SCHEMA MISMATCH) starting - missing column: {MISSING_COLUMN}")
          HTTPServer(('0.0.0.0', 8080), Handler).serve_forever()
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
