# Third-Party API Down
# Simulates external service being completely unavailable
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reviews-service-external-down
  namespace: bookstore
  labels:
    app: reviews-service
    tier: api
    fault: third-party-api-down
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reviews-service
  template:
    metadata:
      labels:
        app: reviews-service
        tier: api
        fault: third-party-api-down
    spec:
      containers:
      - name: reviews
        image: python:3.11-alpine
        env:
        - name: FAULT_MODE
          value: "third-party-api-down"
        - name: EXTERNAL_SERVICE
          value: "goodreads-api.com"
        command: ["python", "-c"]
        args:
        - |
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import json
          import random
          import os
          
          EXTERNAL_SERVICE = os.environ.get('EXTERNAL_SERVICE', 'goodreads-api.com')
          
          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  if self.path in ['/health', '/ready']:
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'OK')
                      return
                  
                  print(f"[external] ERROR: Connection refused to {EXTERNAL_SERVICE}")
                  
                  self.send_response(502)
                  self.send_header('Content-Type', 'application/json')
                  self.end_headers()
                  error = {
                      "error": "ExternalServiceUnavailable",
                      "message": f"Cannot connect to external service: {EXTERNAL_SERVICE}",
                      "details": {
                          "service": EXTERNAL_SERVICE,
                          "error": "ECONNREFUSED",
                          "last_successful_call": "2024-01-15T10:00:00Z",
                          "retry_attempts": 3,
                          "circuit_breaker": "OPEN",
                          "status_page": f"https://status.{EXTERNAL_SERVICE.split('.')[0]}.com"
                      },
                      "fallback_data": {
                          "reviews": [],
                          "source": "cache",
                          "stale": True
                      },
                      "suggestion": "Check external service status page and implement graceful degradation"
                  }
                  self.wfile.write(json.dumps(error).encode())
                      
              def do_POST(self):
                  return self.do_GET()
                  
              def log_message(self, format, *args):
                  print(f"[reviews-ext] {args[0]}")
          
          print(f"Reviews service (EXTERNAL DOWN) starting - external={EXTERNAL_SERVICE}")
          HTTPServer(('0.0.0.0', 8080), Handler).serve_forever()
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
