# Scenario: Connection Timeout
# Expected: OpenSRE detects upstream connection timeouts in logs/metrics
# Remediation: Check upstream service health, network connectivity, DNS
# Root Cause: Upstream service configured with unreachable IP/host
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service-connection-timeout
  namespace: bookstore
  labels:
    app: order-service
    tier: api
    fault: connection-timeout
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
      fault: connection-timeout
  template:
    metadata:
      labels:
        app: order-service
        tier: api
        fault: connection-timeout
    spec:
      containers:
      - name: order
        image: python:3.11-alpine
        command: ["python", "-c"]
        args:
        - |
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import urllib.request
          import socket
          import json
          import time
          
          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  if self.path == '/health':
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'OK')
                  elif self.path == '/ready':
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'READY')
                  elif self.path.startswith('/orders'):
                      start = time.time()
                      try:
                          # Try to reach unreachable IP (will timeout)
                          # 10.255.255.1 is typically unreachable in most clusters
                          response = urllib.request.urlopen(
                              'http://10.255.255.1:8080/validate',
                              timeout=10
                          )
                          self.send_response(200)
                          self.end_headers()
                          self.wfile.write(b'OK')
                      except socket.timeout as e:
                          duration = time.time() - start
                          print(f"[TIMEOUT] Connection timeout after {duration:.2f}s: {e}")
                          self.send_response(504)
                          self.send_header('Content-Type', 'application/json')
                          self.end_headers()
                          error = {"error": "UPSTREAM_TIMEOUT",
                                   "message": f"Connection to validation service timed out after {duration:.1f}s",
                                   "upstream": "10.255.255.1:8080"}
                          self.wfile.write(json.dumps(error).encode())
                      except Exception as e:
                          print(f"[ERROR] {e}")
                          self.send_response(500)
                          self.end_headers()
                          self.wfile.write(str(e).encode())
                  else:
                      self.send_response(404)
                      self.end_headers()
              def log_message(self, format, *args):
                  print(f"[order-service] {args[0]}")
          
          print("Order service (TIMEOUT variant) starting on port 8080...")
          print("[WARN] Configured to connect to unreachable IP - will timeout")
          HTTPServer(('0.0.0.0', 8080), Handler).serve_forever()
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
