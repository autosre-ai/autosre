# File Descriptor Exhaustion
# Simulates running out of file descriptors
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway-fd-exhaustion
  namespace: bookstore
  labels:
    app: api-gateway
    tier: api
    fault: file-descriptor-exhaustion
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        tier: api
        fault: file-descriptor-exhaustion
    spec:
      containers:
      - name: gateway
        image: python:3.11-alpine
        env:
        - name: FAULT_MODE
          value: "file-descriptor-exhaustion"
        - name: MAX_FD
          value: "1024"
        - name: FD_EXHAUSTION_RATE
          value: "0.6"
        command: ["python", "-c"]
        args:
        - |
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import json
          import random
          import os
          
          MAX_FD = int(os.environ.get('MAX_FD', 1024))
          FD_RATE = float(os.environ.get('FD_EXHAUSTION_RATE', 0.6))
          
          open_fds = 200  # Simulated baseline
          
          class Handler(BaseHTTPRequestHandler):
              global open_fds
              
              def do_GET(self):
                  global open_fds
                  
                  if self.path in ['/health', '/ready']:
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'OK')
                      return
                  
                  # Simulate FD leak
                  open_fds += random.randint(0, 3)
                  if open_fds > MAX_FD:
                      open_fds = MAX_FD
                  
                  if random.random() < FD_RATE and open_fds > MAX_FD * 0.9:
                      print(f"[fd] ERROR: Too many open files ({open_fds}/{MAX_FD})")
                      
                      self.send_response(500)
                      self.send_header('Content-Type', 'application/json')
                      self.end_headers()
                      error = {
                          "error": "FileDescriptorExhaustion",
                          "errno": 24,
                          "message": "Too many open files",
                          "details": {
                              "open_fds": open_fds,
                              "max_fds": MAX_FD,
                              "ulimit_n": MAX_FD,
                              "breakdown": {
                                  "tcp_connections": random.randint(300, 500),
                                  "file_handles": random.randint(100, 200),
                                  "pipes": random.randint(50, 100),
                                  "sockets": random.randint(200, 300)
                              }
                          },
                          "suggestion": "Increase ulimit or fix FD leaks"
                      }
                      self.wfile.write(json.dumps(error).encode())
                  else:
                      self.send_response(200)
                      self.send_header('Content-Type', 'application/json')
                      self.send_header('X-Open-FDs', str(open_fds))
                      self.end_headers()
                      self.wfile.write(json.dumps({"status": "ok", "open_fds": open_fds}).encode())
                      
              def do_POST(self):
                  return self.do_GET()
                  
              def log_message(self, format, *args):
                  print(f"[api-fd] {args[0]}")
          
          print(f"API Gateway (FD EXHAUSTION) starting - max_fd={MAX_FD}")
          HTTPServer(('0.0.0.0', 8080), Handler).serve_forever()
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
