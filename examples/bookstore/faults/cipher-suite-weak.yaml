# Scenario: Weak Cipher Suite
# Category: Network Security
# Description: TLS configuration allows deprecated or weak cipher suites

apiVersion: opensre.io/v1alpha1
kind: FaultScenario
metadata:
  name: cipher-suite-weak
  labels:
    category: security
    subcategory: network-security
    severity: medium
    service: bookstore-api
spec:
  description: |
    The TLS configuration allows weak or deprecated cipher suites that could
    be exploited by attackers. This may indicate vulnerability to attacks
    like BEAST, POODLE, or SWEET32.
  
  symptoms:
    - type: compliance-alert
      source: security-scanner
      message: "Weak cipher suites detected: TLS_RSA_WITH_3DES_EDE_CBC_SHA"
    - type: audit-finding
      source: pci-scan
      message: "PCI DSS 4.1: Weak cryptography detected"
    - type: ssl-labs
      grade: "B"
      issues:
        - "This server supports weak cipher suites"
        - "Forward secrecy not supported with all browsers"

  securityRisk:
    vulnerabilities:
      - name: "BEAST"
        ciphers: ["CBC mode ciphers with TLS 1.0"]
        severity: medium
      - name: "SWEET32"
        ciphers: ["3DES"]
        severity: medium
      - name: "POODLE"
        ciphers: ["SSLv3 ciphers"]
        severity: high
      - name: "No Forward Secrecy"
        ciphers: ["RSA key exchange (non-ECDHE)"]
        severity: medium
    complianceImpact:
      - "PCI DSS 4.1 - Use strong cryptography"
      - "NIST SP 800-52 - TLS Guidelines"

  affectedServices:
    - name: bookstore-api
      namespace: bookstore
      impact: "Vulnerable to cryptographic attacks"

  detection:
    - method: ssl-labs
      url: "https://www.ssllabs.com/ssltest/"
    - method: nmap
      command: |
        nmap --script ssl-enum-ciphers -p 443 api.example.com
    - method: testssl
      command: |
        testssl.sh api.example.com
    - method: openssl
      command: |
        # Test for specific weak cipher
        openssl s_client -connect api.example.com:443 -cipher 'DES-CBC3-SHA' 2>&1 | \
          grep -q "Cipher is" && echo "WEAK CIPHER SUPPORTED"

  remediation:
    automated: true
    steps:
      - action: identify-current-ciphers
        command: |
          nmap --script ssl-enum-ciphers -p 443 api.example.com
      - action: update-nginx-config
        description: "Configure strong cipher suites only"
        config: |
          ssl_protocols TLSv1.2 TLSv1.3;
          ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
          ssl_prefer_server_ciphers on;
          ssl_session_cache shared:SSL:10m;
          ssl_session_timeout 1d;
          ssl_session_tickets off;
      - action: update-ingress
        command: |
          kubectl apply -f - <<EOF
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: nginx-configuration
            namespace: ingress-nginx
          data:
            ssl-protocols: "TLSv1.2 TLSv1.3"
            ssl-ciphers: "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384"
            ssl-prefer-server-ciphers: "true"
          EOF
      - action: reload-ingress
        command: |
          kubectl rollout restart deployment/ingress-nginx-controller -n ingress-nginx

  recommendedCipherSuites:
    tls13:
      - "TLS_AES_256_GCM_SHA384"
      - "TLS_CHACHA20_POLY1305_SHA256"
      - "TLS_AES_128_GCM_SHA256"
    tls12:
      - "ECDHE-ECDSA-AES256-GCM-SHA384"
      - "ECDHE-RSA-AES256-GCM-SHA384"
      - "ECDHE-ECDSA-CHACHA20-POLY1305"
      - "ECDHE-RSA-CHACHA20-POLY1305"
      - "ECDHE-ECDSA-AES128-GCM-SHA256"
      - "ECDHE-RSA-AES128-GCM-SHA256"
    avoid:
      - "Any RSA key exchange (no forward secrecy)"
      - "Any CBC mode cipher"
      - "3DES"
      - "RC4"
      - "DES"
      - "Export ciphers"

  prevention:
    - type: configuration-management
      description: "Standardize TLS configuration across services"
      implementation: |
        Use shared ConfigMap/Secret for TLS settings
    - type: regular-scanning
      description: "Schedule SSL/TLS audits"
      frequency: "weekly"
      tools:
        - "SSL Labs API"
        - "testssl.sh"
    - type: compliance-checks
      description: "Include cipher checks in CI/CD"
      implementation: |
        # In deployment pipeline
        testssl.sh --jsonfile-pretty results.json ${ENDPOINT}
        jq '.[] | select(.severity == "HIGH" or .severity == "CRITICAL")' results.json

  verification:
    - type: ssl-labs
      command: |
        curl -s "https://api.ssllabs.com/api/v3/analyze?host=api.example.com&fromCache=on" | \
          jq '.endpoints[0].grade'
      expected: "A or A+"
    - type: weak-cipher-test
      command: |
        openssl s_client -connect api.example.com:443 -cipher 'DES-CBC3-SHA' 2>&1 | \
          grep -q "no cipher" && echo "PASS: Weak cipher rejected"
      expected: "PASS"
    - type: nmap-scan
      command: |
        nmap --script ssl-enum-ciphers -p 443 api.example.com | grep -c "weak"
      expected: "0"

  references:
    - url: https://wiki.mozilla.org/Security/Server_Side_TLS
      title: "Mozilla SSL Configuration Generator"
    - url: https://ssl-config.mozilla.org/
      title: "Mozilla SSL Config Generator"
    - url: https://ciphersuite.info/
      title: "Cipher Suite Info"
