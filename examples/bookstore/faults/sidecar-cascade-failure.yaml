# Scenario: Sidecar Container Failure Cascading to Main Container
# Expected: OpenSRE detects pod degraded due to sidecar failure
# Remediation: Fix sidecar, add retry logic, use native sidecar (k8s 1.28+)
# Root Cause: Sidecar container crashes, affecting main container functionality
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-with-failing-sidecar
  namespace: bookstore
  labels:
    app: sidecar-demo
    tier: api
    fault: sidecar-cascade-failure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sidecar-demo
      fault: sidecar-cascade-failure
  template:
    metadata:
      labels:
        app: sidecar-demo
        tier: api
        fault: sidecar-cascade-failure
    spec:
      shareProcessNamespace: true
      containers:
      # Main application container
      - name: app
        image: python:3.11-alpine
        command: ["python", "-c"]
        args:
        - |
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import urllib.request
          import json
          
          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  if self.path == '/health':
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'OK')
                  elif self.path == '/data':
                      # Try to get data through sidecar proxy
                      try:
                          response = urllib.request.urlopen(
                              'http://127.0.0.1:15001/proxy/data',
                              timeout=5
                          )
                          self.send_response(200)
                          self.end_headers()
                          self.wfile.write(response.read())
                      except Exception as e:
                          print(f"[ERROR] Sidecar proxy failed: {e}")
                          self.send_response(503)
                          self.send_header('Content-Type', 'application/json')
                          self.end_headers()
                          error = {"error": "SIDECAR_UNAVAILABLE",
                                   "message": "Data proxy sidecar is down"}
                          self.wfile.write(json.dumps(error).encode())
                  else:
                      self.send_response(404)
                      self.end_headers()
              def log_message(self, format, *args):
                  print(f"[app] {args[0]}")
          
          print("Main app starting on port 8080...")
          HTTPServer(('0.0.0.0', 8080), Handler).serve_forever()
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
      # Failing sidecar container
      - name: proxy-sidecar
        image: python:3.11-alpine
        command: ["python", "-c"]
        args:
        - |
          import time
          import sys
          import random
          
          print("Proxy sidecar starting...")
          
          # Sidecar crashes randomly after a short time
          run_time = random.randint(30, 60)
          print(f"[SIDECAR] Will crash in {run_time} seconds...")
          time.sleep(run_time)
          
          print("[SIDECAR] FATAL: Out of memory in connection pool")
          print("[SIDECAR] Crashing...")
          sys.exit(1)
        ports:
        - containerPort: 15001
          name: proxy
        resources:
          requests:
            memory: "32Mi"
            cpu: "25m"
          limits:
            memory: "64Mi"
            cpu: "50m"
---
# Pod shows: READY 1/2 (main container running, sidecar crashed)
# Main container can't reach external services through dead sidecar
