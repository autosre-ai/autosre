# Scenario: Secret Exposed in Environment Variables/Logs
# Category: Secrets Management
# Description: Sensitive data leaked to logs or observable outputs

apiVersion: opensre.io/v1alpha1
kind: FaultScenario
metadata:
  name: env-secret-exposed
  labels:
    category: security
    subcategory: secrets-management
    severity: critical
    service: bookstore-api
spec:
  description: |
    A secret has been exposed in application logs, error messages, or
    environment variable dumps. This is a security incident requiring
    immediate credential rotation and log scrubbing.
  
  symptoms:
    - type: security-alert
      source: log-scanner
      message: "Potential secret detected in logs: AWS_SECRET_ACCESS_KEY pattern found"
    - type: log
      source: bookstore-api
      pattern: "Configuration: {\"database_url\": \"postgres://user:ACTUAL_PASSWORD@host/db\"}"
    - type: audit-finding
      source: compliance-scanner
      message: "Secret material found in pod environment dump"

  securityImpact:
    severity: critical
    dataExposed:
      - type: "database_password"
        location: "Application logs"
        exposure: "Centralized logging system"
      - type: "api_key"
        location: "Error messages"
        exposure: "Error tracking system (Sentry)"
    potentialImpact:
      - "Unauthorized database access"
      - "Lateral movement using exposed credentials"
      - "Compliance violation (PCI-DSS, SOC2)"

  affectedServices:
    - name: bookstore-api
      namespace: bookstore
      impact: "Credentials compromised"

  rootCause:
    type: secret-leak
    component: application-code
    possibleCauses:
      - "Debug logging enabled in production"
      - "Exception handler logging full request/config"
      - "Startup banner showing environment variables"
      - "Health endpoint exposing configuration"
      - "Error messages including connection strings"
      - "Crash dump containing memory with secrets"

  detection:
    - method: log-scanning
      tools:
        - name: "truffleHog"
          description: "Scans for high-entropy strings and known secret patterns"
        - name: "gitleaks"
          description: "Secret detection in logs and repos"
      command: |
        # Scan recent logs for secrets
        kubectl logs -n bookstore -l app=bookstore-api --since=24h | \
          trufflehog --rules=/rules/secret-patterns.yaml --only-verified
    - method: prometheus
      query: |
        secret_leak_detection_total > 0
    - method: siem
      query: |
        event_type:secret_exposure

  immediateActions:
    - action: stop-logging
      description: "Stop log ingestion to prevent further exposure"
      command: |
        kubectl annotate deployment bookstore-api -n bookstore \
          fluentbit.io/exclude=true --overwrite
      priority: 1
    - action: rotate-credentials
      description: "Immediately rotate exposed credentials"
      command: |
        # Generate new credentials
        vault write -f database/rotate-role/bookstore-role
      priority: 1
    - action: revoke-old-credentials
      description: "Revoke the exposed credentials"
      command: |
        # Disable in database
        psql -h postgres -U admin -c "ALTER USER bookstore_app NOLOGIN;"
      priority: 2
    - action: preserve-evidence
      description: "Preserve logs for forensic analysis"
      command: |
        kubectl logs -n bookstore -l app=bookstore-api --since=24h > /evidence/logs-$(date +%s).txt
      priority: 3

  remediation:
    automated: false
    requiresApproval: security-team
    steps:
      - action: identify-exposure-scope
        description: "Determine where secrets were exposed"
        tasks:
          - "Search all log aggregation systems"
          - "Check error tracking (Sentry, Rollbar)"
          - "Review APM traces"
          - "Check cloud audit logs"
      - action: scrub-logs
        description: "Remove secrets from all log storage"
        command: |
          # Example for Elasticsearch
          curl -X POST "elasticsearch:9200/logs-*/_delete_by_query" -H 'Content-Type: application/json' -d'
          {
            "query": {
              "match": {
                "message": "${SECRET_PATTERN}"
              }
            }
          }'
      - action: fix-application-code
        description: "Fix the code that leaked secrets"
        tasks:
          - "Review logging configuration"
          - "Implement log sanitization"
          - "Add secret masking middleware"
      - action: redeploy
        command: |
          kubectl rollout restart deployment/bookstore-api -n bookstore

  prevention:
    - type: log-sanitization
      description: "Implement automatic secret masking in logs"
      code: |
        // Log sanitization middleware
        const sensitiveKeys = ['password', 'secret', 'api_key', 'token'];
        function sanitize(obj) {
          for (const key of Object.keys(obj)) {
            if (sensitiveKeys.some(k => key.toLowerCase().includes(k))) {
              obj[key] = '***REDACTED***';
            }
          }
          return obj;
        }
    - type: prevent-env-logging
      description: "Never log environment variables"
      config: |
        logging:
          exclude_env: true
          exclude_patterns:
            - "password"
            - "secret"
            - "key"
    - type: secret-scanning
      description: "Automated secret scanning in CI/CD and logs"
      tools:
        - "truffleHog in CI pipeline"
        - "Real-time log scanning"
    - type: code-review
      description: "Review logging statements for secret exposure"

  compliance:
    violations:
      - framework: "PCI-DSS"
        requirement: "3.4"
        description: "Render PAN unreadable"
      - framework: "SOC2"
        control: "CC6.1"
        description: "Logical access security"
    reportingRequired: true
    notifyEntities:
      - "Security team"
      - "Compliance officer"
      - "Potentially affected customers (if PII)"

  verification:
    - type: log-scan
      command: |
        kubectl logs -n bookstore -l app=bookstore-api --since=1h | \
          grep -iE "(password|secret|key).*=" | wc -l
      expected: "0"
    - type: credential-test
      description: "Verify old credentials no longer work"
      command: |
        PGPASSWORD=${OLD_PASSWORD} psql -h postgres -U bookstore_app -c "SELECT 1"
      expected: "authentication failed"

  references:
    - url: https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/06-Session_Management_Testing/04-Testing_for_Exposed_Session_Variables
      title: "OWASP Testing for Exposed Variables"
    - url: https://github.com/trufflesecurity/trufflehog
      title: "TruffleHog Secret Scanner"
