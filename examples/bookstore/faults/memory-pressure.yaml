# Memory Pressure / GC Thrashing
# Simulates excessive garbage collection causing pauses
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service-memory-pressure
  namespace: bookstore
  labels:
    app: catalog-service
    tier: api
    fault: memory-pressure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-service
  template:
    metadata:
      labels:
        app: catalog-service
        tier: api
        fault: memory-pressure
    spec:
      containers:
      - name: catalog
        image: python:3.11-alpine
        env:
        - name: FAULT_MODE
          value: "memory-pressure"
        - name: MEMORY_ALLOCATION_MB
          value: "100"
        - name: GC_PAUSE_PROBABILITY
          value: "0.4"
        command: ["python", "-c"]
        args:
        - |
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import json
          import random
          import time
          import gc
          import os
          
          ALLOC_MB = int(os.environ.get('MEMORY_ALLOCATION_MB', 100))
          GC_PAUSE_PROB = float(os.environ.get('GC_PAUSE_PROBABILITY', 0.4))
          
          # Pre-allocate memory to create pressure
          memory_hog = []
          
          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  global memory_hog
                  
                  if self.path in ['/health', '/ready']:
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'OK')
                      return
                  
                  # Allocate more memory on each request
                  memory_hog.append(bytearray(1024 * 1024))  # 1MB
                  if len(memory_hog) > ALLOC_MB:
                      memory_hog = memory_hog[-50:]  # Keep last 50MB
                  
                  # Simulate GC pause
                  if random.random() < GC_PAUSE_PROB:
                      gc_pause_ms = random.randint(100, 2000)
                      print(f"[gc] FULL GC pause: {gc_pause_ms}ms (heap: {len(memory_hog)}MB)")
                      time.sleep(gc_pause_ms / 1000)
                      gc.collect()
                  
                  self.send_response(200)
                  self.send_header('Content-Type', 'application/json')
                  self.send_header('X-GC-Collections', str(gc.get_count()[0]))
                  self.end_headers()
                  response = {
                      "books": [],
                      "gc_stats": {
                          "heap_used_mb": len(memory_hog),
                          "gc_count": gc.get_count(),
                          "warning": "High memory pressure - consider scaling up"
                      }
                  }
                  self.wfile.write(json.dumps(response).encode())
                      
              def do_POST(self):
                  return self.do_GET()
                  
              def log_message(self, format, *args):
                  print(f"[catalog-gc] {args[0]}")
          
          print(f"Catalog service (MEMORY PRESSURE) starting - alloc={ALLOC_MB}MB")
          HTTPServer(('0.0.0.0', 8080), Handler).serve_forever()
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "100m"
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
          timeoutSeconds: 10
