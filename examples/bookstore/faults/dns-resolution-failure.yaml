# Scenario: DNS Resolution Failure
# Expected: OpenSRE detects DNS lookup errors in application logs
# Remediation: Check CoreDNS pods, verify service name, check DNS policy
# Root Cause: Application references non-existent service DNS name
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service-dns-fail
  namespace: bookstore
  labels:
    app: payment-service
    tier: api
    fault: dns-resolution-failure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
      fault: dns-resolution-failure
  template:
    metadata:
      labels:
        app: payment-service
        tier: api
        fault: dns-resolution-failure
    spec:
      containers:
      - name: payment
        image: python:3.11-alpine
        command: ["python", "-c"]
        args:
        - |
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import urllib.request
          import socket
          import json
          import time
          
          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  if self.path == '/health':
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'OK')
                  elif self.path == '/ready':
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'READY')
                  elif self.path.startswith('/process-payment'):
                      # Try to call non-existent service
                      try:
                          # This DNS name doesn't exist
                          response = urllib.request.urlopen(
                              'http://fraud-detection-service-typo.bookstore.svc.cluster.local:8080/check',
                              timeout=5
                          )
                          self.send_response(200)
                          self.send_header('Content-Type', 'application/json')
                          self.end_headers()
                          self.wfile.write(json.dumps({"status": "approved"}).encode())
                      except socket.gaierror as e:
                          print(f"[DNS-FAIL] DNS resolution failed: {e}")
                          self.send_response(502)
                          self.send_header('Content-Type', 'application/json')
                          self.end_headers()
                          error = {"error": "DNS_RESOLUTION_FAILED", 
                                   "message": f"Could not resolve fraud-detection-service-typo: {e}"}
                          self.wfile.write(json.dumps(error).encode())
                      except Exception as e:
                          print(f"[ERROR] Request failed: {e}")
                          self.send_response(500)
                          self.end_headers()
                          self.wfile.write(str(e).encode())
                  else:
                      self.send_response(404)
                      self.end_headers()
              def log_message(self, format, *args):
                  print(f"[payment-service] {args[0]}")
          
          print("Payment service (DNS-FAIL variant) starting on port 8080...")
          print("[WARN] Will fail DNS lookups to fraud-detection-service-typo")
          HTTPServer(('0.0.0.0', 8080), Handler).serve_forever()
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
