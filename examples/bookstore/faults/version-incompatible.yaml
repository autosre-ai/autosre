# Scenario: Deprecated API Version
# Expected: OpenSRE detects deprecated API usage, warnings in audit logs
# Remediation: Update API version to current, migrate CRDs, update manifests
# Root Cause: Using deprecated/removed Kubernetes API versions
#
# Note: This demonstrates the concept - actual deprecated versions vary by k8s version
# In k8s 1.25+, PodSecurityPolicy was removed
# In k8s 1.22+, several beta APIs were removed

# Example 1: Deprecated Ingress API (extensions/v1beta1 removed in 1.22)
# This will fail in k8s 1.22+
apiVersion: extensions/v1beta1
kind: Ingress
metadata:
  name: legacy-ingress-deprecated
  namespace: bookstore
  labels:
    fault: version-incompatible
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
  - host: legacy.bookstore.example.com
    http:
      paths:
      - path: /
        backend:
          serviceName: legacy-service
          servicePort: 80
---
# Example 2: Deprecated HPA API (autoscaling/v2beta1 deprecated)
apiVersion: autoscaling/v2beta1
kind: HorizontalPodAutoscaler
metadata:
  name: legacy-hpa-deprecated
  namespace: bookstore
  labels:
    fault: version-incompatible
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: legacy-deployment
  minReplicas: 1
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      targetAverageUtilization: 50
---
# Example 3: Deployment using current API but referencing legacy patterns
apiVersion: apps/v1
kind: Deployment
metadata:
  name: legacy-app-api-deprecated
  namespace: bookstore
  labels:
    app: legacy-app
    tier: api
    fault: version-incompatible
spec:
  replicas: 1
  selector:
    matchLabels:
      app: legacy-app
      fault: version-incompatible
  template:
    metadata:
      labels:
        app: legacy-app
        tier: api
        fault: version-incompatible
    spec:
      containers:
      - name: legacy
        image: python:3.11-alpine
        command: ["python", "-c"]
        args:
        - |
          print("Legacy app running...")
          print("[WARN] This deployment uses deprecated API patterns")
          import time
          time.sleep(3600)
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
---
# Expected errors when applying deprecated APIs:
# error: resource mapping not found for name: "legacy-ingress-deprecated"
# namespace: "bookstore" from "STDIN": no matches for kind "Ingress" 
# in version "extensions/v1beta1"
#
# Or warnings:
# Warning: extensions/v1beta1 Ingress is deprecated in v1.14+, 
# unavailable in v1.22+; use networking.k8s.io/v1 Ingress
