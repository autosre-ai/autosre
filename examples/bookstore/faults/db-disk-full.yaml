# Database Disk Full
# Simulates no space left for database writes
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service-db-disk-full
  namespace: bookstore
  labels:
    app: order-service
    tier: api
    fault: db-disk-full
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
        tier: api
        fault: db-disk-full
    spec:
      containers:
      - name: order
        image: python:3.11-alpine
        env:
        - name: FAULT_MODE
          value: "db-disk-full"
        - name: DISK_USAGE_PERCENT
          value: "99.8"
        command: ["python", "-c"]
        args:
        - |
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import json
          import random
          import os
          
          DISK_USAGE = float(os.environ.get('DISK_USAGE_PERCENT', 99.8))
          
          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  if self.path in ['/health', '/ready']:
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'OK')
                      return
                  
                  # Reads still work
                  self.send_response(200)
                  self.send_header('Content-Type', 'application/json')
                  self.end_headers()
                  self.wfile.write(json.dumps({"orders": [], "status": "read_only_mode"}).encode())
                      
              def do_POST(self):
                  print(f"[db-disk] ERROR: could not extend file - No space left on device")
                  
                  self.send_response(507)
                  self.send_header('Content-Type', 'application/json')
                  self.end_headers()
                  error = {
                      "error": "DatabaseDiskFull",
                      "code": "53100",
                      "message": "could not extend file: No space left on device",
                      "details": {
                          "disk_usage_percent": DISK_USAGE,
                          "free_space_mb": random.randint(1, 50),
                          "tablespace": "pg_default",
                          "data_dir": "/var/lib/postgresql/data",
                          "affected_table": "orders"
                      },
                      "suggestion": "Expand PVC, archive old data, or VACUUM FULL"
                  }
                  self.wfile.write(json.dumps(error).encode())
              
              def do_PUT(self):
                  return self.do_POST()
              
              def do_DELETE(self):
                  # Deletes might work (freeing space)
                  self.send_response(200)
                  self.send_header('Content-Type', 'application/json')
                  self.end_headers()
                  self.wfile.write(json.dumps({"deleted": True, "warning": "Disk still at critical level"}).encode())
                  
              def log_message(self, format, *args):
                  print(f"[order-disk-full] {args[0]}")
          
          print(f"Order service (DISK FULL) starting - simulating {DISK_USAGE}% disk usage")
          HTTPServer(('0.0.0.0', 8080), Handler).serve_forever()
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
