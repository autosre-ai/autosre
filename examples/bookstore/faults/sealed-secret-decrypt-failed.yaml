# Scenario: Sealed Secret Decryption Failed
# Category: Secrets Management
# Description: Bitnami Sealed Secrets controller cannot decrypt sealed secret

apiVersion: opensre.io/v1alpha1
kind: FaultScenario
metadata:
  name: sealed-secret-decrypt-failed
  labels:
    category: security
    subcategory: secrets-management
    severity: high
    service: sealed-secrets
spec:
  description: |
    The Sealed Secrets controller cannot decrypt a SealedSecret resource,
    leaving the target Kubernetes Secret empty or missing.
  
  symptoms:
    - type: error
      source: sealed-secrets-controller
      message: "no key could decrypt secret"
    - type: log
      source: sealed-secrets-controller
      pattern: "Unseal error for db-credentials: crypto/rsa: decryption error"
    - type: resource-status
      kind: SealedSecret
      status: |
        status:
          conditions:
          - type: Synced
            status: "False"
            reason: "DecryptionError"
    - type: event
      namespace: bookstore
      reason: "ErrUnsealFailed"
      message: "Failed to unseal: no key could decrypt secret"

  affectedServices:
    - name: bookstore-api
      namespace: bookstore
      impact: "Secret not created, application missing credentials"

  rootCause:
    type: key-mismatch
    component: sealed-secrets
    possibleCauses:
      - "Sealed secret encrypted with different cluster's public key"
      - "Sealing key rotated and old key removed"
      - "Sealed secret copied from different environment"
      - "Controller private key lost during disaster recovery"
      - "Namespace scope mismatch (sealed for different namespace)"

  detection:
    - method: sealed-secret-status
      command: |
        kubectl get sealedsecret db-credentials -n bookstore -o yaml | grep -A10 status
    - method: controller-logs
      command: |
        kubectl logs -n kube-system -l name=sealed-secrets-controller --tail=100
    - method: events
      command: |
        kubectl get events -n bookstore --field-selector reason=ErrUnsealFailed

  remediation:
    automated: partial
    steps:
      - action: identify-sealing-key
        description: "Check which key was used to seal the secret"
        command: |
          # Decode sealed secret to see key fingerprint
          kubectl get sealedsecret db-credentials -n bookstore -o jsonpath='{.spec.encryptedData}' | base64 -d | head -c 100
      - action: list-available-keys
        description: "List keys available to controller"
        command: |
          kubectl get secret -n kube-system -l sealedsecrets.bitnami.com/sealed-secrets-key=active
      - action: check-key-rotation
        description: "Verify if key rotation removed needed key"
        command: |
          kubeseal --fetch-cert --controller-name=sealed-secrets --controller-namespace=kube-system
      - action: reseal-secret
        description: "Re-seal the secret with current cluster's key"
        command: |
          # Get the original secret value (from backup, vault, etc.)
          kubectl create secret generic db-credentials \
            --from-literal=password=${DB_PASSWORD} \
            --dry-run=client -o yaml | \
          kubeseal --format yaml \
            --controller-name=sealed-secrets \
            --controller-namespace=kube-system > db-credentials-sealed.yaml
          
          kubectl apply -f db-credentials-sealed.yaml
      - action: restore-old-key
        description: "If key was backed up, restore it"
        command: |
          kubectl apply -f sealed-secrets-key-backup.yaml
          kubectl rollout restart deployment/sealed-secrets-controller -n kube-system

  keyManagement:
    backup:
      description: "How to backup sealing keys"
      command: |
        kubectl get secret -n kube-system -l sealedsecrets.bitnami.com/sealed-secrets-key -o yaml > sealed-secrets-keys-backup.yaml
    rotation:
      description: "Safe key rotation process"
      steps:
        - "Generate new key pair"
        - "Add new key (keep old keys for decryption)"
        - "Re-seal all secrets with new key over time"
        - "Remove old keys after all secrets migrated"
    recovery:
      description: "Disaster recovery"
      warning: "If keys are lost and not backed up, sealed secrets cannot be recovered"
      mitigation: "Store raw secrets in separate secure backup (Vault, encrypted backup)"

  prevention:
    - type: key-backup
      description: "Backup sealing keys securely"
      automation: |
        # CronJob to backup keys
        apiVersion: batch/v1
        kind: CronJob
        metadata:
          name: sealed-secrets-backup
        spec:
          schedule: "0 0 * * *"
          jobTemplate:
            spec:
              template:
                spec:
                  containers:
                  - name: backup
                    image: bitnami/kubectl
                    command:
                    - /bin/sh
                    - -c
                    - kubectl get secret -n kube-system -l sealedsecrets.bitnami.com/sealed-secrets-key -o yaml | aws s3 cp - s3://backup/sealed-secrets-keys.yaml
    - type: environment-separation
      description: "Use cluster-specific sealed secrets"
      process: |
        1. Fetch cert: kubeseal --fetch-cert > cluster-cert.pem
        2. Seal for specific cluster: kubeseal --cert cluster-cert.pem
    - type: monitoring
      description: "Alert on unseal failures"
      rule: |
        sum(rate(sealed_secrets_controller_unseal_errors_total[5m])) > 0

  verification:
    - type: sealed-secret-status
      command: |
        kubectl get sealedsecret db-credentials -n bookstore -o jsonpath='{.status.conditions[?(@.type=="Synced")].status}'
      expected: "True"
    - type: secret-exists
      command: |
        kubectl get secret db-credentials -n bookstore -o jsonpath='{.data.password}' | base64 -d | wc -c
      expected: "> 0"
    - type: controller-health
      command: |
        kubectl logs -n kube-system -l name=sealed-secrets-controller --tail=10 | grep -i error
      expected: "No errors"

  references:
    - url: https://github.com/bitnami-labs/sealed-secrets
      title: "Bitnami Sealed Secrets"
    - url: https://github.com/bitnami-labs/sealed-secrets/blob/main/docs/bring-your-own-certificates.md
      title: "Sealed Secrets Key Management"
