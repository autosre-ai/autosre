# Redis Connection Failed
# Simulates cache server unreachable
apiVersion: apps/v1
kind: Deployment
metadata:
  name: session-service-redis-failed
  namespace: bookstore
  labels:
    app: session-service
    tier: api
    fault: redis-connection-failed
spec:
  replicas: 1
  selector:
    matchLabels:
      app: session-service
  template:
    metadata:
      labels:
        app: session-service
        tier: api
        fault: redis-connection-failed
    spec:
      containers:
      - name: session
        image: python:3.11-alpine
        env:
        - name: FAULT_MODE
          value: "redis-connection-failed"
        - name: REDIS_HOST
          value: "redis-master.bookstore.svc.cluster.local"
        - name: FALLBACK_TO_DB
          value: "true"
        command: ["python", "-c"]
        args:
        - |
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import json
          import random
          import time
          import os
          
          REDIS_HOST = os.environ.get('REDIS_HOST', 'redis-master')
          FALLBACK_ENABLED = os.environ.get('FALLBACK_TO_DB', 'true') == 'true'
          
          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  if self.path in ['/health', '/ready']:
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'OK')
                      return
                  
                  # Simulate connection attempt delay
                  time.sleep(random.uniform(0.5, 2.0))
                  
                  print(f"[redis] ERROR: Connection refused to {REDIS_HOST}:6379")
                  
                  if FALLBACK_ENABLED:
                      # Fallback to database (slow)
                      time.sleep(random.uniform(0.5, 1.5))
                      print(f"[redis] WARNING: Falling back to database for session lookup")
                      
                      self.send_response(200)
                      self.send_header('Content-Type', 'application/json')
                      self.send_header('X-Cache', 'BYPASS')
                      self.send_header('X-Cache-Fallback', 'database')
                      self.end_headers()
                      response = {
                          "session": {"user_id": 12345, "expires_at": "2024-01-16T00:00:00Z"},
                          "cache_status": "bypass",
                          "fallback": "database",
                          "warning": "Redis unavailable - using database fallback (degraded performance)"
                      }
                      self.wfile.write(json.dumps(response).encode())
                  else:
                      self.send_response(503)
                      self.send_header('Content-Type', 'application/json')
                      self.end_headers()
                      error = {
                          "error": "CacheConnectionFailed",
                          "message": f"Connection refused: {REDIS_HOST}:6379",
                          "details": {
                              "host": REDIS_HOST,
                              "port": 6379,
                              "error_code": "ECONNREFUSED",
                              "retry_attempts": 3
                          },
                          "suggestion": "Check Redis pod status and network policies"
                      }
                      self.wfile.write(json.dumps(error).encode())
                      
              def do_POST(self):
                  return self.do_GET()
                  
              def log_message(self, format, *args):
                  print(f"[session-redis] {args[0]}")
          
          print(f"Session service (REDIS FAILED) starting - host={REDIS_HOST}, fallback={FALLBACK_ENABLED}")
          HTTPServer(('0.0.0.0', 8080), Handler).serve_forever()
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
