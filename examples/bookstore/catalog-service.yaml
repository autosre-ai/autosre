apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
  namespace: bookstore
  labels:
    app: catalog-service
    tier: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: catalog-service
  template:
    metadata:
      labels:
        app: catalog-service
        tier: api
    spec:
      containers:
      - name: catalog
        image: python:3.11-alpine
        command: ["python", "-c"]
        args:
        - |
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import json
          import os
          
          books = [
            {"id": 1, "title": "Site Reliability Engineering", "author": "Google", "price": 49.99},
            {"id": 2, "title": "The Phoenix Project", "author": "Gene Kim", "price": 24.99},
            {"id": 3, "title": "Designing Data-Intensive Applications", "author": "Martin Kleppmann", "price": 44.99},
            {"id": 4, "title": "Kubernetes Up & Running", "author": "Kelsey Hightower", "price": 39.99},
          ]
          
          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  if self.path == '/health':
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'OK')
                  elif self.path == '/ready':
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b'READY')
                  elif self.path.startswith('/books'):
                      self.send_response(200)
                      self.send_header('Content-Type', 'application/json')
                      self.end_headers()
                      self.wfile.write(json.dumps(books).encode())
                  else:
                      self.send_response(404)
                      self.end_headers()
              def log_message(self, format, *args):
                  print(f"[catalog] {args[0]}")
          
          print("Catalog service starting on port 8080...")
          HTTPServer(('0.0.0.0', 8080), Handler).serve_forever()
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-service
  namespace: bookstore
  labels:
    app: catalog-service
spec:
  type: ClusterIP
  selector:
    app: catalog-service
  ports:
  - port: 8080
    targetPort: 8080
    name: http
