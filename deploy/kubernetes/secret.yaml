# OpenSRE Secrets
# NOTE: Replace placeholder values with actual base64-encoded secrets
# To encode: echo -n "your-secret" | base64
apiVersion: v1
kind: Secret
metadata:
  name: opensre-secrets
  labels:
    app: opensre
    app.kubernetes.io/name: opensre
type: Opaque
data:
  # LLM API keys (base64 encoded)
  # anthropic_api_key: <base64-encoded-key>
  # openai_api_key: <base64-encoded-key>
  
  # Slack integration (base64 encoded)
  # slack_bot_token: <base64-encoded-token>
  # slack_app_token: <base64-encoded-token>
  
  # Placeholder - remove in production
  placeholder: cGxhY2Vob2xkZXI=
---
# Example using stringData (plain text, auto-encoded)
# apiVersion: v1
# kind: Secret
# metadata:
#   name: opensre-secrets
# type: Opaque
# stringData:
#   anthropic_api_key: "sk-ant-..."
#   openai_api_key: "sk-..."
#   slack_bot_token: "xoxb-..."
