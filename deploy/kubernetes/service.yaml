# OpenSRE Service
apiVersion: v1
kind: Service
metadata:
  name: opensre
  labels:
    app: opensre
    app.kubernetes.io/name: opensre
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: opensre
---
