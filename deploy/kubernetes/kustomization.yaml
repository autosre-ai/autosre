# Kustomization for OpenSRE
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: opensre

namespace: default

resources:
  - rbac.yaml
  - configmap.yaml
  - secret.yaml
  - deployment.yaml
  - service.yaml
  # Optional: uncomment to enable
  # - hpa.yaml
  # - ingress.yaml

commonLabels:
  app.kubernetes.io/name: opensre
  app.kubernetes.io/version: "0.1.0"
  app.kubernetes.io/managed-by: kustomize

images:
  - name: ghcr.io/srisainath/opensre
    newTag: latest

# Example: Override for different environments
# patches:
#   - path: patches/production.yaml
#     target:
#       kind: Deployment
#       name: opensre
