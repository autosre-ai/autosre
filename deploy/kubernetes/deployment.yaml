# OpenSRE Deployment - Raw Kubernetes Manifest
# For production use, consider the Helm chart in charts/opensre/
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opensre
  labels:
    app: opensre
    app.kubernetes.io/name: opensre
    app.kubernetes.io/version: "0.1.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opensre
  template:
    metadata:
      labels:
        app: opensre
        app.kubernetes.io/name: opensre
    spec:
      serviceAccountName: opensre
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: opensre
          image: ghcr.io/srisainath/opensre:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: OPENSRE_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: OPENSRE_LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: opensre-config
                  key: log_level
                  optional: true
            - name: OPENSRE_PROMETHEUS_URL
              valueFrom:
                configMapKeyRef:
                  name: opensre-config
                  key: prometheus_url
                  optional: true
            - name: OPENSRE_LLM_PROVIDER
              valueFrom:
                configMapKeyRef:
                  name: opensre-config
                  key: llm_provider
                  optional: true
            - name: OLLAMA_HOST
              valueFrom:
                configMapKeyRef:
                  name: opensre-config
                  key: ollama_host
                  optional: true
            # API keys from secret
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: opensre-secrets
                  key: anthropic_api_key
                  optional: true
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: opensre-secrets
                  key: openai_api_key
                  optional: true
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: opensre-secrets
                  key: slack_bot_token
                  optional: true
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 256Mi
          volumeMounts:
            - name: config
              mountPath: /etc/opensre
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: opensre-config
            optional: true
        - name: tmp
          emptyDir: {}
