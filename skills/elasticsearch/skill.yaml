name: elasticsearch
version: 1.0.0
description: Query Elasticsearch for logs and metrics
author: OpenSRE

config:
  hosts:
    type: array
    required: true
    description: Elasticsearch hosts (e.g., ["http://localhost:9200"])
  username:
    type: string
    required: false
  password:
    type: string
    required: false
    secret: true
  api_key:
    type: string
    required: false
    secret: true
  cloud_id:
    type: string
    required: false
    description: Elastic Cloud ID
  verify_ssl:
    type: boolean
    required: false
    default: true
  timeout:
    type: integer
    required: false
    default: 30

actions:
  - name: search
    description: Execute Elasticsearch query
    params:
      - name: index
        type: string
        required: true
        description: Index pattern (e.g., "logs-*")
      - name: query
        type: object
        required: true
        description: Elasticsearch query DSL
      - name: size
        type: integer
        required: false
        default: 100
      - name: sort
        type: array
        required: false
    returns: list[Document]

  - name: count
    description: Count documents matching query
    params:
      - name: index
        type: string
        required: true
      - name: query
        type: object
        required: true
    returns: int

  - name: get_indices
    description: List indices
    params:
      - name: pattern
        type: string
        required: false
        default: "*"
    returns: list[Index]

  - name: cluster_health
    description: Get cluster health status
    returns: ClusterHealth

dependencies:
  - httpx>=0.24.0
