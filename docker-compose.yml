version: '3.8'

services:
  sre-agent:
    build: .
    ports:
      - "8080:8080"
    environment:
      - LLM_PROVIDER=ollama
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=llama3.1:8b
      - PROMETHEUS_URL=http://prometheus:9090
      - UI_PORT=8080
    volumes:
      - ~/.kube:/root/.kube:ro
      - ./runbooks:/app/runbooks:ro
    depends_on:
      - ollama
    networks:
      - sre-network

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - sre-network
    # Pull model on startup
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        sleep 5
        ollama pull llama3.1:8b
        wait

  # Optional: Local Prometheus for testing
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - sre-network

volumes:
  ollama_data:

networks:
  sre-network:
    driver: bridge
