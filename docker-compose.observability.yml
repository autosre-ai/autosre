# OpenSRE Local Observability Stack
# Run: docker compose -f docker-compose.observability.yml up -d

version: '3.8'

services:
  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: opensre-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./config/prometheus-opensre.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - opensre-observability

  grafana:
    image: grafana/grafana:10.3.0
    container_name: opensre-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=opensre
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/opensre.json
    volumes:
      - ./dashboards:/var/lib/grafana/dashboards:ro
      - ./config/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./config/grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - opensre-observability

volumes:
  prometheus_data:
  grafana_data:

networks:
  opensre-observability:
    driver: bridge
